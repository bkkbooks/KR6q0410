front:
  text: 編刻瑞白禪師語録序瑞白大師為雲門湛然大師嫡嗣溯之洞山為三十二世溯之達磨為四十二世宗風大暢將二十年嗣法門人三十餘數崇禎乙亥秋囑嘯雲和尚主天台護國席丙子夏囑久默禪師主辨山龍華席大師退隱崆洞歸寂百丈塔葬龍華嘯雲和尚為大師嫡嗣少林謂之得髓也行道天台重輝寶鏡所謂振佛祖將墜之宗風開人天已翳之眼目使曹洞一宗麗如杲日故錢太師序和尚語録曰辨山有天台猶孔之有孟老之有莊父子一家弘揚至道皆歸無為之化也豫讀之踴躍歡喜非特見和尚之心亦見辨山大師之心矣和尚以深大願力為大師存日所有語録雖已梓行大傳於世然未刻之散稿尚多不意法兄久默禪師亦隨歸寂況舊有同編之訂未果是以和尚收先後刻未刻者總編為全部成十八卷將大師平日為人一片老婆心重重拈出使後學共覽皆知言即無言其説法七七未談一字與拈花面壁總在此矣秋日上人幻如徵序於豫豫雖不知禪亦幸忝參席末分固難辭不容不言也時崇禎十六年歲在癸未季秋望日參學弟子小寒山陳函輝頓首撰舊序越國宗風雲門倡始而金粟磬山繼之雲門逝辨山興於是曹洞之宗大振余未及見辨山之面然已見其心矣寶鏡懸空十方普照主賓偏正形影歷然洞山禪已屬老漢矣吳興唐祈遠雅有道風杖履往來與師倡和嘗與余訂湖上之盟過辨山而問道虎溪之笑其再見於斯時乎黃端伯祖師西來不立文字然猶怪其垂法諸語較之拈華微指尤章彩兆何也世以下世燈以照燈篇帙之盛幾掩三乘十二分而出其上施設門頭丹青筆意翻引一期室灑增長葛藤啼不止黃葉不輟所謂臨摹古畫轉失本色惟我瑞白禪師不然扼住要津稍通消息將與麼地與麼時與麼機緣向諸人髑髏邊穿卻一雙正法眼如鳥度空如羚羊挂角不存軌則此案真可以救拖泥帶水者之病既聽雲門曲又從我辨陽看弄遮般師子莫把禪師一片老婆舌作文字理會好張時化陳函輝頓首撰至道無隱荷擔惟人乃補偏救弊之方則乘時而起無有定執吾儒自六經晦𩞾異喙沸騰程朱子起而彰明輔翼之扶教以明宗也所以玄詮微旨即深造實履而益著繼而訓詁沉埋塗飾規表焚坑之慘諸儒自為之而加烈焉陽明子崛起于萬死一生中與之昏衢寶炬而昭揭中天明宗以扶教也所以匡時持世取諸良知二字卷舒裕如然而總以云救初無偏畸釋氏何獨不然禪宗雖五宗分派總歸一地流行奈道法垂秋不無泛濫承滯語言慧巧穿鑿至以傳燈續命一樁等作沿門戲具吾滋懼焉瑞老大師為雲門冢子暢洞上玄風九坐道場嗣法三十餘人道化條達血系衍繁猗歟盛矣亦知老人致此之繇乎無被寢處者十三年七參尊宿孳孳若渴且蘇復絶絶復蘇並不輕肯究乃瞥地師之精進謙退何如也若夫身律之嚴而即嚴以率衆如法學習不徇情求諄諄遺教經犯者呵為叛臣逆子尤足砭挽近膏肓衣拂之下尤嚴更無一人竽濫如徒侈熱鬧門頭不顧將來決裂謂法王何至師之拈提個事煆鍊學人真所謂轟雷掣電眼目動定難施鳥道魚蹤光影索摸莫及者矣而一片切切為人熱血讀其書猶將點點滴滴噴吐迸出噫若大師者復何間然行解圓融宗教攝合謂無滲漏善回互卓哉定評乎蓋無滲漏則正令全提善回互則不存軌則所云補偏救弊無有定執者儒與禪寧岐術哉余在護國親遭毒手惜乎辜負婆心今幸嘯雲大師處幾番寒熱流浪知歸始悟嘯大師之願力機權直與老人和玉乳透金針同口出氣而已洞山父子其遺風再振乎茲春重梓全稿成嘯大師之志余亦慫恿之故竟讀新編而齋祓為之序時己丑年孟秋日參學散人吳應芳敬題入就瑞白禪師語録目録卷首像序卷第一上堂二十九則卷第二上堂二十一則卷第三小參三十一則夜參二則卷第四茶話三十五則卷第五茶話二十一則示衆十四則卷第六問答機緣五十五則卷第七問答機緣三十一則垂問七則答幻輪法師十疑問卷第八頌古一百一十五則卷第九頌古一百三十六則卷第十法語十一篇法偈七十二首卷第十一歌十五首讚五十一首銘二首説七篇敘一篇疏三篇佛事十一則卷第十二詩偈一百一十五首卷第十三詩偈一百首卷第十四書復二十八篇卷第十五書復三十一篇卷第十六書復十一篇參請因緣七篇行腳一篇附來書十四篇卷第十七塔銘一篇傳一篇卷第十八行狀二篇跋一篇瑞白禪師像
