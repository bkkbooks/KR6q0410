body:
  text: 明住天台護國寺嗣法門人寂蘊編上堂唐孝廉祈遠居士請師烏鎮圓義庵上堂師升座云靈機未動十方剎海冷沉沉智境才彰覿面當陽明歷歷寸絲不挂何妨戒定慧以薰修不立一塵豈礙萬象森羅而依附孤迥迥穿過鐵壁銀山峭巍巍透徹金輪水際其大也包括虛空其細也纖毫無間坐斷千差路掃除凡聖名若能直下承當始信本來是佛遂豎拂云會麼蒼蒼辨嶽摩今古新新花柳醉遊人下座問答不録蔣夫人壽誕請上堂師升座云蕩蕩和風起寒塞之柳眼輝輝煦日發枯稿之花心蘭萼騁香機桃李舒豔質韶光彌而六合滿春色臨而宇宙新添一紀而萬紀同庚增一福而百福齊舉正恁麼時且道是何人分上事良久云十二朱門添吉慶三千玉閣靄祥雲下座問答不録長興孫夫人壽誕請上堂師升座云金籠放鵲願壽命之龜年畫像呈詩祝永齡于鶴算誦經禮懺宿業頓爾冰清供聖齊天福壽綿然滄海同虛空之不老等松柏以長青若能當下知歸方知定有餘慶會麼權將日月為天眼指出須彌作壽山今日長興孫夫人天命之年入山禮懺飯僧更請山僧說法以延福壽雖然須知福壽之根本始得遂豎拂云若向這裏會得則過去無量劫無量劫生日秪是這個今日生辰也秪是這個未來無量劫無量劫生日也秪是這個會麼如此會得須知更有向上一竅在作麼生是向上一竅良久云白雲淡蕩西風急刺破髑髏阿個知僧問諷經延壽即不問臥月眠雲時如何師云刺破你腦殼進云黃金殿上金鳳舞白玉階前玉雞鳴師云非汝境界僧拜師下座崇禎六年九月二十二日紹興府衆鄉紳胡冏卿璞菴陶少府石梁劉納言念臺董寶卿皇庭徐兵憲檀燕王制憲峨雲丁宮坊歐石邢天部淇瞻倪侍御三闌余殿撰武貞孝廉史汝諧凌二鉉及衆文學居士等自辨山請師於蕺山戒珠寺開堂師升座拈香云此一瓣香秉三皇之敕令行五帝之仁風四海尊崇萬邦仰望奉為今上皇帝聖壽萬歲萬歲萬萬歲又拈云此一瓣香稟忠孝以生成統三綱而和暢奉為現前大護法胡董劉徐陶王丁邢倪余等一班宰官洎居士檀越等伏願道德與聖德同修君命共至命齊布又拈云此一瓣香出自摩竭提國長在辨嶽峰頭三玄三要以薰修五位君臣而建立爇向爐中端伸供養顯聖堂上圓寂先師湛然澄大和尚用酬法乳之恩遂斂衣就座白槌竟師云若論第一義五目不能觀六通豈可及諸佛不到處難話祖師機實相本無名言論難開口直得心思淨盡萬行空餘一段靈光處處顯露明明不昧寂寂無私本自現成阿誰無分遂豎拂云會麼泥牛撞倒須彌頂木馬嘶乾四海雲西堂孤崖問云越地雙獅吼龍象盡交參威振大千句當陽請舉宣師云金花遍界新進云滿盤都托出誰是知恩者師云寶劍贈與烈士進云恁麼則恩歸有地師云阿誰無分進云今日人天交集會騰騰瑞氣滿精藍師云且喜天下太平堂禮拜僧問諸佛不到處難話祖師機祖師機即不問如何是諸佛不到處師云黑漆漆進云恁麼則越州石鼓驚天地引得泥牛就地來師云烏龜飛上天僧拜師下座上堂金烏乍起紫氣騰騰玉兔高懸寒光淡蕩蕺山亭上物色鮮明如來藏中境界殊勝直示臨濟三玄三要發明洞上五位正偏父子功齊君臣道合功位全彰則且置功位俱隱一句作麼生道良久云泥牛踏翻潭底月木馬嘶風透碧霄僧問三玄三要即不問五位君臣事若何師云爐中香裊裊進云如何是正中偏師云石女夜不眠進云如何是偏中正師云秋到樹頭赤進云如何是正中來師云泥牛上五台進云如何是兼中至師云黃葉頗相似進云如何是兼中到師云踏破波底月進云恁麼則父子功齊君臣道合師云閒言語僧拜又僧問獅王哮吼蕺峰前獅子增威異獸潛是甚麼時候師云日輪當午僧拂具云恁麼則露爪張牙去也師云看箭僧呵呵遂拜師云頭落也不知便下座上堂秦山卓爍鑑湖寥廓爐峰岋崿會稽咭咶昨夜一陳西風起滿山黃葉盡零落會麼須彌𨁝跳三千界磉礅花開百億春下座上堂生而無生千紅萬紫爭奇巧滅而不滅滿林黃葉盡消磨遂豎拂云且看山僧拂子還是生耶滅耶來耶去耶有耶無耶常耶斷耶會麼石女驚殘夢木人解唱歌今日是躍雲禪師四七之辰其徒自得設齊請山僧升座說法以此般若功德增崇品位莊嚴報上且道薦拔一句作麼生道良久云秦望青松古戒珠蕺花香僧問生不曾來死不曾去為甚麼又有生方之說師云黃花遍地開進云即今彌陀又在甚麼處師云七寶池中光燦爛僧合掌云恁麼聻師云未夢見在進云作甚麼便得高超去也師云秦望山頭雲僧拜又僧問彩雲生滅即不問即今立處請指示師云鑑湖波底月無形進云恁麼泥牛踏破峰頭月脫體全彰海底眠師曰浴鵝池上放光明進云幸到源頭清徹處漚生漚滅水無痕師云你不知去處在僧拜師下座上堂萬象森羅盡說法露柱燈籠常咭咶諸人何故不自知更用山僧來叨呾不叨呾爬下眠床穿著襪遂豎拂云文殊菩薩現普現色身三昧鑽入你諸人眼睛裏去也會麼良久云滿林黃葉地鋪錦朔風炭冷水成冰僧問金鎖玄關即不問慧鏡閣中是何人所居師云烏龜飛上天進云恁麼則不必猜疑去也師云阿誰無分僧作插香勢云還許學人恁麼相見否師云不許僧拂坐具云不恁麼去也師云放汝三十棒擊香臺下座上堂本來恆寂寂施為動作遍乾坤用處常空空見色聞聲沒半點沒半點處萬別同途遍乾坤時千差一致空中鳥跡水底魚蹤且道是甚麼人境界孤猿叫落三更月野鳥啼開四季花今日是星樓祝居士為薦令先君設齊請山僧升座說法以此功德追薦見泉處士莊嚴報境大衆且道見泉處士即今在甚麼處安身立命良久云蓬萊三島神仙住九品蓮臺佛祖行僧問世尊道迷悟生死了不可得即今見泉處士生耶死耶師云雲鎖長空日不見僧呈具云若於個中能領略朝生暮死不相關師云三十棒僧拜云謝師答話師下座上堂孤圓活潑人間天上盡該羅廓徹靈明十方三世總無隔四聖六凡等有青紅赤白無依心佛生從來一體儒釋道本自無差若向這裏承當直下現成受用遂豎拂云會麼良久云白雲常自來青嶂明月何曾離碧天僧問儒釋道無差為甚麼門庭各立師云黃葉飄飄進云大有人不肯師又作麼生方便師云朔風自凜凜進云恁麼則一輪杲日無違背團團水月影難分便拜師曰正好著力又僧問長空雲散現杲日大海波澄露錦鱗正當恁麼時如何師云凍斷五雲溪進云便恁麼去又作麼生師云三江潮頭息進云還有向上事也無師云有進云如何是向上事師云蕺山亭𨁝跳僧拜師下座上堂豎拂云聞聲悟道見色明心蕺山亭𨁝跳上三十三天撞破天王腦殼東海龍王鮮血迸流天下覓醫人將閻羅王腳跟一艾爝大唐天子通身慶快會麼今日是俞居士同令堂及衆夫人設齊請山僧升座說法為大衆結般若緣且道如何是般若良久云黃牛頭上兩個角草鞋肚裏四條斤僧問千尺寒松秀金鸞石鳳啼是何意旨師云石傘峰頭傳消息進云是阿誰的境界師云五雲溪畔長冰花僧拜師下座上堂飄零黃葉傳古佛之家風游衍行雲顯當人之面目稽山寂寂西來大意全彰爐嶽巍巍列祖真機獨露戒珠閃爍慧鏡常明一道神光貫徹今古會麼覓火和煙得擔泉帶月歸今日是邢吉先居士設齊為山僧慶誕請升座說法為大衆結般若緣即此以祈居士智門了辦道果圓成大衆且道圓成一句作麼生舉揚良久云轉功就位琴堂冷退位朝君古殿寒便下座解制上堂把住也結定布袋口封住拄杖頭鐵壁銀山鳥不飛度直至三江浪息大地波沉放行也陽和氣轉遍界春回直得枯木生花冰河發焰正當恁麼時還放行好把住好良久云且隨老木同寒瘠將逐春風入燒瘢莫有逞驢唇馬嘴者出來吃棒僧問把住放行即不問當體無依事若何師云今朝臘月八僧拂袖云恁麼無掛礙隨處逞風流師云三十棒進云凍雲飛盡孤輪迥徹底無私遍界輝師豎拂云跳不出這一重僧喝禮拜師呵呵大笑下座上堂湖城錢夫人設齊請師升座云三春已過韶華老李白桃紅何處討菜花滿地黃如金燕子梁間指示人遂豎拂云會麼於此會得頭頭釋迦出世於此不會步步彌勒下生良久云鳥啼花發笑雲興宇宙清今日是湖城錢開府老夫人及衆比丘尼送法衣上山設齊修福延生請山僧升座為衆結般若緣且道般若一句如何舉揚夏初日漸暖行人盡解襟後堂素朴問高提祖印最上一乘弘範毗尼一乘最上今日和尚二法並談施主功德還有邊際也無師云辨石播苔痕進云青龍峰頂獅子吼百千群品證無生便禮拜師云非為分外遂下座上堂崇禎甲戌年十月望日龍華結制唐孝廉祈遠居士請師升座拈香畢乃云世尊初成道日云奇哉衆生皆具如來智慧德相儒書亦云在明明德康誥曰克明德太甲曰顧諟天之明命昨夜青龍岡起舞花石澗𨁝跳驚得獅子巖向象王峰鼻孔裏藏身直得彌勒峰呵呵大笑且道笑個甚麼他道皆自明也皆自明也會麼晝午月明皎夜半日輪紅山僧一向有病佛法付在首座杜絶人事以盡殘喘清晨內外大衆誠心跪請故不得已乃升此座遂豎拂云若向這裏會得則現現成成個個具足其或未然可將個本參話頭頓在目前念茲在茲如雞抱卵如貓捕鼠打成一片情境俱亡見色時不知色聞聲時不知聲忽爾觸著㘞地一聲始知成佛其來舊矣更有末後句舉似大衆一月印千江千江同一月於斯會得時烏龜喚作鱉西堂離言問云不問洞上舊家風請指龍華新氣象師云寶珠池內水長流進云秪如凍雲彌布日月潛輝又作麼生師云家家圍爐添白炭進云恁麼則泥牛耕破龍岡脈桃花依舊笑春風師云未是龍華氣象在堂一喝師云今日不打你堂禮拜歸位僧問升堂即不問捲席意旨如何師揮一拂進云朔風吹黃葉明月下太湖師云非汝境界僧禮拜師拈拂下座上堂解制嚴充涵唐祈遠嚴渟之沈仁叔丁子敬丁逸群姚聖錫王禹南朱心印李明吾暨衆居士等請師升座師豎拂云會麼一向把住今日放行其把住也山河失色截斷衆流波瀾不生魚龍潛躍黑漆漆無聲無臭六戶不通風其放行也幽蘭現瑞百草排芽柳眼重新乾坤增彩明晃晃在前在後宇宙咸光輝秪如放行把住二俱不涉諸公作麼生商量良久云石女慣吹無孔笛木人善弄沒絲絃今日一期圓滿莫有悟明自心者出來與汝證據僧問來去主賓即不問五位功勳事若何師云木人慣弄無孔笛進云如何是向師云且莫妄想進云如何是奉師云秪要歸家進云如何是功師云鋤天掘地進云如何是共功師云木人舞袖歸來晚進云如何是功功師云石女謳歌罷戲場進云不涉功勳句子再乞垂慈師一喝僧禮拜云古風來鷲嶺今日始重光師云閒言語又僧問正當解制即不問放下一句事如何師云橫肩拄杖進云虛空昨夜傳消息驚動垂楊兩岸搖師云切莫東逴西逴僧禮拜又僧問滴水滴凍即不問大地回春事若何師云處處山花粧得巧進云恁麼則蕩蕩東風若管絃驚醒多人開夢眼師云十字街頭一任東逴西逴僧禮拜師下座崇禎八年乙亥八月師從天台回龍華孟冬望日結制請上堂師登座拈香畢乃云經之綸禪和邀同衆上座請病朽升堂舉揚這一個豎拂云會麼覿面無向背當處絶遮攔無向背處嚴密不通風絶遮攔時行藏難著眼為萬物之本作生佛之基三際凝然十方不隔要用便用棒喝交馳明妙旨要歇便歇寂然無語顯單傳正偏兼帶則且置秪如不涉離微一句作麼生舉良久云象騎鐵馬行宇宙烏龜騎鶴上崑崙首座歷然舉坐具云這個是無向背底如何是絶遮攔句師云寒風颼颼進云是甚麼人境界師云無鼻孔長老進云不涉離微請師再舉師云三冬無暖氣進云恁麼則九夏雪花飛師云未是時節在座禮拜歸衆知客問云人天交集選佛場開覿面相呈請師的的師云辨山𨁝跳進云久知個裏無多子竿木隨身任縱橫師云花石澗邊行藏好進云不是特來陳舊話秪因舉起又重新師云再犯不容進云莫將鶴唳喚作鶯啼師云錯客禮拜又僧問結卻布袋口封住拄杖頭正當甚麼時候師云冰厚三尺進云還許傍通一線麼師云不許進云與麼則即今結制去也師云相逄莫出手僧禮拜又僧問云大開爐鞴鑄聖鎔凡即今凡聖交參請師妙手師云個個鼻孔遼天人人腳跟點地進云倘遇無面目漢和尚又作麼生款待師云三十棒僧拜師拈拂下座祈遠唐居士薦妹請上堂師升座云西風乍起千林落葉盡歸根玉露才臨萬派清流回源早既爾轉功就位全在得力兒孫若乃借位明功須知父祖不出父慈子孝嚴嚴密室不通風君敬臣忠巍巍寶殿排班早直須正偏不立手足情忘一道虛明觸途宛爾會麼今是金門唐氏法名大貞頓捨塵勞頃趨寶所棄娑婆如涕唾取極樂如上乘親覲彌陀記授蓮品茲今五七之辰乃兄祈遠居士入山飯僧請山野升座說法薦拔唐氏大貞增崇福智大衆且道作麼生是薦拔一句良久云寒潭月落泥牛吼大野雲乾木馬嘶僧問大圓鏡中本無來去即今亡者向甚麼處安身立命師云秋色沉沉僧禮拜云出沒終不離乾坤師云寒光蕩蕩便下座季玉嚴居士同令堂太夫人請上堂師登座云子湖狗子飲盡趙州茶南泉貓兒喫卻乾屎橛嘉州大象恨不伸陝府鐵牛淚成血木馬嘶風秋色老石虎頻吞波底月報君知得不得居士今能知時節嚴太夫人亦歡悅大衆且道如何是那一節良久云象王鼻頭長波斯面孔黑季玉居士出問古云我若一向舉揚宗乘則法堂前草深一丈未審今日辨山草深多少師云三長兩短士轉身顧視一拜師云恁麼則露裸裸地進云草枯鷹眼疾師云只恐不知春進云和尚快下座師云秋色滿庭進云雪盡馬蹄輕師拂拂顧衆下座雲門先和尚九周年上堂師升座云先師自丙寅年臘月初四日去世遂屈指云丁卯年臘月一周年戊辰巳巳庚午辛未壬申癸酉甲戌乙亥卻有九周年也雖去世九年元不曾離今日雖不離今日卻又去世九周年且作麼生話會若也未會病朽為汝舉揚正偏五位以報先師恩德遂喝一喝云病朽未出法堂元無此一喝既登此座方有此一喝是正中偏也即此一喝當處寂然是偏中正也即此一喝不帶名言是正中來也今對諸人有此一喝你等諸人因此一喝得知本有是兼中至也我此一喝聖凡情盡能所兩忘妙盡有無是兼中到也以濟宗論之正中偏奪人也遍中正奪境也正中來人境俱奪也兼中至人境俱不奪也兼中到即玄要妙旨也以雲門宗論之即此一喝應彼來機謂之函蓋相應句即此一喝凡聖掃除絶彼知解謂之截斷衆流句即此一喝問事答事問理答理謂之隨波逐浪句以溈仰宗論之即此一喝直顯大月輪三昧謂之圓相即此一喝示向上一機謂之暗機即此一喝元從自心流出謂之意語即此一喝見者聞者默默知歸謂之默謂即此一喝無量妙義一時收盡謂之義海即此一喝四十二字母及世間文字無不統攝謂之字海以法眼宗論之即此一喝直示一真法界謂之總即此一喝有照有用有收有放有賞有罰謂之別雖縱奪賞罰之別總歸一心謂之同雖同一心縱不是奪賞不是罰謂之異雖賞罰收放之異咸成一個自己謂之成雖成一體不妨殺活縱奪各住本位謂之壞非惟一喝如然至于一棒一拂一句一字乃至揚眉瞬目折旋俯仰莫不皆然諸方野狐禪以達磨對梁王實無功德一語謂之濟宗以人天小杲一語謂之洞宗又有一等以棒喝謂應酬虛套盡屬支離邪解故病朽發明此旨勿使後學蹈於邪坑復喝一喝云且道此一喝是正耶偏耶人耶境耶三句耶圓相耶六義耶若簡點得出則參學事畢其或未然可到先師座前觸禮三拜先師為汝說破首座出問和尚未出方丈先雲門及五家宗旨宛然至于升堂就座也是畫蛇添足未審和尚以為何如師云猿抱子歸青嶂後鳥銜花過碧巖前進云與麼則十方原不隔今古一毫端師云峰巒挺秀鶴不停機進云有意氣時添意氣得風流處且風流師云未許話會在座禮拜歸位僧問長空日落峰含翠老樹雲凝塔影閒正當恁麼時雲門和尚還應供否師云冰河焰焰進云與麼則銀浪湧山頭師云雪花片片進云一自優曇開越嶺至今清味徹苕溪師云切莫妄生節目僧禮拜僧問五家門庭蒙師指雲門大師面目在甚麼處師云描不成畫不就進云南北山頭雲寶珠池內月又作麼生師云還許話會麼僧禮拜云謝師答話師云未許話會在便下座解制祈遠唐居士設齊請上堂師登座云巍巍煦日添心色蕩蕩和風起見塵如此句中玄會了依然墮在冷冰冰直須恁麼中不恁麼不恁麼中卻恁麼恁麼中不恁麼解制何妨結制不恁麼中卻恁麼把住豈礙放行正是太陽門下日日三秋明月堂前時時九夏秪如功位俱隱一句作麼生道良久云鐵馬空中吞皓月泥牛生得一雙寅僧問三月安居徒自縛請師為衆施寥廓師云拄杖橫挑撥亂雲進云縱橫一任天涯外闤闠山林色色新師云眠牛嶺下且安身進云瀑落聲沉鳥雲飛勢斷峰師云遊人獨自逞風流進云風流久操胡笳調今日龍華值子期師云且莫草草僧禮拜又僧問一鑑無私輝宇宙晴空萬古絶瑕痕正當與麼時是解耶結耶師云桃紅柳緑進云恁麼則一衆霑恩有地師云橫擔拄杖僧拂坐具云便獨步去也師云草履破雲行又僧問把定重關即不問放開一線意何如師云緊峭草鞋一任𨁝跳進云秪如風行草偃水到渠成又作麼生師云衲僧躋躋登堂後檀越巍巍送供來進云與麼則雲移出谷渾無礙月臨滄海任縱橫師便打僧拜師下座唐祈遠居士至室中問如何是參禪得力處師云頭頭上了曰如何是參禪險難處師云切莫妄思量曰如何是參禪受用處師云全體絶遮攔曰起滅不停時如何師云不是別人家裏物曰熟處難忘時如何師云好個消息曰風恬浪靜時如何師云全家安樂曰鐵壁銀山時如何師云莫向這裏躲根曰一念無私時如何師云正好喫棒士禮拜而退崇禎十年丁丑四月八日江西南雲山慧燈寺說戒上堂師云南徑荒涼特為舉揚慧燈焰焰祖印重光大明春色至萬物盡芬芳南雲遍覆娑婆界一片風光滿上岡於此會得釋迦降生皆覿面於此不會依舊薰風度短墻會麼如或未知且聽受戒
