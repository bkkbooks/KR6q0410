body:
  text: 明住天台護國寺嗣法門人寂蘊編小參住雲門小參師舉證道歌云心是根法是塵兩種猶如鏡上痕痕垢盡時光始現心法雙忘性即真大小永嘉秪道得一半雲門即不然心是根法是塵兩種猶如車兩輪兩輪未轉車無用兩輪轉處示車身且道與永嘉相去多少莫有與他出氣者麼出來與山僧相見僧問寶鏡當臺為甚麼胡漢不現師云賊身露也僧禮拜師便打小參舉起茶鍾云今朝七月三十日地藏菩薩降生向山僧茶甌裏洗浴諸人還見麼若如此見得衆生度盡方證菩提於此不見地獄不空誓不成佛若有通方作者出來相見時有僧出問云如何是雲門主人師云林中整日歡進云如何是雲門家風師云淡飯憑君喫進云客來以何款待師云黃虀任意餐僧禮拜師回方丈小參欲知佛性義當觀時節因緣時節若至其理自彰靈雲見桃花是時節因緣香嚴擊竹是時節因緣玄沙𡎺指是時節因緣乃至世尊夜睹明星皆是時節因緣秪於諸兄弟清晨下床著衣喫飯屙屎放尿迎賓待客燒香掃地莫不皆是時節因緣且道作麼生是自彰的理還會麼朔風徹骨人皆委霜花滿地阿誰知僧問如何是雲門境師云翠竹搖風聲颯颯進云如何是境中人師云整日無事做閒步竹林中進云還有向上事也無師云有進云如何是向上事師云踢斷五雲溪僧禮拜小參方才過元旦不覺三十日梅蕊已飄空堤柳含煙緑林遠和風輕山深寒氣毒覿面已相呈薦取那一著大衆且道如何是那一著會麼緑竹無向背青松絶往還便歸方丈小參春風蕩蕩春雨霏霏泥濘路滑行人濕衣就裏暗通消息那個男兒知歸且道通個甚麼消息會麼順風過若耶隨流落鑑湖小參三尺冰河連底凍數竿枯樹盡銀花太陽一出峰頭外清潭依舊走魚蝦見色明心雖好事撒瞎時人幾眼沙莫有清淨寶目不受翳障者麼出來高鑒看時有僧出云獅兒獨吼雲門裏杳象群藏北斗中師作嗄嗄聲僧拂袖云嶺外彰爪牙去也師云這野狐精又僧問富翁錦上重添錦即不問孤鴈寒江事若何師云千江有水千江月進云凍灘獨立遲春信為甚不見東風弄柳堤師云寒氣太重僧云何時得一聲嘹喨斜陽外帶得平安書信歸師云一枝梅蕊傳消息萬里山河享太平僧禮拜師回方丈小參越州一朵梅爐峰東畔西有人玄會得緑竹放紅絲會麼會即便會不許節外生枝若要節外生枝打折你驢腰莫言不道有僧問如何是威音那畔事師云石傘峰𨁝跳進云恁麼則離家轉卻雲山外師云伶俜漢進云過在甚麼處師打云教你不要節外生枝僧禮拜師回方丈住延慶小參一段真風本現成當人何必苦追尋森羅萬象舒光彩隨緣用處即天真衆兄弟做工夫不可驅昏敵散不可斷妄求真不可高標聖境不可希圖悟門不可沉空滯寂不可流浪前塵不可舉處承當不可即念即真不可撥波求水不可妄認身形若能如是行去正所謂當處即天真佛也雖然須知更有向上一竅在且道如何是向上竅良久云杲日無私照任運過西峰僧問桃花三月茂梅蕊雪中香提起坐具云未審此枝花屬何境界師云冰河三尺浪進云葉落枝枯後又如何師云泥牛雪裏眠僧禮拜師回方丈小參虛寂寂明歷歷舉步莫疑動用不悉遍滿乾坤時人不識釋迦兩腳舒達磨惟面璧彌勒呵呵笑休更生疑惑大衆作麼生是不疑惑的事颼颼林上葉飄飄舞太虛僧問水窮山盡向甚麼處著腳師云坐看雲起時進云虛空粉碎如何下手師云泥牛吼水面進云空懸爍爍一龕燈師便打僧禮拜小參一個話頭明歷歷內不出兮外不入忽然驀地爆一聲方始徹皮又徹骨大衆徹皮徹骨即不問作麼生是爆底事還會麼疏疏翠竹通身冷皎皎澄潭徹底寒小參朔風凜凜逼人寒大地霜花添瑞色滿目文殊是對談休向南方尋知識南方知識即不問作麼生是對談底事良久云翠竹枝頭冰葉重烏鴉體上冷毛輕僧問古云直饒學到佛邊事猶是錯用心畢竟如何始得相應師云鞋薄腳底冷進云上無佛道可成下無衆生可度為甚麼又道個超凡入聖了生脫死師云衣短肋下寒僧禮拜又僧問即心即佛則不問非心非佛是如何師云翠竹濃霜重進云恁麼則脫體無依迥然獨露師云水中已生骨進云向上還有事也無師云來年二三月僧禮拜小參百歲光陰一夢周幾番歡喜幾番愁一聲雞唱惺惺也苦樂盈懷秪自休人生在世總是一夢而已或夢做輪王統御四天下或夢入山林修無上佛道或夢轉法輪度無量衆生或夢做菩薩行六度萬行或夢修十善而報生三天受享快樂或夢造十惡墮於三塗忍無量苦忽然一覺如大夢醒始知從前所作所為了不可得知醒時人說夢中事心縱精明欲何因緣取夢中物直得默休而已莫有百花林裏過一葉不沾身者麼出來與雪上座相見時有僧出問一切有為法如夢幻泡影如何是非幻一句師云石女唱山歌僧禮拜小參年新月新日又新和風吹破碧潭冰殷勤報與諸禪者烏龜騎鶴上崑崙烏龜騎鶴即不問且道作麼生是新年底事良久云陽和布德澤桃李又重新便歸方丈小參一碗無油燈歷歷甚分明晝夜無私照達者暗裏驚照即不問作麼生是燈遂豎拂云徹地通天光燦爛老少盈懷任意觀住龍華小參師登座云開疆展土彌勒樓現於當處伐木誅茅普光殿建於目前宇宙高人出出入入乾坤道者往往來來性海悟於剎那行門成于頃爾星霞散彩日月舒光正恁麼時成家樂業一句作麼生道良久云四海衲僧明正化十方檀越助無為僧問新年佛法則不問莖草現瓊樓是何人境界師云一枝梅蕊傳消息進云丈室現三萬二千獅子座還是神通妙用還是法爾如然師云處處陽和大地春進云我佛成道長者施園獲何功德師云遍界不曾藏僧禮拜云辨山騰瑞氣霄漢産祥光師云莫眼花又僧問上香呈般若點燭布禪機秪如未上香時般若在甚麼處師云雨打階前濕進云般若已蒙師指示新年佛法事如何師云爆竹一聲除臘去梅花幾點送春來進云恁麼則道場建處祥雲集佛法興時秀水朝師云也不為分外僧禮拜小參玄鳥來翼蒼庚初鳴桃花結蕊雷霆發聲西來大意全彰祖師巴鼻獨露正恁麼時截斷衆流即不問隨波逐浪一句作麼生道柳眼乍開風日暖山河無處不新機有僧出問九九八十一犁耙一齊出是甚麼消息師云老筍抽芽進云梅花飛片玉桃蕊吐紅霞仗甚麼人恩力師云太湖波底月辨山崖畔春禮拜小參一向恁麼一花一彌勒一葉一釋迦頭頭顯妙處處呈奇一向不恁麼削跡吞聲壁立萬仞孤迥迥峭巍巍三世諸佛無開口處歷代祖師無措足處且道二俱不涉作麼生商量會麼無陰陽地草常秀花發寒崖不帶春僧問今朝二月望桃李花未放如何是萬紫千紅境界師云今日是花朝進云花在那裏師云東山西嶺一枝紅僧禮拜小參兩輪日月快如梭蕩蕩薰風度薜蘿滿目清涼可人意試問諸公會也麼須領略莫蹉跎覿面當機如不薦去問龍華阿逸多莫有高揖釋迦不拜彌勒者麼出來相見時有僧出禮拜問曰善財童子登妙高峰頂為甚不見德雲師云綿密不通風進云為甚別峰又相見師云傍通一線僧禮拜有居士問云特到龍華求佛法殷勤秪見撒明珠明珠即不問如何是佛法師云今朝又起風進云起後如何師便打士禮拜小參一向恁麼秪是入廛垂手隨波逐浪殺活縱奪收放自如一向不恁麼壁立萬仞截奪衆流魔佛不通聖凡絶跡其或恁麼中不恁麼不恁麼中卻恁麼冰河發焰枯木生花石女吹簫木人演武秪如恁麼也沒交涉不恁麼也沒交涉恁麼不恁麼總沒交涉且作麼生良久云大海不容明月照禪室豈留半夜燈僧問如何是恁麼一句師云清流落太湖進云如何是不恁麼一句師云辨山絶消息進云如何是恁麼中不恁麼師云辨山峰頂雲太湖波底月進云如何是不恁麼中卻恁麼師云太湖波底月辨山峰頂雲僧禮拜小參因中明果德果後施因行因行一齊彰聖凡無二道既無二道則知未離兜率已降皇宮未出母胎度人已竟如是則知亙古亙今秪是一念無凡聖無得失無是非無生佛無有無塵塵爾剎剎爾處處緑楊堪繫馬頭頭顯物物露著著全是祖師機於此會得總是建化門頭邊事須知更有向上一著子在良久云木人才撫掌石女笑呵呵僧問寒山雪覆烏藤樹枯木逢春花再開是如何師云九夏雪花飛進云等間識得東風面萬紫千紅總是春師云秪明今日事昧卻本來人進云撒手懸崖下分身遍剎塵師云且喜沒交涉僧禮拜云瞞人不少住白雀小參師舉船子偈云三十年來江上游水清魚現不吞鉤釣竿斫盡南山竹不計工程得便休大小般子雖是落草求人大煞勞嚷生辨山即不然數十年來山上游草深林聚獸鳥稠等閒撒個漫天網也有金毛也有狐只如野狐堪作何用尋常翻個筋斗子惹得傍觀笑欣欣野狐且置莫有金毛獅子麼出來抖擻爪牙看時有僧出以坐具覆頭云和尚會麼師云野狐精僧禮拜云又被風吹別調中師云總沒交涉便回方丈小參頂門正眼要在作者知歸肘後靈符須憑英雄提掇殺活縱奪珠走盤而盤走珠人境交加位轉機而機轉位圓陀陀體用一如赤灑灑逆順自在且道是何人境界舉雪峰在德山作飯頭師云倚門傍戶漢一日飯遲德山托鉢向齊堂師云雖然正令全提也是憐兒不覺醜峰云這老漢板未鳴托鉢向甚麼處去師云不妨拶著德山低頭歸方丈師云可惜放過雪峰舉似巖頭師云辜負己靈頭云這老漢未會末後句在師云東家死人西家助哀山聞令侍者喚巖頭至云汝不肯老僧那師云陷虎之機頭遂密啓其意師云巖頭道甚麼一條拄杖兩人扶山至來日上堂果比尋常不同師云雖然將錯就錯誰不識汝狼心虎膽頭至法堂撫掌大笑云且喜老漢會末後句也雖然後來只得三年活師云這裏有些子淆訛莫是徒弟授記師父麼且喜沒交涉莫是神通知道麼且喜沒交涉莫是如蟲禦木麼且得沒交涉既不如是畢竟作麼生良久云霜花和石冷青松帶月寒小參一段真光覿面來何須特地強安排神通變現無蹤影秪在當人眼自開以拂子打圓相云此是真光作麼生是眼開底事將拂子放開云此是眼開的事作麼生是真光會麼山僧拂子是指月山僧語言是話月作麼生是真月若會得真月時無有聖凡大小得失是非無有祖師機關亦無衲僧巴鼻亦無正偏五位亦無三要三玄亦無照用人境亦無三種滲漏還會麼塢內霜花滿六合凍雲輕住龍華小參李祖虞居士請小參師云業逐殘冬去福同春日來欲知個中意泥牛上五台會麼今日是祖虞居士為薦孫氏孺人請山僧小參以此般若功德資助孫氏往生極樂古云因緣和合虛妄有生因緣別離虛妄名滅虛妄有生生即無生虛妄名滅滅即無滅既無生滅即無來去無彼此無生滅則十世古今始終不離於當念無彼此則無邊剎海自他不隔於毫端遂豎拂云會麼殷勤為解丁香結指出蓮花胎裏人僧問雲去雲來天本淨蓮花托化事如何師云七寶池中香馥馥進云孝子忘卻思親念吾師棒下長靈根師云親見彌陀別樣春僧禮拜師歸方丈元旦小參師登座豎拂云昨夜彌勒世尊降跡龍華放玉毫相光令諸世界合成一界令森羅萬象草木叢林明暗色空諸色合成一色令四生六道地水火風諸相合成一相令四聖六凡若大若小若男若女若僧若俗一切無明妄想智慧愚癡煩惱顛倒生住異滅一切心數之念合成一念令過去未來現在三世諸時合成一時新舊不別聖凡一體正恁麼時且道作麼生商量良久云辨山古澗波中石花柳枝枝不帶春有僧出問今朝第一日師登第一座如何是第一句佛法師云雪覆青山峰不露進云恁麼則空裏銀石舞無根樹生花師云沒卻汝頭僧禮拜師回方丈小參三世諸佛以一大事因緣故出現於世歷代祖師亦以一大事因緣故出現於世天下老和尚莫不以一大事因緣故出現於世所謂開示悟入佛知見也世尊拈花皆是開示迦葉微笑是悟入也馬祖一喝是開示使百丈悟入也黃檗三頓痛棒是開示使臨濟悟入也香嚴擊竹靈雲見桃花是悟入也方才孟夏時節榴花現瑞梔子呈祥玄符未挂魔王膽落菖蒲劍立平寰宇金蓮拳打破虛空正恁麼時莫有悟入者麼出來呈似看如無再過二三日畫橈舞碧波僧問四月間人少農家盡插秧覿面當陽旨請師為舉揚師云山高水低進云當陽一句蒙師指向上宗乘又若何師云明月挂松稍進云恁麼則彌勒峰頭拍手笑青龍岡上浪滔天師云浸殺你僧禮拜師歸方丈壬申冬結制小參幾片白雲露當人之面目一輪杲日顯佛祖之真機更兼滿地霜花況乃遍空冰冽如此會得歸家穩坐如此不會伶俜辛苦會麼良久云木人唱曲渾閒事石女吹簫始是奇今日辨山結制之辰山僧久病向不升座大總憲唐老居士具香儀命祈遠居士入山同長興衆居士啓請為衆說法山僧久病無法可說有一則古語舉似大衆遂豎拂云會麼古云萬象之中獨露身這個是象如何是身復搖拂云這個是身如何是象如此會得辨山頂上七縱八橫如此不會老僧歸方丈去也便打元旦小參黃道啓文明處處門符迎新歲陽和布德澤家家爆竹振堯年冰花解而煦日威柳眼開而和風力蘭花挺秀梅蕊含香寒巖枯木心回嶺頭稿草芽發森羅添吉慶宇宙湧祥光正是轉位就功時節秪如君臣道合父子如如作麼話會良久云彈琴石女音聲美鼓瑟木人韻調高僧問黃道文明啓何人得所繇師云全賴東君力處處強出頭進云恁麼則學人相見去也師云覿面相呈事作麼生僧便喝師云未在僧禮拜又僧問東君昨夜傳消息報道今年煦日新如何是新的句師云百草頭邊楊柳青進云一毫端上呈春色萬紫千紅遍界輝師云還有春寒四十五進云新句已蒙師指示向上宗乘又若何師便喝僧禮拜師回方丈上元小參今朝正是十五處處喧天鑼鼓報道上元佳節遍地燈毬亂舉文殊大顯神通諸人切莫莽鹵若還逴得些兒當處超佛越祖作麼生是超佛越祖底事柳眼乍開風細細蘭香初起日融融辨山三月安居冬期已過今朝正是正月十五日雖不解制一任東走西走雖然放行不曾動著半步如此會得太陽門下日日三秋如此不會不妨明月堂前時時九夏會麼山頭翻白浪海底火正紅僧問把定重關經九旬驀然打破事如何師云今日是元宵進云恁麼則展翅沖霄去也師云金翅鳥王當空進云縱橫奔出乾坤外翻身踢破太虛空師云早被他拿下了僧一喝禮拜而退師云蝦跳不出斗又僧問百日期限今已滿歸家底事是如何師云黑漆漆進云歸家後如何安養師云整理意氣新進云正當元宵節屆和尚又作麼生慶賞師云燈花燦爛進云堂前瑞草傳消息引得男兒滿面春師云三十棒僧禮拜師歸方丈住蕺山小參觸著磕著無非本地風光左之右之全彰自己面目拈起則該括森羅萬象放下則迥脫虛寂孤明即如不拈不放如何為人良久云朔風大地寒煦日花枝放今進堂將一月了莫有工夫透脫者出來通個消息僧問拖泥帶水忘物我大方獨步任騰騰時如何師云旭日照窗前進云恁麼則踏破千江月獨露戒珠光師云又有一重在僧禮拜云耀古騰今輝宇宙衝開碧落任縱橫師云看取腳下又僧問虎頭帶角出荒草未審以何為食師云吞卻你也不識僧拂坐具云橫衝直撞去也師云粉骨碎身僧一喝師打一棒便回方丈小參陽焰翻波五十年空裏栽花顛倒顛時人添得眼中翳妄為山僧慶誕緣須領略莫遲延擬議鷂子過碧天豎拂云大衆且道山僧年紀畢竟是多少良久云秦望山頭翻白浪鑑湖波底剔銀燈汝等諸人一期將過已過關者不在此限若未過關者古人云若究理坐看一七若不悟明截取老僧頭去今尚有二七日在再加精進再加勇猛策勵身心忽然一念相應心華發明照十方剎始不辜負結制參禪也其或未然話盡山雲海月情依然不會還飛去珍重夜參住雲門夜參一葉扁舟浪裏顛絲綸拋去看浮錢鉤頭忽爾金鱗現不負漁翁冒晚煙遂以拂子作擲鉤勢云雪上座今夜拋鉤擲釣莫有負命底鯤鯨麼出來吞啖看時有僧出禮拜師云元來是個蝦蟆僧問如何是佛法師一喝僧無語師云果然是個死蝦蟆便打住龍華夜參舉三祖云有即是無無即是有又云一即一切一切即一但能如是何慮不畢大小祖師口門窄說到這裏伎倆已盡雪上座即不然昨夜磉礅開花露柱發笑燈籠𨁝跳上三十三天觸著帝釋鼻孔多聞天王惡發將須彌山王一摑直得東海龍王頭疼三日會麼若會得出來通個消息其或不然明日登壇受戒與諸人說破
