body:
  text: 明住天台護國寺嗣法門人寂蘊編茶話住雲門結制普茶師云今朝九月九個個咸知有芙蓉開口笑黃花盡稽首石女舂餈糕木人捧盤走愛喫趙州茶不飲曹山酒且道如何是趙州茶滿酌淺斟皆具足何須山野再來傾僧問如何是結制師云歸單去進云如何是解制師云今日不向你道進云如何是不結不解的意師云汝非其人進云還有向上事也無師云無僧云為甚麼無師云雲門結制僧禮拜茶話選佛場中明聖智紅爐鞴裏煆真金妄昏從此無逃避管取凡心即祖心衆兄弟各人將從前所有貪嗔癡愛無明煩惱禪道佛法昏沉妄想聖情凡見真如佛性菩提涅槃一收收來放在大爐鞴中然後架起智慧火一燒燒教無有起處無有滅處無有來處無有去處無有聖凡魔佛邪正是非淨穢好惡到與麼時豈不是凡心即祖心耶雖然如是若是祖師向上一竅未夢見在且道如何是祖師向上竅良久云日來石傘峰頭白水出昌源波浪清茶話一個話頭牢把持綿綿密密莫尋思努力今生了卻去休待當來彌勒時衆兄弟三七排遣已畢明日四七坐香起頭三七日中所做工夫相應麼話頭純熟麼妄想平貼麼昏沉輕清麼可通個消息來若全無得力可再發大志精進中更加精進勇猛中更加勇猛將一個話頭一扣扣住如無始以來冤家相遇一般與他一滾滾作一團內不放出外不放入茶裏飯裏眼裏夢裏行住坐臥裏不可絲毫放捨直得東西不辨南北不分觸境逢緣㘞地一聲始知成佛其來舊矣還識舊時佛麼金風飄落盡古幹赤條條僧問一葉不留時如何師云古幹赤條條僧禮拜師便打茶話一迷大覺性六道受沉淪妄想能消滅當處即天真所以世尊初成正覺之時嘆曰奇哉衆生皆具如來智慧德相良繇妄想執著而不證得誠哉斯言衆生執有是妄想人天執十善因果是妄想聲聞執偏空是妄想緣覺觀生滅因緣而證果是妄想事度菩薩執六度萬行是妄想大乘菩薩去二邊存中道是妄想乃至等妙有微細所知亦是妄想即今堂中高標聖境希圖妙悟是妄想或妄認識神者或撥波求水者或沉空滯寂者或遏捺妄心者總不出妄想若是丈夫漢一念看破一齊放下當處是一尊天真佛也三祖云虛明目照不勞心力非思量處識情難測到此地位權且引汝入門要汝知有若是祖師門下正好買草鞋行腳正好來山僧手裏喫棒何故須知有向上一著子在且道如何是向上一著子良久云湛水無龍隱枯木有花開僧問如何是向上一竅師云向下會取僧云還許學人知也無師云不許僧云為甚麼不許師云為你不通向上竅僧禮拜師云果然又僧問瑞花今已現瑞果幾時紅師云三冬日色冷如冰進云還許學人偏衆去也無師云不許進云為甚不許師云秪為人人有分進云花果已蒙師指示請師再露瑞根看師云一枝雪裏弄馨香僧禮拜又僧問正恁麼時全身獨露正體堂堂獨露一句即不問正體堂堂事若何師云玉燭搖紅影進云轉身後一句又如何師云石傘笑吟吟僧禮拜為了幻知賓住護珠庵茶話赤水有玄珠人人須探覓離婁不可求罔象偏能得欲識護珠人問取幻禪客大衆護且不問作麼生是珠良久云鑑湖多媚色長瀆有光生僧問如何是禪師云禪問如何是道師云道問如何是父母未生前師云風生壁下寒僧以手作插香勢云還許學人恁麼會否師云不許進云零霞落野田師云莫被聲色轉僧禮拜師云又恁麼那茶話古云一入門來先須知有知有者始可奉重作麼生是奉重底事莫是臣奉於君子順於父麼且喜沒交涉既不如是畢竟作麼生良久云相逢盡道休官好林下何曾見一人汝等衆人進堂已五十日了在禪堂中挨磨經行團團轉轉七尺單前上上落落事作麼生秪如二六時中三餐茶飯豆腐麵斤青菜蘿蔔廢了常住多少油醬青菜豆腐即不問你各人向蘿蔔頭上道取一句來若道得皇恩佛恩檀越之恩一時酬畢若道不得他日見閻羅老子喫鐵棒有日在莫言不道時有僧問古人云不可以有心求不可以無心會不可以語言造不可以寂默通除此四路和尚如何接人師云鐵牛不怕獅子吼進云恁麼則石傘峰前演摩訶師云如何是摩訶僧一喝師便打僧禮拜茶話緊著程途再著鞭草鞋更用把繩添行到水窮山盡處大家齊和太平年而今衆兄弟做工夫必須要透頂透底徹頭徹尾徹將去方好不可半途而廢如人行路相似但有路可上更高人也行直行到水窮山盡再跨一步方有少分相應亦如將軍上陳一般雖然捉其先鋒擒其殿後若餘黨未盡待汝卸甲停戈賊兵復起依舊喪身失命必須破其窠窟勦其巢穴滅其餘黨然後為太平也前半期排昏敵散去其粗重後半期有微細流注必須以智慧照破盡淨無餘方可心地太平雖然如是此乃功勳邊事須知更有不涉功勳坐見太平者且如何是坐見太平底事良久云虛寂六宮天下治舜日輝輝照大千僧問月團前後總不問正當月團時如何師云明朝十五日進云意旨如何師云大衆普茶僧打圓相云還許學人恁麼會否師云不許進云為甚不許師云正當十五日僧禮拜茶話過去未來及現在十方不隔一毫端若人於此能明了歷歷分明珠走盤今勸衆兄弟先要明了自己進堂時是自己做工夫到於今也是自己明日出堂時也是自己從無始以來也是自己威音王佛出世時也是自己乃至釋迦佛時也是自己當來彌勒佛時也是自己直至師子佛時婁至佛時也只是自己曾無第二人第二念一身如是多身如是一世界如是多世界如是乃至盡虛空所有世界盡世界所有衆生莫不皆是自己所以經云十世古今始終不離於當念無邊剎海自他不隔於毫端此之謂也莫有識自己者麼出來呈似看時有僧問直指單傳即不問三藏殊文事若何師云白月印長江進云初機難會乞師下個注腳師云清波明透露僧禮拜解制茶話月鉤雲餌整常拋湛水澄潭正寂寥有時浪裏吞鉤去收捲絲綸意氣高大衆且道收綸捲釣一句作麼生道良久云柳條橫串花籃裏街坊高叫賣新鮮僧問金鉤玉線將收挽鯨鯢忽現事如何師云虛空撒下漫天網縱使英豪怎出頭僧云拿雲攫霧去也師云霹靂一聲魂膽碎僧云三汲浪高魚化龍漁翁空捕夜江水師云已被柳條串卻住延慶茶話十方同聚會個個學無為此是選佛場心空及第歸今日選佛場開十方同會且道作麼生是無為的事秪如佛又如何選遂豎拂云白雲繚亂舞翠竹冷颼颼僧問碧油幢鼎建祖令若何宣師云秦望摩霄漢進云即今君臣道合文武功齊和尚又如何闡揚師云溪水澄澄洗玉肌進云恁麼則闕裏祥光包宇宙師云今日結制僧禮拜云林間瑞氣新師云知恩者少茶話應緣莫執沉寂莫貪風摩霄漢月映寒潭魔佛齊收總屬顢頇有無不立是非之端畢竟如何唵唵會麼世事秋雲薄人情露水長茶話大道無形相自心等虛空證得自心時無有是非者既無是非則無生滅無去來無取捨無凡聖無高下無得失如是則三教一理也三觀一心也三世一時也古今一念也三德一智也聖凡一體也物我一如也僧俗一性也五教一乘也遂豎拂云會麼若也不會山僧便與你通個消息良久云籬邊黃菊金粧就樹頭紅葉硃染成僧問白水煎茶葉香氣滿甌來時如何師云供養大衆進云即今茶與趙州茶是同是別師云一口吞卻僧禮拜茶話善惡分明報乾坤豈有私泥牛遭霹靂木馬害癰疽威音那畔魔佛潛蹤今世門頭有無並立前三三後三三明陳數目不落因不昧果五百生野狐惡人燒佛眉鬚落讚勸聞經福無涯且道憑何節目得恁麼利害豎拂云有水皆含月無山不帶雲僧問時人造業有何報師云金花剪就檀香木進云體中辦茶供衆有何福德師云蠟燭燒成柏木油僧禮拜又僧問是人犯殺盜淫妄向和尚懺悔和尚終日阿佛罵祖向甚麼處懺悔師云香煙沖碧漢進云恁麼則無懺悔處師云金花落眼前僧禮拜又僧問盡大地是個禪堂喚甚麼作界外師云延慶寺進云盡大地是個蒲團又喚甚麼作界內師云延慶寺進云即今結制安禪升堂入室和尚與學人說個甚麼師云延慶寺僧禮拜云謝師指示師云莫謗老僧茶話真空不自空明月印西東妄心不自妄春情來柳上識得真妄時依然成兩樣不兩樣三十棒咦石女害相思泥牛喫鐵棒會麼若也不會再與你打些葛藤今夜是商呂及衆居士辦茶供衆請山僧結般若緣遂豎拂云若向這裏會得一切現成一切受用一切自在一切超脫不須驅昏敵散斷妄求真總是一個自己既是自己不須做作你若認自己是頭上安頭你若別求自己是斬頭覓活如刀不自割指不自觸眼不自見眼若可見眼即成境刀若自割刀即成物指若自觸即成別指所以見物者是眼斷物者是刀觸物者是指二六時中當下運用者是個自己會麼切莫作夢好茶話枯定愚癡窟狂慧生死根定慧等雙持真是如來子經云如來所得法定慧力莊嚴而今做工夫者或枯身泯智歇滅妄心以為禪定殊不知皆是愚癡也或穿鑿古德機緣下得幾句轉語聽得幾部經教以為智慧殊不知皆是生滅根本也當知正慧與狂慧不同正定與邪定各別見境不生心動念者正定也了達諸法無我者正慧也定慧皆是莊嚴自心之道也定不自定依我作定慧不自慧依我作慧如此觀之則定慧皆是假名須知定慧向上有事在會麼三旬紅日三千熱一夜冰花大地寒一僧禮拜問云離卻定慧請和尚速道師打一棒僧拂袖而去師云三十棒一棒也饒不得茶話提起智慧刀萬緣俱勦絶話頭莫放寬直須窮徹骨古云一念萬年去寒灰枯木去古廟香爐去今時久做工夫不辦長遠心決定志或半月一月半年一年稍見些影響以作了悟者或認些門頭戶底以為罷參者或看些言句以為得入者此都是妄認前塵錯亂修習非我種草也莫說學所得者皆是影響總有真實悟入者古人云大道未明如喪考妣大道已明如喪考妣二六時中戰戰兢兢如臨深淵如履薄冰所以湧泉四十年方成一片趙州三十年不雜用心豈似而今容易得者當須體究不可草草莫有百花林裏過一葉不沾身者麼良久云泥牛吐霧方才美枯木生花始是奇僧問大道未明如喪考妣大道已明為甚麼也如喪考妣師云前途路更賒進云蠶要溫和麥要寒師云也須保重始得僧禮拜又僧問如何是暗中明師云白雲籠月色進云如何是明中暗師云翠竹舞清風師云明暗雙雙即不問即今覿面事如何師一喝僧禮拜住龍華茶話元宵普茶次師云昨夜明月潛輝暗通一線今宵燈光普煦覿面無私花毬散彩蠟燭爭奇正恁麼時且道承誰恩力還有人道得麼良久云東君昨夜傳消息隴上梅花有幾枝茶話薰風拂拂糜雨颼颼田苗增秀圃菜添容恁麼會得何必言功且道不涉功勳一句作麼生道雨過山頭碧月升大地光中秋茶話師云亙古亙今一輪月剎剎塵塵俱照徹時刻清光覿面提何故今宵稱佳節缺與圓圓與缺添卻時人眼中屑莫有不受翳障者麼良久云此處一輪滿清光何處無復云秪如人人有段清光為甚麼不照時有一僧出將袖一拂打箇翻身云此還是照麼師云怎奈五雲攢簇僧云恁麼則收光攝彩去也師云何處更囊藏僧禮拜新春為李宅懺畢茶話和風蕩蕩消積劫之堅冰煦日輝輝勳寒崖之枯木堅冰消則定水處處澄清枯木勳則慧芽時時增長且作麼生是不涉生滅一句還有人道得麼如無山僧自道去也辨山煙浪盡明月下太湖僧問脫鼻金牛眠露地時如何師云東林西林進云孤舟已繫垂楊岸不怕狂風猛浪來師云過頭過底僧禮拜師歸方丈住白雀茶話師至白雀普茶次當家啓請為衆說法師遂云白雀飛來添湖中之瑞氣青蓮湧出闡辨嶽之風光九曲徹底清流太湖萬里波浪正恁麼時且道是何人境界會麼滿堂僧簇簇千古道風香僧問獅子未哮吼龍象已交參主伴圓融句請師一舉揚師云蓮花從地湧進云佛法不敢問到院事如何師云賓主交參進云恁麼則青蓮解說法白雀亦知音師云千古意分明僧禮拜定職事茶話文殊智頭頭顯露普賢行處處全彰根境不相知事理俱無礙且作麼生是無礙的事理遂豎拂云會麼木人輕拍掌石女笑呵呵開示不録結制普茶次師舉起茶鍾云會麼若向這裏會得無聖無凡無小無大無漏無為無真無妄無內無外無僧無俗無我無人無結無解何以故我王庫內無如是刀其或未然且將個本參話頭頓在目前如靠須彌山相似如貓捕鼠相似如雞抱卵相似切切孜孜綿綿密密忽然撞著㘞地一聲始知成佛其來舊矣又舉茶鐘云泥牛翻白浪木馬吼清風西堂孤崖出問九旬結制今宵始此夜臨筵事若何師云金風黃葉落進云多子昔年千戶曉今宵公案又重新師云霜花滿地堂估供花云今古相承惟個意描不成兮畫不成師云歷歷分明堂禮拜云某甲恁麼去也師云切莫亂走又僧問坐斷千聖舌頭把住諸佛要關事如何師云凡聖不通風進云只如東西不辨南北不分又作麼生師云辨峰寂寂進云恁麼則三百五百證龜成鱉去也師云切莫草草匆匆僧禮拜浴頭辦茶十六開士隨類而行驀頭一潑忽悟水因既不洗塵元無二人亦不洗體豈有兩身中間寂然腦後抽釘妙觸宣明佛祖俱陳師復喝云此是妙觸作麼生是宣明的事其或未會且向浴鍋中擦癢揩背忽然摸著方始心安今日是心安辦茶請豫指示山僧無可指示曾記得古人一則因緣昔有一無垢世界造化浴室後有老宿問云既是無垢為甚麼卻造浴室至今無人下語汝等諸人各下一語看西堂云若不造浴室怎顯無垢師云誰不識汝是西堂茶話觀音峰下洗鉢崖前紅葉歷落石壁悄然如此會得不用參禪會麼白雲嶺頭住清泉澗底流問答不録茶話識時機破時弊明眼宗師通回互知進退伶俐學者若還清濁不分必然法道廢矣上古之時淳朴之機行過於解靜沉死水難以發言所以徑山七百高僧無人發問百丈遣黃檗至徑山發問然後始解問話豈比今時道理不知青黃工夫不知進退妄生穿鑿或云乾屎橛柏樹子一切皆空但憑我拈來即是或云機鋒如空谷答響如有人叫一聲谷中即應一聲所以有人問一句我即答一句猶如空谷之應聲也若如此會盡是地獄種子破敗禪門安可為當家種草也秪如大慧禪師呵叱人說道理彼時人坐在百尺竿頭守住道理不能翻身故此大慧呵叱要使竿頭進步今時人道理全然不曉卻教人不要明道理秪如不從道理而得者有幾人也自七佛所傳者皆傳此清淨心體也豈可不明道理乎如臨濟香巖南泉輩皆云精通性相熟練教乘然後為禪師也豈可不明道理如古人云秪貴子之見地不貴子之行履今日以山僧觀之秪貴子之行履不貴子之見地何也古人質朴言不妄發今人淆漓聽其言則超佛祖之先觀其行則落凡愚之後豈可重其見地也古之人以行過解故不重其行不是無行今之人解過行故所以不重其解不是無解也山僧所舉皆是時弊你等他日為善知識若不革故自新儱侗過日秪圖門庭鬧熱非佛弟子也珍重普茶次師舉古人云即此見聞非見聞師云一有多種二無兩般無餘聲色可呈君師云喚作聲色即錯個中若了全無事師豎拂云者個是甚麼體用何妨分不分師云言語道斷非去來今即且置秪如石女拋梭又作麼生還會麼若不會山僧再與你打些葛藤只如你們清晨下單來耳聞鐘鼓鈴魚之聲眼見森羅明暗之色有甚麼隔礙你有甚麼繫絆你你拈將半毫聲色來看要且聲不是聲何故聲色從因緣所生當體全空以全空故當體無生以無生故則無去無來無取無捨非有非無當下只是個本地風光不可向外馳求以作聲色會也既不是聲色且道畢竟是個甚麼古云填溝塞壑無人會堪笑騎牛更覓牛珍重普茶師云大衆山僧在此待你們搆去還搆得麼搆得亦是你搆不得亦是你正當此時歷歷孤明無昏無妄無有思惟分別喚作識心得麼既不是識心且道是個甚麼總是你自己喚作一時一念一剎那際三昧曾無甚麼隔礙你無有纖毫蓋覆你何不恁麼會取好昔有僧問歸宗如何是佛宗云若向汝道恐汝不信僧云和尚重言焉敢不信宗云即汝便是僧云如何保任宗云一翳在眼空花亂墜好言語汝但著佛見祖見菩提見涅槃見悉是空花汝但不起一切見連這不起亦不起方得淨盡無餘方喚作無心道人也今日是季清程居士宿秉善根不忘付囑大心頓發護持三寶得得入山辦茶供衆以行菩薩行汝等須當各各努力一念純真方可喚作無心道人方可消受得他的供養汝若散心雜話滴水也難消你要學佛學祖參禪悟道明幾則公案此是這邊語那邊語此是向上語向下語此是隔身句縱奪句殺活句若如此會盡是散心切莫草草時寒珍重僧問趙州三十年不雜用心他在甚麼處過日師云九九八十一今日從頭起進云至於穿衣喫飯又作麼生師云薰風自南來進云為甚麼八十猶行腳師云朔風從西起進云如何是悄然處師云石女睡正濃僧禮拜普茶次師云一句當陽絶正偏豈分位次涉言詮電光石火如能薦始識拈花教外傳教外別傳之旨不涉言詮句意思量分別識心一切淨盡無餘秪露目前些些古云承言者喪滯句者迷要在圓陀陀活潑潑處要會即會不許擬議一擬便落二落三了也你看僧問趙州如何是西來大意州云庭前柏樹子僧云和尚莫將境示人州云老僧不將境示人僧云如何是西來大意州云庭前柏樹子雖然道個柏樹子元不將境示人雖不將境示人不妨道個柏樹子何嘗涉於言句情境今時人只管穿鑿古人語句此是正位此是偏位此是人此是境遠之遠矣且道作麼生是不涉言詮的句良久云污泥出沒渾無染流水滔滔絶往還龍華除夜茶話師云辨山沒有甚麼與大衆分歲有一則古語舉似大衆三祖云至道無難惟嫌簡擇但莫憎愛洞然明白今日是除歲明日是新年作麼生不簡擇左邊是廚房右邊是齊堂作麼生得無憎愛若向這裏曉得親剝泥牛與大衆分歲其或未然且歸堂中參究不得草草僧出云嶺上寒梅帶雪開師云是簡擇進云多謝泥牛師云又是憎愛又僧云和尚未開口已前早已勘破了也師云灼然簡擇僧便喝師云憎愛端陽茶話今日端陽佳節畫龍艾虎鬥額奪得錦標歸來特與諸君漏泄目作麼生是漏泄的事石榴紅似火梔子白如綿豎碑茶話碑文鐫白字萬古徽猷當道種青松見聞不昧如此會得猶在半途如此不會白雲萬里會麼良久云辨山一日雨橋流水不流僧問辨山風景事如何師云花紅柳緑進云還有向上事也無師云有進云如何是向上事師云辨山吞卻西湖月僧禮拜師打云將頭不猛纍及三軍唐祈遠居士設茶師云內護外護要心堅般若通明絶萬緣透出毗盧頂𩕳外始是吾家祖師禪般若無名非凡聖故般若無形非長短故般若無相非青黃故般若無知非意識故欲學般若者將心意識掃得潔潔淨淨然後始相應也古云衆生心識處處能緣惟不能緣於般若之上蓋般若離一切相故諸人還會得般若麼藕斷絲不斷功深願亦深普茶師問衆云紹興請山僧戒珠寺開堂且道我去不去若道不去古人云隨緣赴感靡不周若道去又道而恆處此菩提座若道得許過戒珠道不得且住辨山汝等諸人如何定當僧出云舟行岸移師云而恆處此菩提座聻又僧出云長空一片月師云隨緣赴感靡不周聻僧禮拜師便打沈居士請茶話師云明月映寒潭千波頓息樹頭葉不動大地風澄直饒心境一如光含萬象未知有向上一竅在且道如何是向上一竅泥牛撞倒須彌頂木馬嘶乾四海潮莫有問話者麼有居士出禮拜歸位師云好與三十棒
