body:
  text: 明住天台護國寺嗣法門人寂蘊編茶話師赴蕺山請過報國院曹源禪者同衆居士設普茶請茶話師云三世諸佛為一大事因緣故出現於世間莫不使一切衆生開示悟入佛之知見也達磨西來掃除名相不立文字直指人心見性成佛亦為此佛知見也遂豎拂云若向這裏會得則現現成成二六時中觸著磕著穿衣喫飯屙屎放尿迎賓待客莫不具足若也不會將此佛知見頓在面前如雞抱卵如貓捕鼠念茲在茲打成一片情境俱忘忽然一念相應㘞地一聲始知成佛久矣莫有會得者麼可出來通個消息如無山僧自道去也良久云塵纍不侵金菊蕊冰輪常映碧潭深僧問如何是賓中主師云我是辨山老進云如何是賓中賓師云門外弄猢猻進云如何是主中賓師云滿街花柳新進云如何是主中主師云烏龜飛上天進云還有向上事也無師云有進云如何是向上事師云石女唱山歌僧禮拜住蕺山結制茶話不了於自心云何知正道彼繇顛倒慧增長一切惡所言自心者即當人二六時中折旋俯仰迎賓待客屙屎放尿一切處靈明廓徹放光動地者是也昭昭於心目之間恍恍於色塵之內毫無間然奈何衆生迷而不知謂之背覺合塵諸佛證之祖師悟之謂之背塵合覺雖悟迷之不同未曾欠少也遂豎拂云若向這裏會得則現現成成其或不能可將個本參話頭頓在目前如一人與萬人敵相似莫教絲毫放過或一年二年乃至十年三十年打成一片情境俱亡忽爾㘞地一聲始得其自心也今日戒珠結制與諸兄弟同期妙悟同期出生死同期證無上菩提且道如何是同期的事聻會麼水向石邊流出冷風從花裏過來香僧問不問佛祖機緣請指戒珠家款師云蕺山亭進云阿誰領略去師云浴鵝池與汝無分進云千里同風為甚麼無分師云不是個中人僧禮拜云大衆證明師云且喜沒交涉張居士保病設茶師云病從業緣生業從心識有心識本來空病緣無所住病緣既不住真心恆遍知一切日時中法道不思議且道如何是不思議法青女乍臨樹頭赤碧波潭底桂輪明今日張居士身染貴恙入山辦茶求大衆轉念使他魔障消除身體康健秪如轉病為福一句作麼生道病退身安混間事積德堂中慶有餘僧問銅肝鐵膽人皆具為甚人無薦得時師云太煞不唧溜進云還許他領略麼師云不許進云為甚麼不許師云好事不如無僧禮拜茶話師豎拂云拈起拂子穿過你諸人眼睛放下拄杖壓碎你諸人髑髏只如不拈不放你諸人向甚麼處著倒良久云會麼風舞松枝龍耀日水流黃葉蝶沉波僧問得其門者等諸佛於一朝失其門者徒修行於曠劫請師指出其門普令諸人得入師云戒珠圓陀陀進云恁麼則五百高流衆全身在個中師云也是尋光認影進云離名絶相非今古越聖超凡在此時師云三十棒僧禮拜陶陳吳居士設茶師豎拂云會麼圓陀陀不受纖毫蓋覆赤灑灑全無半點囊藏照萬象以無私周法界而光耀直須迸開頂門正眼徹見自己家珍作麼生是自己家珍良久云秦峰一片雲靉靆鑑湖幾處水叮鼕今日是陶陳吳邢衆居士設茶請山僧説法若論此事達磨西來只要人信得自己所以大珠見馬祖問云阿那個是慧海的寶藏祖云即今問話的便是一切具足無所乏少這是第一個信自己的樣子又大梅參馬祖問云如何是佛祖云即心是佛繇是大梅直信自心向大梅三十年不出山這是第二個信自己的樣子遂豎拂云衆居士若向這裏信得及説一個成佛也是多的所以古人云踏破鐵鞋無覓處得來全不費工夫珍重僧問圓陀光爍即不問照破頂門事若何師云蕺山頂上風光好進云無孔鐵鎚深逼拶眉毛血濺幾多人師云戒珠堂中瑞氣新進云杖頭截斷三江浪剔起驪珠耀太虛師一喝僧禮拜茶話向上一竅千聖不傳目前一機列祖莫辨逴得逴不得石火電光有思惟沒思惟難免話會莫有密移一步者麼出來通個消息良久云直須透出虛空外始好和光混太清僧問擦掌摩拳即不問臥月眠雲事若何師云水寒石骨冷進云莫就是他受用處麼師云風清月色明進云假饒三根椽下七尺單前又作麼生師云觸著磕著僧禮拜師回方丈茶話水性常清淨波瀾本自如如來清淨禪圓明具足者人人自心個個圓滿具足若聖若凡若老若少若僧若俗雖迷悟不同不曾欠少遂豎拂云即此拂子人人皆見三世諸佛也如是見博地凡夫也如是見老也如是見少也如是見僧也如是見俗也如是見即此見性各各圓滿具足既然各各圓滿具足必須起行操修所以有三期結制之説汝等諸人既以進堂半期已過若有工夫已入手者正好造修使其純熟習氣輕薄妄想平淨保養聖胎若是未入頭者再加精進再加勇猛以期妙悟不可中路懈退珍重僧問師今顯此大神通的的明何意師云法界本無私進云恁麼則棒打石人頭嚗嚗論實事師云秋深黃葉老僧禮拜茶話心同虛空界示等虛空法證得虛空時無是無非法所以達磨西來不立文字掃除名相直指人心見性成佛此是達磨傳見性之章本豈有是非也又七佛傳法偈云身從無相中受生猶如幻出諸形像幻人心識本來無罪福皆空無所住罪福皆空獨露心體此是七佛傳清淨心體之章本不逐聲色也今時有等妄生穿鑿自立臆見教人不要看心看性看理看玄單單向事相上看謂之一切事究竟堅固此豈不是杜撰也若如此做工夫落於聲色盡是邪魔外道豈同諸佛諸祖傳清淨心體見性成佛之法門也豈不見僧問趙州如何是西來大意州云庭前柏樹子僧云和尚莫將境示人州云老僧不將境示人僧云如何是西來大意州云庭前柏樹子看他趙州雖然道個柏樹子原不將境示人古人為人撥掉塵境事相單單直示人心豈似今人不許看心只向事相上看此豈不是迷卻自心逐境飄流也若不以心為本則開示學人做工夫者當參個甚麼悟又悟個甚麼真謂之邪説也古人掃除道理者秪為學人坐著自心靜沉死水故為掃除也所以云認著依然還不是黃檗云是甚麼心教你向境上去看縱然會得也只是個照境的心靈雲見桃花悟道所以玄沙云諦當甚諦當敢保老兄未徹在此正是不許你認著自心也一向往往有人傳來山僧不信今見其開發示語山僧不得不言豈可坐視緘口今特舉似大衆一任簡點茶話三祖云法無異法妄自愛著將心用心豈非大錯世尊云有無俱遣淨覺隨順直下教人識取自心豈有異法耶六祖云不思善不思惡或云放下著或云莫妄想皆直指無異之自心也法雖云易而行者實難後來諸祖或教看話頭亦只以異方便明此自心或看萬法歸一一歸何處者或看乾屎橛者麻三斤者或看柏樹子者或看無字者不許你起情識測度要你起真疑斷偷心打成一片根境俱亡忽爾㘞地一聲識取自心也有等不識此意將此衆話頭一齊撥掉單單只看竹篦子正所謂妄自愛著也若竹篦子是則衆話頭亦是若衆話頭不是則竹篦子亦不是何故是則總是不是則總不是豈有好歹耶秪如天奇毒峰俱看誰字話頭發明高峰看萬法歸一雪巖欽看無字話頭亦有看炭團而悟者亦有看摩訶二字而悟者似無念和尚看黃瓜茄子而悟者皆是起真疑使然豈有取舍耶若有取舍正所謂大錯也今特舉似大衆免蹈前阱珍重茶話實際理地不受一塵三觀何施六度安用今世門頭不捨一法萬行齊修千儀悉備即今森羅滿目燈燭輝煌且道還是今世門頭耶實際理地耶會麼紅爐焰裏冰花結三九天中柳絮飛今日是穎水居士辦茶為薦令嶽母孫夫人高超淨土遂豎拂云若向這裏會得則孫夫人不來不去不生不滅向拂子頭上坐寶蓮花親覲彌陀親蒙授記良久云鴉鳴鵲噪頻伽鳥古木森森寶樹行祁驥超居士問云修行的人了卻本分事為甚麼有佛可成師云秪為了卻本分事又問六度萬行從何處起師豎拂云從這裏起又問善惡二塗本無差別大修行的人為甚麼諸惡莫作諸善奉行師云當初秪為茅長短燒了元來地不平士禮拜而退茶話水碧秋深處處寒大菱落水望泥鑽毛豆摘來和殼咬現成公案不須參不須參納被蒙頭萬事完若向山僧數語下會得一切現成無所乏少其或不然將個本參話頭頓在面前念茲在茲綿綿密密打成一片忽爾㘞地一聲始知不須參之意也解制茶話十世古今始終不離於當念無邊剎海自他不隔於毫端即如你諸人出家也是這一念行腳也是這一念參善知識也是這一念結制進堂也是這一念堂中看話頭也是這一念咬牙側目擎拳豎臂摩褌擦褲研真斷惑種種施為總不出這一念諸人還識這一念麼良久云三九寒氣重圍爐火正紅僧問一念即不問一念未生時如何師云烏龜爬上壁進云香煙宣妙法那個是知音師云張阿郎進云露柱證明師云三十棒又僧問牙齒藏日月即不問眉尖逞風流一句請師宣師云通身赤條條進云朵朵雪花開四野清香直透萬重關師云還有一重在進云活潑泥牛隨處吼師云撞著廣額屠兒剝了皮僧喝師云頭落也不知僧拜又僧問如何是臨濟宗師云三十棒如何是曹洞宗師云破草鞋如何是溈仰宗師云大燒餅如何是雲門宗師云海中翻白浪如何是法眼宗師云爐中火正紅僧拜師歸方丈住龍華結制普茶師云久默斯要不務速説今日當場分明露泄敢問諸人還得不得若得方可結制過冬其或未然再與你通個消息病朽辭顯聖渡江欲往終南習靜今雖居此也是逢場作戲云云茶話圓明精妙體應物不能拘一切日時中恆常露現者遂豎拂云若喚作拂子將何為圓明精妙體若喚作圓明精妙體又將甚麼為拂子如此會得三條椽下七尺單前保養聖胎佛也無奈你何祖也無奈你何閻羅老子也無奈你何其或未然可將個本參話頭一扣扣住如絲綿團遇著倒挂刺相似一滾滾作一團行不知行坐不知坐穿衣不知穿衣吃飯不知吃飯打成一片根境俱亡忽爾爆地一聲方可到家始識圓明精妙體也呵呵住護國結夏制茶話師曰老僧因為養病不暇為衆説法雖然如是蚤已漏逗了也大衆且道漏逗個甚麼會得者試出通個消息看一僧才出禮拜師拈拄杖便打又僧問如何是護國景師曰青松翠竹曰如何是景中人師曰七長八短曰如何是人中意師曰病軀思藥飲曰向上還有事也無師曰有曰如何是向上事師曰紫霞峰頂浪滔天僧拜歸位又僧問如何是縱師曰上座堪雕琢曰如何是奪師曰打殺你曰如何是殺師曰不存你性命曰如何是活師曰且放你出氣進云縱奪殺活蒙師指直捷一句又如何師一喝僧禮拜師歸方丈秋七月十五日解制預夜茶話師舉洞山示衆云秋初夏末一任東去西去直須向萬里無寸草處去秪如萬里無寸草處作麼生去師復曰這裏下得一語始許明朝解制衆下語不契師乃云結是解時解是結時識得此個時便是時節至所謂時節若至其理自彰諸人還會麼秋日木稚香吾無隱乎爾僧問結解即不問不涉修證一句請師直指師豎拳頭云會麼僧進云木稚香滿院人人鼻皆聞既是解制時為甚有會與不會師云茅本無長短原來地不平進云國師始創和尚中興護國家風今昔同否師云去卻異同心方知今古事僧禮拜云洞上宗風重振此天台不異昔靈山師云作麼生是不異事僧復作禮云謝師此問師微笑住龍華茶話時因結冬制普茶示衆齋堂新起法席初開四海龍象雲赴而來且道辨山將何供養良久云臨濟饅頭曹山酒雲門糊餅趙州茶珍重碧岑設普茶請説入道捷徑師豎拂云挺然獨露絶周遮擬欲修行兩眼花萬苦千辛遭挫折十方坐斷路轉賒能領略即歸家何須門外覓三車大衆且道家在甚麼處日照寒光淡風高秋色深今日是碧岑辦茶請山僧説做工夫捷徑若論本分一著子不屬修證古云無你用心處或云莫妄想或云放下著豈工夫可做古有一言之下心地開通者有一喝下一棒下明白者如百丈被搊得鼻頭痛而悟入豈用工夫也但做工夫是不得已為下根人的事如山僧最初念佛後遇一老宿授以半偈念得口中白醭流又不知何者是四大何者是心境又遇一老宿教我聽楞嚴經至同別二種妄見處遂悟得根身器界總是空花單只得個空境不得自心遂生撥無之念後見雲門先師先師云四大是假心境本空何者是汝自己問話者又是何人念佛者又是何人我被説著病根是時疑情頓發至紹興府延慶寺一連七日七夜立在佛前如人推一推這邊跳過那邊胸中忽湧起兩句證道歌不離當處常湛然覓即知君不可見忽然悟得自己此是得本也如高峰在三塔閣上見五祖真贊百年三萬六千朝反覆元來是這漢一般只是不能轉身吐氣與柏樹子諸公案俱不知道遂佛前發願拈鬮拈個一歸何處終日提一句一句追將進去緊一陳緩一陳冷一陳熱一陳只是不曉得後來先師在廣孝寺開堂末後有四句偈云豎起脊梁生鐵鑄放下面皮莫回顧猶如象王脫金鎖若不如是何劫悟我隨依而行之一連做了十多日打成一片行也如是坐也如是即如高峰浩浩作得主一般只是不明一歸何處次日老和尚小參舉南泉斬貓話汝等作麼道我即丟蒲團過去如此不期然而然即會轉機也次日有位同參道友頌南泉斬貓我即知他錯處彼云汝頌頌看我即提筆成頌彼不服即呈先師先師云汝不是汝不如瑞白不通文者過了春期夏間又約六七衆打七至第六日聞鐘聲忽然身心脫落不見有一物當情此正是虛空粉碎大地平沉時節正如高峰枕子撲落地一般的工夫才得個太平時節我是萬曆三十六年下山將自己衣單盡捨與人單只一衲瓢杖蒲團而已七年衲不解帶十三年無被至泰昌元年具足師弟見我甚寒白先師先師命他送被一床自此方才蓋被上來所舉這都是我鈍根人為的事若是上根何用費許多周遮遂豎拂云莫有從這裏薦得者麼良久云葉黃秋色老水清徹骨寒時有僧出一喝禮拜而去師云且喜沒交涉遂歸方丈茶話進堂一個月那事瞥不瞥更擬問如何今朝冬至節節節若喫白果咬破殼莫有悟明心地者出來通個消息拄杖子與汝證據開示問答不録海空設茶請茶話師云花開春滿樹葉落盡歸根海空終見底人死不知心死後且置即今諸人現在那個是汝底心且道此心是青耶黃耶赤耶白耶常耶斷耶圓耶方耶有耶無耶若人識得可出來通個消息若也未知切不得熟睡饒譫語杓卜聽虛聲師設普茶囑托乃云老僧今日設茶有所付托遂舉趙州問僧云曾到此間否僧云曾到州云喫茶去又問僧云曾到此間否僧云不曾到州云喫茶去所以老僧設一杯茶使汝諸人各各蕩了嘴唇汝等可知否此是第一等付托第二汝等堂內禪師各各用心做工夫參禪發明心地使慧命有所賴此是第二等付托第三內外一切職事各各為常住為法門為衆生要永遠堅固此是第三等付托第四湖州及長興衆居士各各護持佛法護持錢糧他日俱是龍華會上人此是第四等付托各各記取僧問如何是第一付托師云茶碗乾到底如何是第二付托師云一呷三口如何是第三付托師云賞你一個圓眼進云恁麼則人人撑天拄地去也師便打僧一喝禮拜師呵呵唐祈遠居士問盡大地是個自己屋裏為甚麼要回九華師云也少這一瓣香不得士云恁麼則和尚元不離辨山弟子常得親覲師云善哉善哉付托有在士禮拜示衆住龍華示衆四禁語第一不許暗中獨坐第二不得尋光推求第三不許搜揀語言第四不得門外打之繞如此做去不妨克日成功過密印寺衆請示衆師云蕩蕩和風過晉昌李白桃紅滿院香秪為諸君渾不薦今朝特地為舉揚須領略謾商量豎拂云會麼無邊花柳一時新拽杖便行示衆一不得放過二不得話墮三不得孤峰頂上行四不得三家村裏坐於此會得逍逍遙遙於此不會亦不曾失落作麼生是不失落底事良久云一條拄杖無長短滿面春光滿面涼莫有問話的麼僧問薰風南來是處生涼為何辨山逼人大熱師云太湖波浪三千丈僧禮拜示衆暑氣將清未清梧桐葉落不落不是三要三玄亦非君臣道合會麼秪待交秋之後嶺上白雲寥廓住護國示衆崇禎八年乙亥二月初二日入院內外衆請上堂師不允惟大書數字榜於室前曰佛法不在升堂當知不離日用若能此處會得更有何事不畢如或未知各當努力開田鋤地運水搬柴捨此他求非吾至道珍重示衆山僧住此山為了諸公願若論佛祖相傳事不在高登大座拈捶豎拂一問一畣彼此酬唱謂之説法為人古人巖居穴處茅屋石室張弓打土搬柴運水挾籬插鍬皆是弘揚個事爾等日用時中能守本分莫向外馳或勞或逸或出或入蚤則起晚則宿飢則食渴則飲無非當人妙處豈乖佛祖相傳之事哉雖然切忌認著但能默契何事不畢珍重示衆祖師云外息諸緣內心無喘心如墻壁可以入道果有如此行履如此力量便是大力人超凡聖之機脫生死之徑乃在邇矣何在病朽警策如何若何方能了事乎思之參之自不相賺囑托職事夫為佛子當報佛恩所言報佛恩者非但拈椎豎拂為然即看守古道場者創建梵剎者聚衆坐禪者掩關者齋僧者造像者種種佛事莫不皆是報佛恩德耳今以辨山無主向未曾交脫不料覺元又不唧溜故此暫回龍華料理一番交脫清楚然後再來與諸公商量個事拈提格外以作休老之計願諸社友各發大心念祖道之荒涼愍護國之頽朽秉四願以維持空三輪而造作精勤造守真報佛恩過石宕庵示衆桃源洞口來清泰庵中過明月庭前輝清風白雲播如此會得覿面無私如此不會也不妨處處磕著會麼天台山上清流水一路隨吾下剡溪過天華寺示衆清風微微細雨霏霏天台老漢帶水拖泥良久舉拂云會麼扁舟過若耶白浪湧清池僧問清風微微細雨霏霏即不問如何是帶水拖泥句師曰蒿壩乘船到天華進云還有為人處麼師云領常住茶僧禮拜住崆洞山元旦示衆師云老僧有數語舉似大衆乃云監院請我上堂老僧特為宣揚劈脊三十痛棒徹骨徹髓清涼諸人若也會得不負老婆心腸諸人若也不會天明點燭燒香不敢為諸人説法只要據款結案戊寅十一月八日崆洞山建達磨堂上梁示衆師云伐木誅茆三世諸佛全身露搬磚運瓦歷代祖師顯神通湛監院兩肩擔當衆禪和一心真切十方禪衲爭長兢短肯肯綮綮八表檀那棄堵傾囊英英卓卓同祈國祚永固共明般若真宗即今達磨堂已建立且道達磨大師在甚麼處會麼崆洞山色常春色寶蓋峰高始道高監院問初祖佛法即不問和尚今朝事若何師云蠟燭盡輝煌進云恁麼則照天照地後畢竟作麼生師云兩腳趲錢糧進云此是監院事和問事又作麼生師一喝院禮拜僧問崆洞故丘則不問達磨新建事如何師云橫梁豎棟進云恁麼則蓋天蓋地去也師云天下人有賴僧禮拜示衆師病概不見客一日西堂同衆職事進方丈問安云多時不見和尚待我等禮一拜師便拈起竹篦一齊打出復以偈示之曰衆職入室問安堂頭拈起竹篦當頭劈面便揮不知是何意旨咦九月楊花落滿堤三伏炎炎冰骨脆庚辰仲秋師受南昌王請主百丈道過吉安府居士劉養純賴中衡伊北尤暨衆居士等設齋於溈仰寺請示衆師云明暗交參殺活機正偏兼帶顯離微大丈夫兒須了卻莫負當陽第一機且道如何是第一機舉起念珠云萬雲從空起千波逐水流於斯會得現現成成無欠無餘二六時中一切具足圓陀陀活潑潑淨裸裸赤灑灑頭頭釋迦出世步步彌勒下生正龐居士有云日用事無別唯吾自偶諧到這裏既是自己説個正偏殺活縱奪總是間言語於本分事了沒交涉其或未然直須看個話頭畢竟是個什麼朝參暮究念茲在茲至於穿衣喫飯迎賓待客屙屎放尿總莫放過一朝冷灰豆爆驀地一聲管取現成受用大衆努力今生須了卻莫待當來彌勒時僧問如何是本分事師云香煙繚繞進云如何是向上事師云燒餅一口咬個缺僧及衆居士禮謝
