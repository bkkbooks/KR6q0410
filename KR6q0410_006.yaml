body:
  text: 明住天台護國寺嗣法門人寂蘊編問荅機緣除夜僧問古人烹泥牛與大眾分歲未知今日雲門以何物分歲師云石女烹茶僧云恁麼則謝供養去也師曰木童把盞僧問如何是雲門一句師便掌僧一喝師又打僧云看破了也遂禮拜師曰久違久違師一日禮雲門先和尚像僧云像在此老和尚在甚麼處師云東山西嶺松僧無語師曰且道在甚麼處僧云東山西嶺松師打云學語流僧問達磨面壁意旨如何師云九載不通風又問人天交接兩得相見如何是相見的事師云兩眼對兩眼僧問橫抱焦桐覿面酬請師彈出漢宮秋師云南無阿彌陀佛進云牛兒未解朱絃韻懇再從頭鼓一周師云這一落索那裏來進云朝飛雉水吟龍盡在梅花一曲中師云學語流僧問一靈真性依四大而住四大分張後向甚麼處安身立命師云山花開四色進云和尚歸方丈學人進禪堂中間事作麼生師云立地可知歸僧問如何是雲門境師云綠竹青松進云如何是奪境不奪人師云闍黎解轉身進云如何是奪人不奪境師云翠竹滿山林進云如何是人境兩俱奪師云乾坤一齊崩進云如何是人境俱不奪師云香風吹遍野遊人意氣新僧問如何是四句師一喝僧一喝師便打僧問五家宗派流芳遠洞下玄微請示陳師云寒蛩鳴砌壁進云意旨如何師云白鷺上青松進云與麼則事理全彰如何是不涉理事一句師云鑑湖波底月進云學人則不然師一喝僧禮拜云鑑湖波底月師云學語流僧問千山疊疊萬竹森森是什麼人行履處師云秋風來我舍細雨灑芭蕉僧問皓月懸空玄珠護水相隔天淵如何撈捕師曰大菱和殼咬進云還仗阿誰力師云圓眼去核吞僧拂袖云承和尚指示學人恁麼去也師云且喜沒交涉僧問文殊是一切智人為甚麼出女子定不得師云嘴長三尺進云罔明為甚麼出得師云舌短二寸進云出得出不得是同是別師云猛虎咬大蟲僧問桂輪孤朗為甚麼清光不炤師云忘功體更賒問雪鎖梅花為甚麼香分嶺外師云靈氣難藏隱僧問單明大法不明自己此人只具一隻眼如何是大法師云棒喝交馳接後機進云如何是自己師云猛虎咬大蟲又問如何是尊貴墮師云大地平沉僧問南泉庄上喫油餈意旨如何師云官不容針私通車馬僧問灶神聞嵩山和尚說無生法得生天上既是無生法為甚麼卻生天上師云若不生天怎顯無生一日師指施生臺云此物得甚麼古傍僧云古到古只是藤多些師云若不藤多怎顯古器僧問古云終日喫飯不曾咬著一粒米既喫飯為甚麼不咬著一粒米師云奉親事忙僧問師住皖山還知皖山境界否師云頑石團團青松鬱鬱僧問如何是正法眼藏師一喝僧一喝云兩喝後如何師云合著你的嘴鐵壁居靜室僧問如何是無夢無想主人公師云鐵壁山高僧云莫就是麼師云是即頭上安頭不是即撥波求水僧云無是無非是否師云無是無非死水身棲僧拜云恁麼則來朝天池挑泥師不顧僧問如何是不思議境界師云螺螄吞大象有僧碧文從少林來言在北方講下十餘年少林住三載師即問曰宗教兩般都不問你將腳跟下一著子道一句看僧云自己腳跟下沒有甚麼說師笑僧少停請師道師云待石磉礅開花即向你道僧云石磉礅開花也師云向汝道竟僧云謝師指示師云承虛接響漢居士問戶外清風正入室時見個甚麼師云相識滿天下知心能幾人又云瞎又問十方聲動一時俱聞正恁麼時如何抵對師云遊絲風前舞一句絕異聞又云聾又問有時山青水綠有時不山青水綠有時花開蝶滿枝有時花謝蝶還稀恁麼風光落在何處師云石女唱山歌清韻無腔調又云過又問五根性地用之則同五處境緣是同是別或分未分誰做阿翁師云黑漆燈籠光炤夜又云同別總是境分不分是塵空花何足究兔角不須論誰做阿翁問端的從來雨落地下濕問有氣為生無氣為死生即生有死即死無無既無生云何生有誰從無來能知無底師云石筍抽條色更鮮又云生本無生死亦無死生死性空緣生則聚能知其底鐵犬嚎吠問天上天下唯我獨尊此我是我指我作我彼若立我必有所對云何獨尊獨尊無配畢竟作麼直言無諱師云露又云既云獨尊元無有對覿面無私風吹柳絮問佛法僧三連則儱侗分則成橛畢竟如何方不二說師云鐵褁綿團又云佛法心三元是名言儱侗成橛總是妄談不二之說松竹唱言問且勿論古亦不立今正恁麼時塵勞頓起燕雀爭吟除則增頭著則失身這位真人位居何地師云泥鑄金鐘鐵打茅苫又云古今不立正性條直塵勞頓起光騰萬里增頭失身是自家底這位真人居何地夏池荷葉生青翠居士問銀漢無聲冰輪直上時如何師云清光普炤問手足俱無如何是為人處師云一枝枯木正芬芳問不執本來中間是甚麼人師云胡張三黑李四問明君登極四夷咸寧各營不卸甲時如何師云時時奉重問龍女獻珠成佛為甚即今立菩薩下風師云若不立下風怎知他成佛問善財一生果證為甚麼今尚雙髻小兒師云易分雪裏粉難辨墨中煤問若人識得心大地無寸土許多卉木何處栽培師云落花隨流水居士問經云心生法生心滅法滅何故大慧云心生法滅性起情忘似意相乖師云石人打破水中天士復請開示師云心生法生者根塵對偶之妄心也妄心單根不立獨境不彰所以同生同滅大慧云心生法滅性起情忘者真心露而法塵滅本性起而妄情消是也博山三問問學者時有禪人持此語請師荅之問古澗寒泉水作何色師云明月映蘆花問不萌之草為甚能藏香象師云焰裏梅花開四色問脫體無依的人向何處安身立命師云大唐說法新羅打鼓張居士問經云大火所燒時我此土安隱如何是安隱處師云三兩綿子六兩絛問經云我今為汝保任此事如何保任師云明月炤階前王印海居士問曰老師大事徹矣師曰敢問居士以何為大事士曰性命為大事師曰以何為性命士曰萬象森羅悉無不是師曰此是境緣邊事且道放下境緣如何是性命士以腳踏一下師曰此亦是境緣邊事士無對師曰而今人都向情識邊作活計撇下境緣畢竟尋個落處始得士曰老師落處作麼生師云今日天晚明日來士曰道無蚤晚師曰又墮情識士無對沈求如同史青都子虛居士上山喫茶次師曰沈居士五六年不相見未知你本分事何如沈曰喚甚麼作本分事師便掌沈曰還嫌缽盂無柄那師曰你元來在鬼窟裏作活計沈曰沒眼漢師曰本分事也不識謝居士問如何是法身師云五位峰頭浪潑天如何是報身師云花紅柳綠笑嘻嘻如何是化身師云明月印千江士禮拜而退問金剛經云如何是過去心不可得師云水底月如何是現在心不可得師云空裡花圓覺經云如何是非幻不滅師云萬里一條鐵士禮拜僧問如何是閉門造車師云魯班真脈線不許外人知如何是開門合轍師云羊腸大路一條線西堂孤崖問如何是無佛處主伴重重師云我同你在這裏問作麼生是度生時圓音落落師云唵嘛𠺗叭𡄣吽問仰山當時插下鍬子溈山道南山大有人刈茅意旨如何師云虎有起屍之德問只如仰山拈起鍬子便行又作麼生師云子承父業九峰為甚麼不肯首座師云峰巒奇秀鶴不停機問只如他道明一色邊事不契先師意旨未審先師意旨如何師云枯木生花問古德道無身有事超岐路云何是無身有事師云野岸不逢人問無事無身落始終作麼生是落的意師云月落潭無影灰飛煙亦無問猛虎以肉為命為甚麼不食其子師云草鞋肚裏四條經問法法不相到為甚麼風來便息了燈師云眼花作麼堂拈起燈柱云既是分明極為甚麼又道所得遲師云過蟻難尋穴歸禽易見巢僧問一口氣不來何處安身立命師云日炤寒光淡進云畢竟如何師云山色冷如冰僧禮拜起少停又問曰山色冷如冰意旨如何師云大地徹骨寒問如何是佛師云葉落秋林僧云學人不會師云遍地殘紅僧問如何是住山斧子師云八兩半斤問古云渠正是我為甚我不是渠師云秋水連天碧問摩竭令提婆宗是同是別師云弁嶽呵呵笑問如何是大機大用師云三十棒一棒也饒汝不得問如何是末後一句師云須彌𨁝跳上三十三天問這字意旨何如師云瞎問燈籠遭撲為甚麼露柱頭疼師云九曲池近來被沙塞問牛過窗欞頭角俱過為甚麼尾巴過不得師云虛空粉碎大家看僧問父母未生前如何是學人本來面目師云紅日上粉墻進云學人不會師云光明燦爛僧禮拜一僧住山求師指示師云一下鋤頭三刀粟僧云種後如何師云茅團芋頭好煮粥僧無語少停師問你歸山一句作麼生道僧云單瓢直杖師云恁麼則行腳去也僧云正是住山師云未有住山意在僧云學人只如是和尚又作麼生師云棄卻瓢囊擊碎琴僧禮拜僧問鴻濛未判天地未分如何是空劫已前事師云水冷草枯問如何是今世門頭事師云一陣和風起遍地盡花開問世尊為甚麼拈花師云秪為你不薦問迦葉為甚麼微笑師云一人傳虛問如何是衲衣下事師云橫針豎線問一人發真歸元十方虛空悉皆消殞如何是消殞的事師云玉人夢破一聲雞離言西堂問善財遍參知識為甚麼獨不參盧舍那如來師云誰是盧舍那曰遍參知識為甚麼獨往南方師云空拶空問善財初見文殊已得根本信智其後又見文殊是何意旨師云騎虎頭收虎尾問文殊遙伸右手過一百一十城摩善財頂還攝不見有何深意耶師云葉落歸根問龍女成佛為甚麼須待分身佛集師云月落潭無影問多寶出現為甚麼須待分身佛集師云月落潭無影光明遍大千問一寶塔中為甚麼卻容兩佛師云烏鴉頭戴雪問佛土本淨為甚麼更須三變師云黃金瓦礫眠石西堂問上既無佛可成下亦無生可度未審諸佛出世作麼師云葉落階前裊問達磨西來不立文字因甚又道楞伽四卷可以印心師云竹密不妨流水過問弒父害母不容懺悔呵佛罵祖還有過也無師云花落鳥不驚問不立階級的人如何接待師云蒼天蒼天問宗教無二致因甚門庭各立師云油鹽醬醋問事事無礙緣何水不容火師云天空雲影轉問戒為定慧之基因甚麼不守師云嘛呢叭𠺗吽問三世諸佛為甚不知有師云只為你多事問狸奴白牯因甚卻知有師云觸著磕著僧問撥草瞻風秪圖見性即今學人性在何處師云山高水低進云見得自性便脫生死眼光落地作麼生脫師云西風颯颯進云既脫生死便知去處四大分張向甚麼處去師云草枯霜花冷僧問興化擯克賓維那意旨如何師云孟母三遷教僧求頌師云驀地相逄探個人寒巖獨坐自沉吟棒頭覿面全提挈從教日後自分明僧禮謝僧問紺目澄清四大海未審佛身何許大師云黃瓜茄子問一切有分何為獨許狸奴白牯師云秪為安分問古云禪是佛心教是佛語然而語從心發如何有宗通教不通者師云啞子話古今問佛祖出世凡有施為莫非為人如何是自受用的師云目瞽童人不出頭問宗門無肯語如何又有付法之說師云木人害相思僧問古人謂向上一路千聖不傳把斷要津不通凡聖今云若有佛法可傳便與古人斯言相背若實無可傳則今舉揚酬唱者是甚麼法師云不因柳絮隨風舞怎得桃花逐水流問大徹悟的人為何命根不斷師云當初秪為茅長短燒了元來地不平問有不悟的人還出生死也無師云大唐天子不肚饑僧問古云有佛處不得住無佛處急走過要問個住處不知向甚麼處開口師云上來供通是實曰不落不昧向甚麼處商量師呵呵大笑問北雁歸南地還有西來意否師云一回飲水一回咽僧問世尊云如來清淨慧皆因禪定生六祖云我這裏不論禪定解脫貴乎見性成佛佛祖一個鼻孔因甚各有不同師云一點水墨兩處成龍問知之一字眾妙之門因甚又道眾禍之門師云鏡中無痕相河底卻有沙問有一人禪也不參道也不學佛亦不做未審此人還撥因果也無師云三十棒貶向鐵圍山問極目能察秋毫因甚不見眉毛師云這裏不是問人人有個主人公為甚只是不見師便打云見麼問無一法當情為甚被物所轉師云秪為無一法當情問楞嚴云圓明了知不因心念夫心有念有心無念無且了知既不因心念願聞其旨師云動容揚古路不墮悄然機僧問一念不起淨眼圓成一切事法宛爾無殊此之境界與悟人境界是同是別師云秋深冰含碧問心不是佛智不是道如何是真佛真道師云海棠滿院香問水中鹽味作麼生分析師云花香滿粉墻問一句話頭絕斷一切事法如兵討賊賊盡兵休而因甚不悟師云鐵馬吼虛空問話頭提拶得力綿蜜處忽身心世界盡情忘卻時主人公復在何所師云泥牛撞倒須彌山雪航法師問若人識得心大地無寸土即今山河大地是有是無師云鏡裏莫攀花問念念釋迦出世步步彌勒下生為甚麼又說擬心即錯動念即乖師云長安甚鬧我國晏然問纔生一念即傷他永嘉又云若實無生無不生師云貧恨一身多富嫌千口少問菩薩護生猶戒草木為甚麼南泉斬卻貓兒師云當陽拈出無縫罅問古人道若論此事直須如鏡常明為甚又說打破鏡來與汝相見師云柳巷花街無住足問自心起信還信自心且道信後如何操履師云石牛翫月問達境唯心已分別即不生畢竟如何達境唯心師云潘塘花柳醉遊人問如何是今日事師云花紅柳綠問如何是無見頂露雲攢急師云夜半正明如何是劫外靈枝不帶春師云天曉不露如何是那邊不坐空王殿師云莫守寒巖異草青如何是爭肯耘田向日輪師云不向紅紫鬥芬芳僧問參到急親急切處一念不生時回頭返炤尚有一念不生在此後當如何用心師云此處正是生死根本須要努力打徹始得問參到內不見心外不見境止有虛明一片凝然不動者如銀山鐵壁去此後當如何用心師云境空而心不忘正要跳過銀山鑽穿鐵壁方可到家問參到急親急切處不自執迷不取解脫不斷生死不求菩提當此際也雖有妄想亦不留礙此後畢竟如何用心師云此處正是鐵山下鬼窟莫守寒巖異草青坐卻白雲宗不妙必須百尺竿頭更進一步始得問參到根境無依猶如空中樓閣七倒八顛相似畢竟于用心處云何倒斷方能續佛慧命廣導群迷以報我和尚之恩耶師曰必須將此七顛八倒抖擻乾乾淨淨向那邊更那邊打一個翻身回來卻向今世門頭應用無礙雖然如是更須知有向上一竅在若要知此向上一竅老僧與你通個消息三秋籬菊陳金色映水芙蓉朵朵鮮僧問如何描得先師像師畫圓相示之僧無語師良久云會麼僧云不會師云先師像也不識僧禮拜僧指先師像云這個醜陋形阿誰肯供養師云專為流通問最初威音王末後樓至佛參見何人師云鬍張三黑李四問如何是寬闊句師云包天裹地問多年舊病不痊乞賜一方師云慈心湯送死貓頭問家遭賊劫賊又不知贓又不認得乞賜神力相扶掃除安靜師云王莽元是漢朝臣黎明郭居士送書至師開見一張白紙師云已喫吾三十棒了也遂將此語寄回師一日上堂有僧問云修證則不無染污即不得一物無依的人作麼生修證師云秋樹梧桐老僧擬議師便打三日後僧進方丈師云敗兵來了僧云今會也師云秋樹梧桐老汝作麼生會僧云當體赤條條師云未在僧即云秋樹梧桐老當體赤條條隨緣閒應用何處不逍遙師打一竹篦僧禮拜僧從木渡來求住請開示師打一棒云會麼云不會師云汝向這裏看去年深日久自然有個入頭甕中不曾走卻鱉復示之以偈云一棒當陽勢自彰要伊直下肯承當電光石火如能薦頓息伶俜返故鄉座主修和參禮人事次問云門庭施設即不問如何是乾清宮中事師云木人舞袖修作禮師反詰曰宮中事且置門庭邊事如何僧擬議師便打
