body:
  text: 明住天台護國寺嗣法門人寂蘊編問荅機緣師住護國眾請結制上堂不允惟任入室請益一日內外堅請上堂師遂呵罵拄杖打出有僧曰請和尚說法卻被打出又一僧曰這老漢全身為人僧問如何是宗乘師曰破草鞋僧問如何是禪師云松枝垂曲曲居士問生死不明乞為開示師曰爾既不明何因到此士曰仰和尚大名師曰承誰恩力能知瞻仰士沉吟師震威一喝士遂有省居士問天台山高未為高和尚德重是為重請垂悲愍為示至道師曰道在爾邊求之卻遠士曰弟子迷昧敢乞指明師拈起竹篦曰會麼復擊案曰吽吽士連拜曰即此是也師打一竹篦曰更道士復作禮而退師曰會則迷迷則通士沉吟師曰依此看去僧問昔韶國師紹法眼正脈未識國師正脈還有相繼也無師曰歷歷曾無昧佛祖總相傳進曰恁麼則五宗原一脈堪笑復分門師曰闍黎知一脈也未僧沉吟師曰若是到家人何須話長短僧問趙州有趙州無還是有無否師曰天清地濁進云許人學說道理否師曰不許僧曰為甚不許師曰佛祖無法說僧無對師打一篦曰參僧問如何是室中事師曰非汝能知僧曰請和尚指示師曰且去明日來僧禮拜師打一篦曰這裏無內外卓卓要分明僧問護國十景如何是紫霞峰師曰仰之彌高如何是玉印峰師曰鑽之彌堅如何是永護峰師曰瞻之在前如何是三台峰師曰忽焉在後如何是蓮花池師打一篦曰會麼僧曰景致蒙師指宗乘事若何師曰主山高聳案山低僧作禮師曰還有問麼僧無對師喝復曰歸堂去如安麗然論古彼此不服師聞喚入室中曰你各舉來二僧將開口師曰每各好與三十棒皆作禮而出時有僧曰是賞是罰師打一竹篦曰歸堂去素樸闍黎問天台聞久今日親來不涉途程一句請師明示師曰露柱懷胎賴燈籠進云與麼則宗風遍大地個個獲清涼師云在汝分中如何受用僧拜云頭頭自偶諧師微笑僧問昨日燈籠發笑今朝大地增光秪如光景俱忘又作麼生師曰石女踿躚無朕跡木童撫掌孰能窺僧拜曰謝師荅話師曰得兔貴忘蹄四月八日戒期畢園頭問如何是戒師曰莫動著如何是定師曰洪波本自如如何是慧師曰光明曾遍如何是向上事師曰霞峰卓爾出群峰僧拜師打曰少此棒不得師垂問曰賓主睦時全是妄君臣合處正為邪作麼生得不妄不邪去眾下語不契時嘯雲上座即趨室中曰聞和尚垂問今來奉荅泥牛吼破沉潭月木馬嘶空峻嶺雲師微笑曰親到始得雲曰這是甚麼處還著得個親疏師休去次日結夏制命為第二座時有數僧乞為說破雲曰請問和尚去僧問師師曰問取西堂去僧回復問雲曰問和尚否僧曰和尚叫來問師雲曰昨夜石虎生雙子今日依然不見蹤僧不會作禮而去雲曰蒼天蒼天師聞曰疑殺世間人僧入室禮拜呈夢曰昨夜得一夢夢師付拄杖一根即陞座說法今特呈師師曰你若除卻虛浮心肯真實做工夫日後自有悟在何必打妄想作夢又來說付法恐有人笑你在僧面赤而出師大罵之有僧呈紙一張跪地求法語內要師讚美師大書一篇末後乃曰能依病朽語不枉為個僧不然終是驢前馬後輩會麼風吹陣陣桂花香紅輪映入雞冠赤師游桃源洞回作詩一律侍者舒光問如何是杖頭春色師曰照天照地進云如何是缽底清風師曰八面四方進云人人有分為甚麼和尚獨自受用師曰柰他腳跟不點地進云恁麼則個個受用去也師曰且到桃源洞口看僧禮拜曰不外此山中師微笑僧從天童來呈頌一本行腳機緣一本乞師印政師曰若求印政則非正也僧不服無語師斥之曰野狐精處處食人涎唾濟得甚麼事僧知非乞開示求住師令焚之復開示僧半月不睡後有省師住崆峒座主率眾參問云如何是無聲聞師云鴉鳴鵲噪如何是離色見師云青黃赤白如何是和尚眼師便喝如何是學人心師云鑑炤進云和尚莫分別師哂云汝又向分別處作活計僧問如何是子仙禪院事師云人人鼻孔撩天進云秪如崆峒八景又作麼生師云怪石奇峰秀進云崆峒八景與子仙禪院事是同是別師云青流落貢溪石鼓參問云學人偏位中來請師正位中接師云不接鼓禮拜云謝和尚慈悲師云話未圓在鼓人事畢侍者禮拜問云石鼓問話未圓請和尚圓卻前話師云你問來者云為甚麼不接師曰恐汝向正位中作活計本珠問雪覆千山何處覓歸家之路師云看腳下問明月蘆花如何辨別師云瞠開眼問佛祖近傍不得的人作麼生親覲師一喝珠禮拜好木問學人妄習塵勞斷不是不斷不是畢竟如何是師云莫把是非來辨我浮生穿鑿不相干問鬼窟風起家賊難防還許剿麼師云正好聽用問智識俱泯聖凡不立的人為甚麼還有嗔喜師云煤人頭戴五花冠問千刀萬刃不能入的是甚麼物師云水底燈花問有無俱非如何是非非旨師云一呼三尺浪一吸九州乾界滋問歷代規模從何而起師云看取令行時問如何是山中禪師云頑石蒼苔古如何是市中禪師云驢嘶馬叫如何是村中禪師云犁耙日日新問盡大地骷髏如何活去師云花開碧嶂紅如錦問拈刀弄斧如何不犯鋒鋩師云雨打梨花蛺蝶飛問截斷命根如何下手師云頭落也不知問出脫這個將甚麼提攜師云葫蘆浪裏顛問鳥道玄路如何得縱橫無礙師云橫衝直撞問如何是君師云紫石磊磊尊如何是臣師云雄峰草色青如何是君視臣師云青鏡炤花林如何是臣奉君師云黃葉舞秋林如何是君臣道合師云古殿無朝客永絕天子音問古云投子山打瓦鼓楊平山撒白雨秪如瓦鼓子作麼聲師云鼕鼕進云白雨下取龍女織得絹二丈五一半屬羅江一半屬玄武這疋絹又作麼生分張師云你一半我一半問古人閱破灶墮因緣忽然大悟如何是他悟處師云白日見青天問前問一併芟卻請師沒口道一句師畫僧問世尊拈花達磨面壁崆峒為甚麼水上來師云一機獨露問江西馬祖稱選佛場秪如不落凡聖的人又作麼生選師云高中一名問活潑潑轉轆轆地未審節目在甚麼處師便咄問同光帝問興化朕收得中原一寶秪是無人酬價化云借陛下寶看帝以手引撲頭腳此意如何師云白鷺下田千點雪問雲門一寶如何秘在形山師云黃鸝上樹一枝花問如何是大唐國裏無禪師師云古路不逄人問如何是廓然無聖師云故國絕疏親僧問悟後的人未審以何為食師云一株菜三莖虀問達磨大師隻履西歸得何方便師云兔角拄杖鬧長安問前百丈為甚墮野狐身五百劫師云陰花難盛露後百丈為甚麼出得野狐身師云朝陽日色舒問文殊為何出不得女子定師云雄峰覿面存罔明為何又出得女子定師云松翠鎖雲煙問高峰枕子未落地時是如何師云寶持琉璃瓶安能快撒手枕子落地後時是如何師云家中無一物出門利萬金問如何是𩿶崛救產難因緣師云一片祥雲起幾處妄疑猜問如何是崑崙騎象鷺鶿牽師云石筍開花色正鮮問大千卻壞時如何得不隨他壞師云牛皮鞔鼓響鼕鼕曹自悅居士問一念未起時如何師云石人戴銕帽復頌曰石人戴銕帽不落古今調真機覿面提當下沒可保問萬念紛擾時如何師云縱橫自在頌曰縱橫自在成團作塊塢裏桃花岸邊柳絮問忽然忘念時如何師云夜半日頭落頌日夜半日頭落當念亡穿鑿識得渠儂時驢子三隻腳師上百丈泰和縣妙合請齋於苾芻園楊塞雲居士問云大師親覲湛老和尚幾多年師云前三三後三三又康田甫居士禮拜有楊行甫居士云此公乃宗門中人也師提念珠云這個是宗耶教耶律耶淨土耶康云總不與麼師云居士畢竟又作麼生康無語師云好與三十棒宗侯朱玄阿居士問江西緣起無風之波振一旅之師防不須打殺如何得天下太平師云木女彈琴問孔子厄於陳蔡從者不亞崆峒千古文章於斯為盛今日大師遭圍是同是別師云石女觀陽燄問白法道場今已復某甲晝夜黑漫漫敢問眾緣作麼生得淨師云木馬遊春僧參云會曹洞宗旨師乃舉僧問洞山蛇咬蝦蟆救即是不救即是山云救即雙目不睹不救即形影不彰如何是救即雙目不睹僧云猶帶識在師云如何是不救即形影不彰僧云猶帶情在師云恁麼則未知洞山宗旨在師復舉此以驗大眾各下語呈頌俱不契師意維那克歸請師代語師云你問來歸禮拜問云如何是救即雙目不睹師云芳花無豔色如何是不救即形影不彰師云銕壁也須放光明復請師頌師乃頌曰芳花不豔澄真跡銕壁放光露古顏正去偏來全理用沒弦琴上有音鮮僧復呈八問師一一荅竟更請師頌師頌八首以示之僧問如何是一色師云雲封古岫復頌云雲封古岫本無差心境何勞驗作家兩岸蘆花飛白雪禪人依舊眼睛沙問如何是不得色師云根境不到復頌云鐵壁銀山若個攀大千沙界絕遮攔石牛高臥忘水草獨坐巍巍睡正殘問如何是借師云清風明月復頌云脫體無依絕往還也須垂手過前山桃紅柳綠花狼藉滿面東風開笑顏問如何是借借師云明月炤見夜行人復頌云一顆摩尼全體露赤白青黃影現中方圓長短渾無礙癡兒切忌墮偏中問如何是不借借師云石牛吐露三冬暖復頌云夜深獨自寂無依開門閒步月明時藤蘿倒挂懸崖下又聽猿猴喚子歸問如何是全超不借借師云石女踏翻水底燈復頌云寒冰冷凍正威嚴玉關寂寂有誰前琉璃殿上君臣泯杳杳未央不露顏問如何是始師云肇復頌云有時覿面不相逄有時相逄不覿面瞥爾一念露真規石火光中須急薦問如何是末師云黑頌云末後一句太無端木人歸去夜深闌麻衣脫卻形蹤泯衲子徒勞著眼看蕃光問久別尊慈特來省候如何得不辜負去師云只要你設齋光舉坐具云請和尚慈納師一掌光禮拜云謝和尚不吝慈悲去也師呵呵大笑垂問師住龍華護法唐司馬存憶居士誕辰又因薦舉招尤師命眾諷蓮經延生解釋經畢師垂問云退位朝君即不問冠帶還鄉事如何眾下語畢請師代語師云歸隱林泉榮祖業那管長安車馬喧師住崆峒因侍者玄輔禮佛師問云禮拜為求智慧為甚愚癡喫飯為要腹飽為甚肚飢者無對請師代語師云執藥應成病貪餐過轉賒又云一帶煙嵐封寶蓋數點殘星霄漢中崆峒除日供雲門大師真師問眾云從古已來皆稱頂像老僧今日將雲門先師寫作像頂汝等諸人商量看還是頂像耶還是像頂耶說得端正明日秉拂眾下語畢師云總沒交涉克歸問云師意如何師驀頭一棒便歸草龕克歸復問畢竟是像頂是頂像師云雲封寶蓋霧鎖崆峒克作禮而退元旦齋畢師問盡虛空所有世界盡世界所有人物言過年拜節還有不過年的人麼眾下語不契僧請代語師云寶鏡不隨春色轉澄潭豈逐月輪飛眾入室問安師問昔日十大高僧為郤氏夫人禮懺郤氏得脫蛇身今汝等二十人禮懺為老僧保病懺完為甚老僧病不愈侍者云豪門偏覺貴天子不知尊師云也只道得一半者問訊云謝和尚證明師于戒珠垂問云黃昏雞報曉為復不知時節為復別有長處又問云有一人大唐國裏不許安身蠻夷邦中無容住足且道過在甚麼處師百丈垂問三則云佛殿當門簷椽因何墮落一花問野狐既脫去皮袋因甚虛名千古不昧問冬天日色為何寒冷荅幻輪法師十疑問并書附來書伏惟宗門久曠湖地更疏數百年不聞提唱之聲幾千里少見舉揚之事茲者禪師出世弁巘流光整持已墜之綱振起永淪之界人天拭目以觀瞻龍象傾心而咨請大聞向閱禪篇殊多疑閡未逄具眼作家曾無剖決幸遇出群宗匠有藉指歸望金錍之抉翳眚目輝華願寶鏡之鑑微愚裏朗豁略申十則顒俟報音激切具陳伏希慈悉世尊降跡惟指一心無人擔當三乘別演開性相於空有談經論於五時方便調機皆為一致拈花破笑乃心體之傳來不立語言實覺知之格外迷之者禪目禪而教自教悟之者禪即教而教即禪惟在人明道元無二今承數問理矌機微略陳鄙懷寧副尊意伏惟明鑒草復不宣今於十問每一問下各有二荅先以宗眼提持然後依理破疑問世尊始降分手指陳天上天下唯我獨尊此宗門第一則公案也疑曰宗門之唱必為接機當此之時所集者不過宮娥綵女走使黃門而已誰能領悟玄旨而世尊急忙舉揚此道也且功不浪施法無虛設若唱此玄宗無一人領略者不徒然其聞設乎此事在教用顯三界獨尊則便在禪而為第一極則恐未必盡與否荅明月舒光又破疑云雖知根鈍且稱本懷也要露個消息世尊一目曾非男女黃門之別也問普眼欲見普賢三度入定不可得見佛教普眼但於靜三昧中起一念便可得見普眼依之果然得見普賢疑曰禪宗之道要在一念不生純清絕點太虛相似尚難湊合此何入定不見而反起念得見耶豈靜定之功不如動念之有力耶今欲求見法身還以靜定而得見耶還以動念而得見耶荅秋風吹黃葉破疑法身無相不可以動念見也無動念處是真見法身普賢即自心之行也行以動念觀之故見耳問世尊說大集經敕一切眾生各發弘誓唯一魔王曰我待眾生悉盡成佛無有眾生名字我乃發菩提心疑曰此魔王者住何境界而作如是倔強之說也然此是能發菩提心者耶是果不能發菩提心者耶荅月落潭無影破疑真法界中無有發不發耳祗是一個魔王何境界之有哉問調達謗佛等罪生身入地獄等又經言調達累世與佛為讎至於法華則言調達是過去授法之師轉授調達當佛之記疑曰調達於此果入地獄耶不果入地獄耶入地獄則違法華師佛記佛之文不入地獄則背謗佛讎佛之說畢竟是何意耶荅風吹柳絮毛毬走破疑實際理地不受一塵秪是一個調達無有墮地獄成佛之事今世門頭不捨一法則先酬其報而後成其佛有何不可問世尊靈山會上拈花示眾眾皆默然唯迦葉微笑故得付法疑曰此是百萬人天眾非不廣也教化已久根非不熟也迦葉之在法華猶為中根其餘上根利智非無傑出之人也此道人人有分何止一人獨得而餘皆絕望也經云但有聞者皆得作佛豈教之接機普而禪之接機隘也荅仲冬嚴寒破疑雖眾廣根熟所悟不同一人領解者意在付囑此道非廣隘之謂也問世尊臨入涅槃文殊請再轉法輪佛言我四十九年未曾說一字疑曰佛法流入此土者尚五千餘卷而天竺及天宮海藏不知其若干數量矣經云去來坐立常演斯經文云熾然說無間歇而世尊何緣作如是說耶佛無妄語畢竟是曾說耶未曾說耶荅門外歌聲滑破疑五千餘卷龍宮海藏者乃黃卷赤軸也常演此經無間歇者乃自心之旨也豈關名句文身事乎問從上禪宗一向闢教然初祖西來即以楞伽付二祖為印心之本五祖以金剛而設化六祖聞無住生心之旨而開悟後之繇華嚴法華楞嚴圓覺等發明此道者不一則教無負於禪也而禪何妨於教而用闢之茲復還並行而不悖與否荅石女梳粧破疑曾無祖師闢教之說或有闢者皆是呵叱其病也非叱其教也如永明天如泐潭諸大老皆宗教並行之問古聞禪律相非蓋禪則直捷簡徑律則瑣細勞煩故兩不相入也然禪是佛之所傳律是佛之所制其源同出於佛也僧者均是佛徒同尊佛道何故相非還當各循一法而行也還宜兼修而兩無害耶荅芳花無豔色破疑通人達士必無此說執相迷心故爾相非禪是心之體也律是心中相用也有用無體全是虛詐有體無用必喪孤危若缺一者乃凡夫見耳問中峰禪師云禪者淨土之禪淨土乃禪之淨土也有言參一歸何處與參念佛是誰皆可以起疑情發悟門者也如永明天如楚石空谷諸師皆以禪淨兼修今可即念佛以參禪不離當處求生安養與否荅九品無冬夏又曰禪土皆自心耳如中峰所言問大聞愚昧一法無知曾覽華嚴一真法界廓爾虛通次探法華實相玄宗凝然常寂究楞嚴妙如來藏會萬有以忘緣研圓覺平等性智合群靈以朗鑒涅槃之法身常住三際文虛而絕待般若之炤體獨存纖塵片境以無根法有多門理無二致依教之見解如斯於禪如何得契合也荅陽焰翻波又云且喜公會如來禪矣若要會祖師禪須向僧問雲門如何是透法身句門云北斗裡藏身從這一語下會得即契合一道也末後觀禪歌甚妙大有宗趣公當禪教並行之也
