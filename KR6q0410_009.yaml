body:
  text: 明住天台護國寺嗣法門人寂蘊編頌古正偏五位正中偏夜深玉女不成眠漁翁舉棹清波上攪動澄潭月一團偏中正萬象森羅圓古鏡物物全彰照不差絲毫皆入那伽定正中來有無不涉絶塵埃炎天大雪飄飄墜火裏蓮花朵朵開兼中至賓主相逄天然義全憑語脈露單傳一句當陽明的的兼中到打碎髑髏真個妙劫外今時俱不拈那有毗盧印可寶功勳五位本無位次絶參商也須移履下村莊六戶靈靈忘死捨何勞守住在枯樁向念念無私不敢迷百花叢裏看為持千紅萬紫芬芳好總屬東君一道施奉不居空有謾商量縱使離婁眼似盲無孔鐵簫雲外品不干六律與宮商功心色相交理事融權施應物道人風昨日家童頻報道葵花傾向日明中共功不向威音那畔行豈從今世門頭立渾然打破舊時窩鐵鷂鑽天沒蹤跡功功奪人不奪境一樹碧桃紅似錦兩瓶金菊賽金蓮個中非是陰陽地不許佳人著眼看奪境不奪人春風疑不到天涯二月山城未見花公子王孫徒玩賞那有紅紫帶回家人境兩俱奪天崩地裂人民喪那有君王正令行神劍亡鋒歸寶匣生佛而今徒有名人境俱不奪攜酒遊東郊山花遍地紅笑談歌舞去意氣自匆匆三玄三要第一玄動靜不干絶衆緣更闌萬籟聲俱寂禪者徒勞著眼看第二玄威風凜凜劍光寒紅旗閃爍乾坤淨電轉星飛過碧天第三玄越州城裏倒撐船東雙橋下多裝載西郭門頭去復還朕兆未分作麼道石女頭戴紫羅帽深閨不出冷愀愀宮漏沉沉天未曉一一法元無萬法周喝下何曾有去留轉側木人剛半夜珍衣不掛柳稍頭二日出峰頭本自孤高低普照有於無百花競秀爭光彩半點工夫用得麼三一喝如金剛王寶劍神威凜凜倚天寒阿個男兒敢近看擬議欲將佛祖現人亡馬喪滿長安一喝如踞地獅子全身獨露沖寰宇那有妖狐現本形一吼乾坤皆振裂個中誰是對機人一喝如探竿影草試將一語知端的驗彼來人有與無穿過髑髏行正令神嗥鬼哭兩眉㤤一喝不作一喝用喝時秪麼忘消息佛祖機緣收不得野鴨湖中翻浪飛不知身上乾和濕賓主歷然月色穿雲透碧霄波斯夜半舞風濤山頭白浪連天地石女經行俏步高正法眼藏掃除空有任繁興大地山河一掌平法法頭頭開正眼寒崖花發不沾春妙唱不干舌青松翠竹解談禪流水高山總亦然二六時中無間斷老僧何用口唇宣死蛇驚出草骨爛皮穿氣息無忽然撞著爪牙舒神威一振清四海狼煙滅盡豈躊蹰解針枯骨吟鐵圍山下骨一堆些兒觸著振全威驚回石女雙流淚至今猶自倚雲飛鐵牛舞三台千載鐵牛忘水草而今放出兩岸來足伸踏破毗盧印尾搖掃盡九垓灰三墮頌并問答僧問如何是類墮師答云觸處逍遙絲毫無染披毛戴角混塵埃足舞西風類莫該芳草垂楊俱踏遍渾無些子帶回來問如何是隨墮答云百花林裏過一葉不沾身聲色叢中任意遊鬨然出沒豈能收山花鳥語縱橫現何有纖毫染污尤問如何是尊貴墮答云不住九五位常與群臣遊虛寂靈源不自尊常隨六國走煙塵秦樓玩月燕邦戲到處逍遙到處人涅槃經四生頌并問答僧問如何是不生生師答云冬至才逢九春來百花開明淨摩尼珠本來無一物當臺鑒照時隨處陳方色問如何是生生答云青山點翠忽然一陳雨溪澗長洪波枯稿悉滋潤農人笑呵呵問如何是生不生答云境像收歸古鑒中桃李花無豔遊人興自衰水中無月影免使費心裁問如何是不生不生答云石女打破鏡石女忘歸路木人何處尋杳然無影跡佛祖莫能形就路還家觸目青黃露本真縱橫到處是家珍水底金烏天上口眼中童子面前人新豐曲子昔日新豐曲無人和得齊今朝重舉似音韻果然奇明月印蘆花蘆花開遍野明月挂中天不識其中意都言一色然鏡裏梅花清香墮石光閃若電渴鹿逐陽焰木女害相思泥人繡花絹竭盡今時真如心裏妄涅槃性上塵自己非堪寶佛祖是閒名分明月在梅花上看到梅花早已遲一段風光照眼鮮何須攜手入桃園運足已乖空劫旨擬尋思去隔天淵汾陽重陽九日菊花新義公拈出膠盆汾陽不覺粘手賴因菊底翻身不然甚麼開口不開口木人捧起盤兒走重陽日頌示禪人重陽九日菊花新特示三玄意旨深報爾知音禪衲子今朝籬菊又重芬法身雲起山頭暗風生樹搖尾桃開三月花菊綻九日蕊法身向上事鐵樹花開正是時忽被石女摘一枝沙神怒發須彌倒驚起泥龍上玉池萬象之中獨露身赫赫威音外獨超萬象先明明無隱匿何處有三玄法界緣起一波才動萬波隨滴滴全彰造化機落葉梧桐秋已蚤百花開處鷓鴣啼須領略莫狐疑翠竹搖聲兮風生大野月映寒潭兮碧水畫眉僧問百丈超云某甲今日辭去或有人問和尚說甚麼法向他道甚麼超云但道大雄山頂上虎生獅子兒虎生獅子兒木人唱巴歌擬議停思者卻被佛祖呵僧問明照安一藏圓光如何是體安云勞汝遠來僧云莫便是一藏圓光麼安云更喫一碗茶問處分明答處彰圓光之體露堂堂春風布遍山花早秋氣臨時樹葉黃僧問百丈惟政禪師云牛頭未見四祖時為甚麼百鳥銜花獻師云有錢千里通云見後為甚麼不銜花師云無錢隔壁聾一段春光照眼鮮攀花弄柳任溪邊時人須識東君意莫向枝頭覓翠妍百丈普請鉏地次僧聞鼓鳴歸院因緣鼓聲才動競頭奔卉木俱霑雨露恩重勘過眼中釘百花叢裏覓鮮新百丈因一僧哭入法堂因緣哭上法堂草深一丈一時埋卻野狐伎倆匝匝清風撲面來舒襟樂意頻收放百丈惟政禪師問南泉諸方善知識還有不說似人底法也無泉曰有政曰作麼生泉曰不是心不是佛不是物云云一問一答真機漏泄更欲重徵喬木生節寒凝遍布兮霜花朵朵黃葉飄零兮朔風凜冽僧問百丈智映寶月禪師云師唱誰家曲宗風嗣阿誰月云窣堵那吒掌上擎云云窣堵掌上擎覿面已分付更欲問如何特地成露布不露布初生孩子元無褲百丈道恆禪師三訣因緣喫茶珍重歇時人眼中屑若喚作三訣重添第二月穿衣褁腳下禪床運水搬柴知時節百丈惟古禪師上堂多虛不如少實一卓一語機用雙舉更問如何大蟲捉鼠百丈中靖元肅禪師塔尖尖聳青虛巍巍磨太古欲識渠儂言但看清風舞漁家傲題船子夾山因緣一語合頭猶未徹禪師笑倒才方革劈面三橈君已瞥眼中屑回顧頻頻繫木橛覆卻舟兒真剿絶夾山從此偷心歇兩岸蘆花飛白雪向誰說幾度秋光與明月又頌金鱗已遇意偏攸誠老何曾覆卻舟萬古清風波浪吼依然蘭棹在中流僧問夢筆禪師如何是佛師云不誑汝僧云莫便是麼師云汝誑他寂寂沉沉無所倚全提覿面莫能擬春風散盡桃花飛秋月影臨江水止閩王延夢筆禪師齊王問曰好將得筆來也無師云不是稽山繡管慚非月裏兔毫大王既垂顧問山僧敢不通呈覿面通呈非兔毫輕分閩主不辭勞梅花吐處春香露煦日才臨冰質消王又曰如何是法王師曰不是夢筆家風不是家風一句機偷香暗裏有誰知千峰布列須彌勢萬派宗分大海歸雲門三種獅子師居雲門室中作入窟獅子斂跡藏形古壑中豈尋聲色受華榮聖凡掃卻無依倚斗柄星河霽碧空出窟獅子爪牙抖擻望天關哮吼一聲碧嶂寒魔外不知何處去威靈耿耿落人間不出不入獅子窟內未曾留形跡人間那得有聲名石筍抽條千丈碧泥花發豔四時春圓覺經頌文殊章本起如來清淨因桃紅柳緑一般春凡夫不了元無我病眼空花認作真圓照婆伽親指示依然幻翳眼中生文殊當下知消息石女峰頭喚故人普賢章幻化元來生覺心春風微動水生鱗時人但見波濤滾豈識波濤全體真有覺還同如幻立若緣無覺鏡中痕兩重公案都除卻天柱峰頭蓮萼新普眼章漸次修行滅幻門火風地水究元辰忽然突出娘生面剎剎塵塵總是春擲柳黃鶯歌上苑穿花杜宇繞南林泥人玩月思情美石女簪花巧樣新金剛藏章金剛抉破三疑網幻戲場中脫卻衣若說本來成佛道挖瘡好肉事非宜只因蒙昧難開曉金喻重重說是非識得上林花滿地風翻蝶舞過東籬彌勒章起心若欲斷輪回荊棘叢生覺地迷夢去雖然諸種事醒來何有半毫微若能寤寐都拈卻撒手懸崖好作為鐵犬山中呼萬歲泥猿樹上唱囉哩清淨慧章聲聞魔佛及菩薩正眼觀來總是邪朕兆未分難話會鴻濛已判念心差千紅萬紫筵青嶂總是陽春一氣嘉踢破乾坤收腳轉回頭別有好生涯威德自在章突出乾城三觀門止啼黃葉卻非真新人乍出梳粧巧莫認衣裳要認人戲水遊魚知水意穿花蝴蝶味花深長安一曲有餘樂野老君王共太平辨音章二十五輪遍互修一輪於內作根繇列開寶網光相映影現重重無盡頭四塞八蠻朝帝主兩京七地總皇猷鄉村野老茶鹽足一曲升平樂事稠淨諸業障章萬象收歸古鑑中我人生命盡消融空中飛鳥無形跡水底遊魚有甚蹤出岫浮雲何處往乘風花瓣任西東回頭忽聽木人鼓魄散魂飛沒影蹤普覺章作止任滅聽從為休將四法取圓基平懷一種隨高下大道從來沒是非碧嶂野花開似錦石人觀去絶惺迷妙開寶印空中起印印何曾半點非圓覺章上下中期結制修鈍根須假煆塵浮大鵬翼展沖霄漢豈類鴳鶉落草丘十世古今頃一念誰能百日定程途狸奴白牯咸知有飢則餐兮渴飲流賢善首章三世如來一口宣流傳須要善賢兼能聞一句勝多寶羅漢難同半偈肩不是天然生就覺又非觀行始成圓鷺鷥昨夜沙汀宿分付漁翁仔細看總一道靈光貫古今剎塵俱是一毛吞獨超物表離名相阿個能言圓覺心一自伽婆分旨後千燈千照續燈新孑蘆隨海飄波去熊耳峰頭花滿岑首楞嚴經要頌大佛頂三德圓明非形相直教佛祖也難觀一聲胡笛邊營外幾處凄涼幾處歡首楞嚴王一相該通空劫前河沙功德孰能宣超然不屬青黃色了了無依當處玄七處徵心七處徵來七處真鷓鴣啼在百花林遊人沉醉桃園裡昧卻枝頭好鳥音五陰真如迷卻翻成妄相妄空時當處真收拾伽缶歸去後白牛耕破劫前春六入一團空聚無彼此癡兒妄自別疏親堂堂天子登朝日六國文明賀太平十二處塵塵三昧首楞嚴擬心取著早乖遷月穿潭底非形相癡子徒勞摸碧川十八界本來一相無疆界那許其間物我分十八疑關齊擊碎滔滔流水下滄溟七大事理交參周法界將心擬處涉流沙情塵識破元無事木馬遊春意自賒聲塵圓通妙音本自無來去聞聲悟入已成虛直須透徹聲前韻浩浩紅塵任卷舒色塵圓通色色塵塵淨法身秪因憎愛昧天真苟能觸處通消息堪笑沙陀入聖倫香塵圓通妙香元不從天降爇向爐中塞碧虛觸著些兒頭腦裂衲僧巴鼻盡蠲除味塵圓通古今一味平胃散點著通身冷汗流慶快怡然拋藥病那容更犯死貓頭觸塵圓通能洗所洗性本然驀頭一潑觸光圓器界根身渾一色輝輝秋月照中天法塵圓通心緣既寂法塵空事事全彰振古風東嶺桃花紅爍爍西溪流水響鼕鼕眼根圓通見色非關眼上能時人休向眼中親應知那律非循目智鑑圓明耀古今耳根圓通反觀聞性性俱空頓入圓明顯妙功歷歷松聲連夜吼呱呱鳥語亂山中鼻根圓通循空返息本非真翻身踏倒涅槃城紅日舒光來嶺畔清風明月過溪濱舌根圓通身心世界兩相遺覿體全超知不知處處總成真法界禪兒何事苦尋追身根圓通無痛痛覺覺亦空根身從此影無蹤出門不踏來時路方顯男兒志氣沖意根圓通物物頭頭本自真何須旋法美空生寶明空海人元具桃李爭妍處處春眼識圓通心見圓明處處彰白雲閒矣水偏忙為憐頞下生盲者權示漚和演妙常耳識圓通無心聞處是心聞塵剎全彰這個人百億分身無去相六牙常在寶王城鼻識圓通鼻端白相示修行暫爾權為縛犢繩忽然摸著娘生鼻林泉巖谷悉光明舌識圓通奇哉妙舌自天然不假喉唇齒吻宣無孔笛吹清韻徹滿慈謾謂得親傳身識圓通身本無根何用執心本無生何用息身心寂滅兩俱空透此方名真法質意識圓通一段情城當下除神通遊戲總無拘塢中昨日濛濛雨嶺上今朝日色舒地大圓通根身器界若微塵微塵空處即天真堪羡頂門開正眼大千沙界一齊平水大圓通滔滔流水性真常若個於斯返故鄉直於山海忘能所蝴蝶穿花過粉墻火大圓通凡火欲火智慧火清淨寶焰光裸裸大千閃爍熾穹窿燃卻佛魔與物我風大圓通群動悉憑風力持反觀風力亦無依忽然踏著風中主飄飄一葉過南池空大圓通色空本自一真空逐境迷心有異同異同照破真空現翻轉真空跨鐵龍見大圓通六根清淨生元佛六根妄染佛為生見覺圓明生佛淨個中那有樂邦名識大圓通十方唯識鏡中痕但離取捨妙圓成頭頭盡是天真佛念念全彰阿逸身圓滿菩提歸無所得元宵通夜家家火水月交光處處圓五十七番虛涉後始知空費草鞋錢總二十五個鐵蒺藜頭阤拶作雪花飛緑水溶溶歸巨壑白雲片片繞須彌金剛經要頌世尊著衣持鉢一段風光秪在斯著他依舊不為奇清風陳陳飄香至碧水滔滔畫翠眉應如是住搬柴運水尋常事覿面無非是道場觸處盡成安樂地何須此外更商量如是降伏其心著衣喫飯任從為映色摩尼衆像隨但得有無諸念淨金烏依舊落城西實無衆生得滅度者空花鏡像了無關擬欲援生墮鐵山踏破瞿曇關捩子風自清兮雲自閒不住於相祖印高提不住中巍然大用有無空騰騰任運靡存跡霧鎖秦宮絶雁鴻應無所住而生其心坐斷兩頭中莫立逢緣擊節任縱橫摩尼現色原非有石筍開花映水紅無我人衆生壽者木子山中敲鼓鑼泥人拍手助高歌忽逢瞽叟來瞧見滿面慚惶沒奈何四果不作是念設分位次隔參商息卻名心絶短長若是威音親嫡子不從這裡費商量燃燈佛所於法實無所得倚門傍戶走他鄉雲水將來作道場倏爾踏翻潭底月了無一法贈劉郎持四句偈得福甚多家藏白澤勝神符百怪安能敢穢污若得空王真號令三千諸佛作驅奴歌利王割截身體忍辱功能作聖人幻成四大卻非真任他節節支離去一段風流獨露身一念信心即得菩提棄家浪走不如屠自昧千金七寶軀偶爾忽逢長者示凡心即與聖心符受持讀誦此經若為人輕賤一節念念輸忠不敢違色聲叢裡了無羈苔封古殿忘臣主阿個能言佛祖機三心不可得兔角為刀出遠征烏龜跨下羽毛生木童拔去搓繩索縛住虛空架火烹無法可得三藏靈文不較多權將音語示娑婆忽地雙林開正眼試問還曾有也麼如來說非衆生是名衆生生佛從來共一程凡民何必羡公卿如能當下歸家也凡聖原來是假名如來者無所從來亦無所去一念緣生即是遊靡分紅紫有何愁威音那畔元無動今世門頭示兩眸總忉忉怛怛老婆禪失卻瞿曇臉半邊四相掃除無一物呼名般若亦縺涎法華經頌二三乘不立一也無三一元來醒夢夫若是空王殿上客撒手歸來月滿湖妙法不在聲名上尊者徒勞授記功欲識個中端的意桃花卻白李花紅
