body:
  text: 明住天台護國寺嗣法門人寂蘊編法語示唐祈遠居士欲出塵勞斷生死而證無上菩提者必須參扣話頭而期妙悟也所言話頭者即自己本地風光歷歷孤明不可絲毫間斷古云暫時不在如同死人要念茲在茲如此做去或三年五年十年二十年打成一片人法俱空偷心淨盡露裸裸赤灑灑如明鏡當臺物來斯鑑來無所粘去無存跡不執留不計憶任運騰騰覓絲毫起滅之相了不可得此時方喚作大光明藏也雖然如是須知更有向上一竅在且道如何是向上一竅石女懶畫眉木人呵呵笑示張我復居士道本現成仁者自昧但向己求莫從他覓何也蓋人人腳跟下一著子本來現成二六時中放光動地輝騰古今無有間然良由衆生迷背自己光明循諸聲色念念攀緣無有停息曾不自知故稱為迷也公等既已知非必須發勇猛心立金剛智二六時中但扣已而參密密孜孜看這見色聞聲生心動念妄相攀緣屙屎放尿拖著死尸行的畢竟是個何物從無始以來至於今日還有第二人耶還有第二念耶若無第二人第二念可見秪是自己一段光明何不如此著眼承當個事免向外求窮劫無有得時轉求轉遠也如此見得透信得及此但秪是今世門頭古人喚作弄光影漢須知更有空劫已前一著子聲色之所不到者古人所謂無聲無臭此也誠能離卻聲色至於靜悄悄虛寂寂露裸裸時自然與他相應不然光陰易度時不待人努力努力示笥石禪人迥然獨露不用尋思湛海圓澄森羅隨映剎那忘照瞥爾情生智境睧曚白雲萬里直須向隨緣應用處拄定腳跟不昧絲毫看是何物忽然摸著自己鼻孔打翻舊日家風一段光明始能常在會麼朔風滿地霜花巧凍日和光淡蕩行示胡內生家國無常身勢幻夢念念遷謝不暫停留學道之人惟在決志透徹祖師巴鼻洞見聖賢心肝作一個頂天立地大丈夫漢也若要作此一大丈夫漢二六時中不被聲色轉不被名譽縛莫苦飢寒勿受利養秪究己事為懷切參為念雖與衆同處不與衆同流切切孜孜綿綿密密忽爾相逢平生慶快到此方知聖賢佛祖也生死與涅槃也才智也文學也是甚麼爛狗污始覺本來無一事也勉之勉之示躍雲禪友一躍而登青雲至也雖至涅槃義天不可坐卻直須轉身離位亦不可住於這邊雖聞聲見色亦不可分別青黃好反應物現形如水上胡蘆相似圓陀陀活潑潑轉轆轆底無有絲毫住著方能妙運無窮也若如此行去三二十年自然煩惱不能縛生死不能拘捧足既無路潛覷豈有門閻羅老子雖有供養亦無處施設古云那邊不坐空王殿豈肯耘田向日輪然雖如是更須知有向上一著子始得欲知向上一著麼鑑湖明月映爐嶽白雲封示隱頤禪人皖城僧隱頤設齊懷香入室求開示師打一竹篦云會麼頤曰不會師又打一竹篦云會麼曰不會師云不知痛癢漢頤悲淚乞求微細開示師云求開示底是甚麼人曰不知師云即此求開示者當下是汝自己本來面目亙古亙今先天地不生後天地不滅經中所謂不生不滅二六時中了了常知心心無間色經眼即知青黃赤白聲歷耳即知鐘鈴鑼鼓氣入鼻即知香臭腥羶味入舌即知甜酸苦辣觸入身即知冷暖澀滑意思法即知過未善惡現現成成絲毫不昧為甚麼不自領略返向他求也頤曰若如此者莫認識心乎師即喚云隱頤頤即應諾師云是識耶是真耶頤曰弟子愚昧不知乞求和尚說破師云古人道佛法不離穿衣吃飯處屙屎放尿處迎賓待客處生心動念即不是了也汝不生心不動念喚一聲應一聲且道不是汝本來面目是個甚麼此處不可喚作識也頤曰若然者識與真何所分乎乞垂指示師云見色聞聲歷歷孤明不生分別者曰真曰智生心動念思量分別者曰妄曰識所以云生心動念即不是也頤曰蒙和尚慈悲開示若恁麼則大煞現成云何又說參話頭做工夫師曰秪為分明極翻令所得遲只為你不信所以教你參話頭做工夫做來做去做到結角羅紋處偷心淨盡忽爾觸著自己本來面目方始信得及也你若當下肯信何用許多周遮與他三二十年做工夫信的總是一般三世諸佛出來只要人信自心是佛所以云一切衆生皆具如來智慧德相又云一切衆生皆證圓覺又云汝等所行是菩薩道豈不直指爾耶又臨濟曰道流即此歷歷孤明聽者聞者是汝自己佛更莫外求馬祖曰即心是佛又僧問歸宗如何是佛宗曰即汝便是僧曰如何保任宗曰一翳在眼空花亂墜何其直捷何其現成豈非要人直下信去也頤曰蒙和尚委曲開示弟子信得及怎奈無始已來妄想流注何師云汝喚甚麼作妄想古人云識得不為冤曾非別人羅山問巖頭起滅不停時如何頭云是誰起滅當知妄想全體是個自己若人識得心大地無寸土何塵境之有哉汝今於妄想既不能全體擔荷當以智力治之一觀妄想當體全空了不可得一於妄想起時莫生厭心斷他心亦莫隨順他去古云但有念起即莫隨之則久久工夫純熟自然成一真法界矣勉之頤作禮再叩而退示鏡愚禪人今時住靜者或以偷安躲懶為事者或哄幾個齊公齊婆以過日者或孜孜於茶筍山花以營為者皆非道人之所為也汝當發大志奮大勇猛以本分事為念飲食衣服助道而已若可消遣即休不必苦勞身心虛度歲月學彼不唧溜者但自知足即是富貴古所謂憂道不憂貧也爾其勉之示存焉禪人學道之人將心地打點得乾乾淨淨不留一絲毫雜念則真心之所存焉若有一毫之念而起者則蓋覆自心為障為礙昏沉暗昧真體何繇而得明潔也若真心存則定水清慧鑑朗萬象莫能逃其形生佛莫能隱其質昭昭然物來無所粘迥迥焉物過不留跡寂靜孤圓卓爾象表豈三世十方之所間隔者哉示離愚禪人天人執有愚也二乘墮空愚也菩薩住於中道愚也等覺菩薩有微細所知并極微細所知愚也衲僧有禪道佛法見知逮機鋒轉語向上向下全提半提總皆愚也佛雖五住究盡二死永亡以法界海慧照了諸相猶如虛空若見量未脫此亦愚也且道作麼生得離愚去咦三腳香爐騰過海無毛鷂子撲天飛示恆闃禪人雪關云鏡愈磨而光愈現古人云打破鏡來與汝相見又作麼生若向這裏會得方好參禪可吃崆峒手中痛棒不然則踏破鐵鞋無覓處徒勞磨煉費工夫示曹自悅居士僧問趙州狗子還有佛性也無州云無但恁麼看去因甚道無不得作有會不得作無會但只提一聲無又恁麼看定行亦如是坐亦如是動靜閒忙亦如是參來參去忽爾㘞地一聲看破無字捉敗趙州則不被天下老和尚舌頭所瞞曹公還識無字落處麼遍地霜花美朔風夜正寒法偈示久默首座直上峰頭腳步寬全身拶入骨毛寒一日關山開霽色鵲躍蘆花心自安示嘯雲西堂習靜從來稱小節弘揚正法分當為宗綱能續家風盛始是超群佛祖兒示惠斯書記如來根本慧有無俱不立會得個中意鐵毬水上踢示朗然上座混不得類不齊折角泥牛碧天飛有時撞入乾城裏帶水和泥指路迷示本珠監院鑑湖一輪月發揚佛壟春百花齊放處大地喜吟吟示破暗侍者如來淨慧燈能破衆生暗大地悉光明焰焰無窮盡示起元侍者淨體本無生緣生皆如幻如幻非生滅當處真元者示元潔侍者元妙寂淨潔徹無瑕橫亙十方瑩然應物示仁亭闍黎三世圓明十方不隔一念萬年是真實說有即是無無即是有陽焰水波阿誰過咎我即是渠渠即是我恁麼會得山花朵朵塵境莫隨智照勿立空空蕩蕩一輪杲日示陳道人英雄丈夫特發大志看個話頭決非容易造進其心莫中路退晝夜六時忿然精鋭見色聞聲切莫縱意切切孜孜急著眼覷努力真誠忽然瞥地大地山河一光現瑞裸裸現現絲毫不昧當此之時再進一步向上一機諸佛亡示頃爾翻身山河粉碎咦半夜鷺鷥飛入海天曉烏鴉上帝畿示吉先邢居士英勇丈夫特發大志禪宗須參儒宗須契氣宇如王頂天立地切切孜孜單明此事二六時中勿得虛棄以悟為期以了為畢惡境當前無得縱意順境臨頭亦莫隨去順逆皆空必如是覷看破源底即這個是奮然一揮三千俱備石女觀花木人遊戲三教心宗一言已蔽示復初堂主既復其初須超其後初後俱超一心可透森森萬象彼彼無咎陝府鐵牛撞倒古路更問如何三十竹就示素朴闍黎自性清淨純素無瑕朴實行去到法王家有亦不立無亦不拘森羅萬象亦任其舒雲行雨至水到渠成棒喝交馳機用皆能示侍者舒光淨裸裸原無縫鏬赤灑灑周遍大千打破舊時精魂石女解駕鐵船示啓元禪人大丈夫須立志圓頂方袍非容易努力精勤莫暫停時時參扣西來意鳶飛魚躍顯真機咳唾掉臂秪這是莫放寬不可住做到水窮山盡處翻身直過故家鄉三腳鮎魚爬上樹示懷止禪人參禪人須猛烈緊作工夫莫放缺行住坐臥用心追急急要拿這個賊若聞聲若見色此是禪家好時節一念相應捉敗渠凡聖兩途一齊歇示審可禪人汝來參我已多年只為心頭未了然克苦三冬明道德辛勤九夏究禪源水中捉月何曾有鏡裏觀花未可拈識破祖師言外意方知石女唱囉嗹示如安知客吾宗細密欲知初莫效時流鹵莽居保養深藏毛羽健鵬程九萬任如如示張望百之東山坐禪心本無東西地卻有南北君今此一行須奮大猛烈撐起兩莖眉牙關咬作鐵捏定金剛拳要拿這個賊莫向動中求莫向靜中得孜孜只麼尋密密心莫歇忽爾心境如此是好時節撒手再前進上關打教徹和贓捉敗渠烏鴉頭戴雪示慧然禪人汝求警策工夫莫歇放下身心一塵不立密密綿綿看是何物莫往有邦休住無國但恁麼去風清月白忽爾掀翻證龜成鱉更問如何青山羅列示自愚慧知客撇卻聰明智慧佛道祖道齊傾但秪飢來吃飯管甚五位功勳做個死人有氣觸著即便翻身風起自然樹動何存劫外而今若能如是行去自愚著著知音咦葉落梧桐處露珠墜地時示慧日禪人自心智慧猶如杲日普照萬方無處不悉光明煥赫圓滿無缺觸著磕著法法周遍不用管帶亦勿動念應物虛明事事成現若外追求古佛難見示世調禪人禪淨不二禪不自禪因心而禪土不自土因心而土偏執其禪見之不圓偏執其土心之染漏禪土齊修九品優游禪土齊蠲彌陀現前無量壽佛不帶名言示顧鏡滄居士寵辱鏡中花恩情水上焰爾今識破渠惟道能堪羡急早做工夫從緣恁麼薦孤明絶意想個裏常時現驀忽露真機虛空解掣電示魏淨玉閔淨道二居士自心本無瑕貪嗔癡有染揮除這三毒急早尋方便看個趙州無工夫急如箭閒忙動靜間要打成一片時中露裸裸未嘗掛絲線捉敗老趙州方知𨍏轢鑽本來常清淨何曾有染玷示不溢維那百川入海何曾滿萬象含空豈有抑況復吾心包太虛從今亙古元非溢示位中書記參禪不重有諸新揭盡根源始得真撒手歸家無所事泥牛吼破碧天春示盤銘禪人提起話頭莫放寬綿綿密密要勤參昏沉不可容他入妄想來時掃蕩完歷歷孤明是甚麼夏天暑氣逼人寒示西航禪人披雲當衲走諸方撥草瞻風意氣昂拈卻君臣言外會掃除空有個中彰主賓相見應回互父子投機謾度量縱使門庭如鐵壁輕輕一拶徹當陽示持印禪人活潑圓明非中非外運水搬柴燒火切菜秪這便是幻然皮袋更問如何漆桶不快示玄所禪人歷歷分明處時人幾個知爾今玄會得所用絶思惟示觀初禪人此心才肇觀初成覿面全提露本真一段光明無住處依然石女過西秦示完初禪人信手拈來妙入神偷心淨處露家珍荒田不簡無非草月印寒潭玉兔陳示堂中禪者一個話頭牢把持精勤努力莫依稀磬魚擊處忘能所觸破珊瑚樹上枝示乞食從來托鉢有來繇佛語阿難依佛儔重示古規登聖徑門門粒粒可皆周示古柏禪人參禪者莫外求好向自心覓蹤繇言談語句非他物動靜施為到處周離計著沒羈留一顆摩尼映碧秋示梵僧大海航海沖波十萬程名山親謁契無生杖頭腳底渾非礙踏遍煙霞我獨尊示衆旨趣偈因中也設問衆答之不愜師意故書偈示衆曰秪因日起明中暗原為月落暗中明須知明暗元無二只因起落暗明形中也呈偈師亦答之曰敲唱俱行覿體賒明暗雙臨驗作家若是門前坐草客安知殺活事無涯示婁居士因士問如何是主人公師以香几擊之復示偈曰拈香示處要君知覿面何嘗有是非六九梅花春色露秋深黃菊綻東籬示金貞度居士因士問趙州八十猶行腳只為心頭未悄然如何得悄然去師云恁麼行來亦非鬧復示偈曰居士問我悄然事恁麼行來亦非鬧舉處分明向上關誰能更守於常道示謝玄中居士玄途休住足中道不須安會得個中意泥鰍上竹竿和魏東曉居士偈兩忘淨穢亦非中聲色繇來樹過風個裏虛明全體露泥牛夜半撞金鐘示黃蜃濤居士富貴貧窮一蜃樓莫將心識苦追求須從今日親明破好向如心道地遊示長興衆居士提起話頭莫放寬綿綿密密要真參昏沉抖擻當精彩妄想輕清勿鹵憨執有魔王堪作隊隨無窮子正同班兩頭掃卻無依倚歷歷孤明珠走盤示李警菴既然不挂紫羅衣速速歸來已是遲頓欲洞明諸祖意秋林黃葉又離枝示姚居士是甚麼夜半三更吹著火無底銚兒去燒茶拈著磁鍾成話墮示方居士見色聞聲本現成何須特地苦追尋而今觸處逢渠也野鳥山花覿面陳示沈仁叔居士志立堅強猛丈夫操功七日自心孤慧刀劈破無明網放起鐵船水上浮示江弘之居士一塵渾不染諸佛悉皆明烏道從來寂冰花火裏生示江猶甫居士蓮可坐兮桂可攀從來儒釋一心間如能確實行將去浪湧桃花燒尾班示興國衆居士求偈一個彌陀本現成思惟運用放光明果能不外尋知見即是蓮花胎裏人提起話頭莫放鬆行住坐臥要加功忽然看破原無底秪是尋常舊主翁五蘊元非有三毒本來空識取天真佛東南西北風鴈過長空處影沉水底時若然玄會得真妄自如如寶鏡當臺時光中含萬象形影一齊蠲鐵鷂飛天上白雲陳祖意明月印禪心覿體齊兼帶何須問老僧八月西風緊三秋菊正黃若問祖師意從來不覆藏示信豐衆居士坐臥經行須著眼看渠渠果是何人貫通三際元非異喚一聲時應一聲青山聳翠有誰知流水滔滔最上機奉白諸公須薦取休教錯認浪花飛一個話頭明歷歷動靜施為自現前當念和贓俱露徹低頭便見水中天百不思時是阿誰經行坐臥露天機若向其中開隻眼石女生兒罵古錐一個仙桃覿面陳直須細嚼囫圇吞若還嘗著些兒味管取凡心即祖心薰風陳陳自南來惠我清涼暑意開無限祖機都露泄何須俯首更疑猜信步行來路不差求之仍復遠天涯直下能知無一事不須更御曰牛車有無俱遣謾追尋逄緣不借是真身星沉水底金錢燦怪石山中狼虎形示鍾魁所居士孤明寂歷少人知指物傳心為標的智者於斯了達時頓同諸佛亡修習題自性彌陀一個彌陀恆不離六門常自放光輝青松帶月和煙冷翠竹穿雲映日奇雀噪簷前彰法語鴉鳴樹上顯圓機窮途接引無休歇何故衆生不肯歸降魔偈魔佛從來不共家力扶正法掃群邪多生願力如山重那管時人厭與誇擬答復禮法師真法性本淨元無妄念起病眼見空花假說妄生始若了花無生當時妄即止妄止無明空原不有起止一念亙古今何嘗歷生死付袈裟金欄袈裟錦色堪誇付吾兒傳遍天涯流通慧命坐斷塵沙好提妙音開盲昧折群邪付拄杖一條青梨佛祖齊垂付吾兒點豁盲迷廓清宇宙正令全提卻掃功勛無背觸妙鉗鎚放開遍大千收來在掌握付與克家兒光明恆不沒咦秋林果熟紅巖前弘兩足
