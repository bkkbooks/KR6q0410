body:
  text: 明住天台護國寺嗣法門人寂蘊編歌贊銘說敘疏佛事十二時歌半夜子睜開兩眼翻身起滿天星斗墜寒簷錯認金花放玉蕊雞鳴丑啟鎖開門放出狗撥火燒香探有無堂中禮佛忙稽首平旦寅舀水添柴煮菜根古灶鍋前吹把火半升羅裏解翻身日出卯山中猶是不明曉亂峰腳踹似顛狂拽杖隨行入荒草食時辰肩衝腰斧去樵薪萬年枯樹連根斫百劫香藤帶葉焚禺中巳肩荷雲鋤去種地東西兩岸一齊翻又有茅團又有芋日中午忽聽堂中三下鼓雙手捧起缽多羅始憶當年金牛舞日映未白雲片片如破絮蓋卻南山與北山爾從何起亦何住晡時申大道忙忙有幾人踏破草鞋赤腳走橫擔直負受辛勤日入酉騎卻崑崙顛倒走須彌岌岌海水騰驚起波斯大張口黃昏戌掩卻柴扉一墨黑轉身露柱纔磕著信口念個波羅密人定亥收入從前憨布袋脫下娘生牛鼻褌長伸兩腳渾無礙牧童歌因看慈明禪師牧童歌故作此和之淨裸裸赤灑灑倒跨牛兮沒可把信口唱出曲無腔散誕清風明月下赶入山縱意遊白雲影裡任悠優枯樹煙生芳草綠豈味尋常這一頭水草足飽齁齁兩岸東西得自繇從今不犯他苗稼不用鞭兮繩也休牧童兒真快活手把泥團空裏捋搓攏乾坤又放開渾然不知舒與縮日已高午正好蹄角精純不須保橫眠倒臥柳陰邊這段風流世莫討日已暮收歸欄劫外今時水草閒從今鞭杖何須問一個閒人天地間這牧童真奇怪不姓張兮不姓戴借問牧童何處居千山萬壑元非在贈頑石禪友歌常兀兀謾騰騰挺然獨露放光明觸目世間人不識權且呼為頑石名頑石頭最高大鎮壓山頭無縫罅三世諸佛賴爾維碧眼胡僧常倚借頑石頭最堅利金剛力士無能碎如來掌上顯神通外道天魔誰敢覷頑石頭壓塵世生在深山絕名利披雲著霧自優游歷劫何曾異今日頑石頭最堪愛生在煙霞與物外博山峰頂氣雄豪雲門腳下常自在頑石頭有志氣獨立峰頭絕忌諱任從日晒與風吹凝然一塊何曾異頑石頭真奇怪婬房酒肆渾無礙磊磊落落秪麼行體性虛融戒非戒頑石頭最包容十方剎海一毛中自他不隔無來往那居邊際於其中頑石頭多智慧不論三乘與四諦聖凡情盡絕古今身居剎那離三世頑石無名無形段劫成劫壞靡改換娑婆境內暫安身應物逢緣光赫煥頑石從來沒滋味世間愚者盡拋棄不知內藏無價珍通方作者方能識愚人只知頑石名如何知得頑石心頑石心量絕有無是非得失豈能拘浩浩紅塵到非到白雲常鎖如自如有問如何是頑石蒼苔片片印清虛草龕歌師初住崆峒寥無一物搆箬屋縛草龕以居之故有此歌草龕兒最空虛包含法界盡無餘三世如來頭出沒四生六道任其居隨其有隨其無挂拂捲蓆總無拘有時子仙成大睡有時瑞老上跏趺四禪八定從此起五位三玄任卷舒草龕兒真有趣聲聞圓覺莫能覷十地菩薩較些兒解向其中舒兩臂草龕兒真奇妙通身連絡通身竅內外虛明絕點埃那有雌黃與做造草龕兒真奇妙侯王將相無能到瓊樓玉殿莫堪倫銅雀靈臺難比耀草龕兒亡冬夏寒不侵兮熱不怕假使三災遷變時一個渾然無縫罅有問草龕意若何三更紅日亦無夜雪山像贊棄卻皇宮雪山打坐六年苦行後人規模忽睹明星悟得遮個咦婆心一片有誰知流水高山重點破圓相半身佛贊不是月輪亦非寶鏡權現半身且徹爾困咦靈木條然鳳豈立無影林中鳥不棲觀音大士像贊見色如盲聞聲如聾弘音不昧號曰圓通心經觀音像贊通身是經通身像遍界無聲遍界聞一念心空觀自在鴉鳴鵲噪任紛紜釋迦文佛像贊咄這老漢從無始來渾忘得喪不合去睹明星向鹿野苑卻陳伎倆惹得五天國王起模畫樣本待以火焚之權留道握供養姚道握請水月觀音像贊大海之中磐陀石上耳聽潮音千形萬狀聞修淨盡坦然自放救苦尋聲慈功無量咦踏翻波底月鐵船水面浮達磨大師像贊剿卻梁皇意根斷送神光手臂恰恰道個安心露出風流體態從茲家醜外揚後代兒孫逐隊咦渡江原不傳宗旨跋嶺空留破草鞋梁皇不識二祖豈逄嵩山之石乃知其翁達磨渡江像贊雙眼圓明六宗俱契琉璃殿上不許安身鄉村渡口連忙走過咦隨波一葦妙無窮雲在青天花在樹達磨面壁像贊面目雖無脊骨已露後代兒孫個個看透達磨西歸像贊本來東土度有情卻又隻履西歸去不是一番走煙塵爭得雙株遍地布玉彌勒佛贊通身白毫全體明徹龍華寺裡顯神通兜率陀天藏醜拙呵呵呵識不識霅溪一帶鎖虛空弁嶽蒼蒼常卓卓高峰大師半身像贊抬頭見真讚收回自己枕子撲落地打碎虛空三關留不住半節與兒孫咦春風蕩蕩花狼藉仍是從前舊主人手捧寶塔羅漢像贊一頂摩霄兩腳踏地手捧寶塔示第一義咦雙睛覷破光明也兔角生花遍處香呂巖真人像贊挂卻儒冠去學仙半升鐺內煮山川黃龍語下知端的顛酒扶妖總不言平之畫無量壽佛像為母慶誕請贊其壽無量兮曾何終始其土極樂兮曾何泰否不去不來兮巖松點翠無生無滅兮秋江渟沚雲門先和尚真贊四首這老漢多伎倆心記五車胸懷三藏棕櫚拂子左拋右拋斑竹拄杖東蕩西蕩演一乘於萬竹林中布十德於海塘邊上指滲漏斷衲子命根立君臣為人天榜樣到今日覿面全提眾兒孫休云畫像不畫像咦六出滿山河遍地銀波浪手持如意巍巍獨坐普為群生全提這個時人不識當面錯過咦幾瓣梅花落剡溪四明山下神風播石傘峰前萬竹林上坐斷乾坤孰堪論量咦和風蕩蕩兮綠柳垂絲煦日明明兮紅桃播浪依真畫像像非真從像顯真真非實非實非真兩皆幻難描老人真儀質要識老人面目麼三冬桃瓣隨風舞九夏霜花遍地鋪雪關禪師像贊行曹洞機傳博山拂獨坐胡床乾坤一握且道是誰異師白足無礙像請贊孤巍卓立無情緒迥歷靈明不覆藏特為諸君通一線休從像上覓真光道興小像請贊拂子揮天蒲團著地獨坐巍巍示西來意咦翠竹搖風徹骨寒錢塘江水多滋味烏鎮密印寺虛懷小像贊身如木石意若死灰手持素珠且道是誰咦壽聖塔邊傳今古青溪岸畔示菩提慧心小像請贊歷歷分明不用外尋崖前獨立即此慧心咦怪石蒼苔古青松白鶴奇道詮小像請贊眼不見色耳不聞聲纖毫無昧梧桐葉青黃唇濤居士為母真請贊朕兆纔分坤道流行為賢者之母作萬物之根咦降身百億無來往蓮花胎裏又重新蕭月瑞居士為母真請贊法界之母閨門範儀空花示現鏡像何歸咦香煙堆裏蓮花國寶樹行中古佛垂自題這漢生來倔僵語話相逄不讓皖公山頂笑傲雲霞顯聖寺裏大興波浪拈一條沒巴鼻的竹根東觸西觸打得那杜禪和徹骨徹髓無處安身播兩片有涎唾底臭皮左說右說哄得他行腳僧忘境忘人橫來豎撞以柏樹子為人云是返魂香將乾屎橛施陳道是人天供養似這般不唧溜的漢子也有人寫他在紙上咦分付諸方禪學者莫被他瞞換眼睛這個阿僧有骨無筋巍巍獨坐何喜何瞋撐開石傘弁嶽重新劈破崆峒剔起慧燈咦南雲花爛熳平川水漃清這阿師沒嗒𠿓手握山藤聖凡俱殺破異道於筆端呵邪禪以口咶識者知是達磨嫡骨兒孫洞山正脈不知者亦隨人異訝兀兀兮若山寂寂兮真閒聖不可並凡莫能攀境上無心戀忙中事不關咦一片浮雲何住處數員頑石自斑斑西堂離言請贊我像無形非眼力之所能見我像無色非青黃之所能成湛如秋水空若太清六合無高下古今一坦平說甚麼十二類生監院湛空請寂寂兮無聞歷歷兮有色正令全提人天法則覿面橫施佛祖機聊通你等個消息侍者鏡愚請咄這頑像沒伎倆雲門寺裏惹得人憎弁嶽峰頭渾亡得喪既不能演教談經又安知捧缽持杖有問西來之意若何便將他驀頭一棒本待要以火焚之權留與兒孫供養侍者舒光請默默無言巍巍獨坐舜若多神莫能看破喚作瑞僧早已話墮侍者寧遠請這漢癡迷不識威儀輕輕觸著聲吼如雷咦秪為慈悲心大切喜兮怒兮與人提侍者遍聞請堪羨良工筆力精筆筆全提此個身雖然眉目咸相似一點中心難畫成難畫成五彩分明事最親西堂中也請渠正是我我不是渠恁麼會得克家之兒峒山芳菲兮春色之英鄱湖澄清兮秋風之精維那克歸請明暗交參互同生殺偏正齊捐劫外火發侍者破暗請心遍十方身通三際默坐無言示第一義咄西堂不溢請寶蓋峰前花發笑金蓮山上草呈吟咦是這阿僧非這阿僧爾其細聽侍者元潔請傳達磨六七世之正宗忝洞山四八代之真子居崆峒五位之山中提正偏兼帶之心旨這便是楊阿師的臉嘴輻輪請是像即真是真即像不像不真是何形狀坐斷十方覿體坦蕩西堂石澗請體非玄素何有此像此像非真玄素不狀假斯紙墨權為供養侍者玄素請生在桐城薙髮九子操方越國雲門真子咦以乾屎橛為沉香便就是你一念請五蘊山頭一片雪湛水澄潭一輪月清波蕩漾妙何窮認著依然猶未徹源初請一心常在那伽定眼若盲兮耳無聽任他聲色亂叢叢何曾動著毘盧印姚福吾請和風吹起柳條新煦日臨頭花似錦綠水汶瀾陳道貌切休喚作世間境不踰請有眼兮非見有耳兮非聞有鼻兮何嗅有口兮難言惟心兮漠漠廓落兮誰親咦怪石枯藤和露冷金鏢寶蓋帶煙橫這漢呆癡獨自亡思青黃莫辨動靜焉知手持白拂胡施亂施不識者以為祖師之機咦風起船頭波浪湧水澄山色印寒潭存璞請硯瓦銘覿面無遮通身沒縫書大藏經作人天供世間功業賴渠所成若非渠力何繇作文體若剛堅心絕異緣平嘗獨露不受綿纏本不可說表裏漆黑識得渠時成佛心歇銅香爐銘觸目無私通身赤露篆煙裊裊消大千垢包括虛空容納微塵即此便是烏用別尋尊稱達磨正宗說千流萬派一源而出千枝萬葉一本而生何得認流迷源執榦棄本也今人必稱五宗為始者皆是迷源之謂也古雲門溈仰二宗已絕法眼一宗傳於高麗國只得洞濟二宗在於震旦耳今依愚見當尊達磨大師為始蓋我國之心宗自達磨大師航海而來至於我土直指人心見性成佛由是心宗傳布四方而今叢林皆設達磨大師之像良有以也在西域當尊迦葉尊者為始在東土當尊達磨大師為始若尊曹溪尚有五位祖師在前故有遺也源達磨則該曹溪亦該洞山本洞山則遺達磨亦遺曹溪故本能該末卑不該尊也是以當尊達磨大師為始自達磨大師至雲門先師乃四十一世矣知我罪我何敢辭焉後代所稱者當云傳達磨正宗第幾十幾方不遺其源則見源之有始也達磨西來說禪心湛寂本自虛玄三際融通十方不隔柰何情生智暗逐境迷心認妄失真飄流莫返故勞大聖降跡現化西乾四願嚴身六度濟物使人人返本個個歸家揭破無明點開慧眼操舟破迷天之大浪揚帆鼓覺海之洪波直抵梁朝發明聖諦一語不契折蘆直顯舊家風入魏知機面壁全彰目前事至寶不昧冷眼難瞞斷臂安心神光有在雪花遍處瑞氣常新禪髓傳時門風大振諦不為何階級覿體堂堂有修證無染污總明自己德山棒臨濟喝機用全彰大雄虎南山蛇殺活自在雲行雨至斷盡衲子命根掣電轟雷施設佛祖機要炎焰日中冰雪朔風水裏楊花森羅萬象無私千古真風不墜由是教外一脈東土大行故禪宗直指之始祖始于達磨大師也恕己說世尊云天上天下唯我獨尊以此觀之則在天而天而不天在人而人而不人乃至地獄餓鬼畜生及與諸類亦不諸類如是則無往而非我亦不我無我此聖凡不涉有無無拘人我兩忘恕責齊遣是謂真恕己焉開爐說嗟嗟末世去聖時遙概以訛傳曾不知反只此開爐一事古之叢林或十月十五或十一月初一日開爐正月十五日止火有爐頭有炭頭為大眾煖寒故有開爐之說到開爐日爐頭散爐炭頭散炭善知識藉此以拈提指示大眾故有灑掃開爐燒榾柮團頭扠手大家烘你也烘我也烘深藏穩便度隆冬之說趙州曾作爐頭因緣可攷雲峰悅化炭俱載方冊今時叢林將古規事跡俱以昧卻但見語錄中有開爐二字單只以結制上堂為開爐謂之陶鑄聖凡似即也似是即未是何也將叢林煖寒一段因緣俱以昧卻不知出跡深可歎也若要復古依舊到冬日寒時散爐散炭善知識於此上堂庶事理雙全規制不廢矣又到夏天五月初一日挂帳九月初一日收帳亦叢林規範烏得不審哉辯率發微說余想作文字者馳騁筆硯若非細心不無一時之失林間錄云古塔主去雲門之世無慮百年而稱其嗣青華嚴未始識太陽特以浮山遠公之語嗣之不疑二老皆以傳言行之自若復曰其於己甚重於法甚輕此覺範所論是論之未當也古塔主既去雲門百年而未識雲門輸己以承嗣得非輕己重法乎青華嚴亦未見太陽而以浮山遠公之語嗣之又非輕己以重法乎反謂於己甚重於法甚輕是何言歟青華嚴依遠公之語嗣之不疑此尊人也既從遠公有所悟入此入聖位也然而輸己為物重法重人此華嚴大師萬古一段英氣起洞宗已墜之風開投子永垂之道後之學者及與不及雖未得而知且浮山遠公提挈華嚴為法門之真子使其承嗣太陽而不為己之嗣真以大道是輔何嘗以洞山臨濟二其心哉試觀今之人去古人遠矣或有親己門下者毋使過他人之室悲哉藏經述意說藏經之來本乎西土始因摩騰竺法後有玄奘大師涉險登危斯文乃至白馬壇上帝主親驗偽真佛經火中光明徹於霄漢因是道經灰滅吾教流通欽此寶文傳布宇內見了義句頓悟靈覺之心聞般若名永證菩提之果言言見諦字字真詮庶使後學有聞不負請經初志戒約說世尊在世僧依佛住世尊滅後僧依戒住戒也者出三界之元首登四聖之要道不可一日有怠戒若有怠則塵不可出道無所明願無所興生無所度何得為眾聖之皈者乎如是則知戒為無上之梯航破暗之明燈應當至意滌慮翹誠求佛冥加感發戒體所言戒體者即我等之自心也是心覺遍謂之佛是心軌持謂之法是心和合謂之僧是心圓淨謂之戒是以即四法而為一心即一心而為圓宗戒體即戒體而為萬行根基烏可有怠也歟戒殺或問敘世人烹眾生肉以充自己腹者迷倒之盛矣何也蓋眾生與吾人一體吾身乃地水火風所成眾生亦地水火風所成耳經云一切地水是吾先身一切火風是我本體以此觀之有何異焉既爾誰肯烹自己之手足以充口腹哉手足既不可烹則眾生之肉亦不可烹也明矣古云心佛及眾生是三無差別又云凡有知者必同體如是則知心性亦何異哉吾人愛其衣冠整肅飲食甘甜彼亦愛其毛羽潔淨所食味豐吾人適意則喜樂盈懷不則憂愁煎逼且眾生亦爾放之則鼓舞飛鳴囚之則惶惑驚悸是以物我不異殺而食之豈其仁歟茲者仁叔沈居士夙願深厚示現名門不染繁華留心祖道於弁山發明本有不勝喜躍復念眾生沉迷何以導之遂體上帝好生之德興聖賢同體之仁戒殺放生假設問難發明孔孟佛祖之心名曰戒殺或問實苦海之慈航大病之良劑也余一見而加額合掌聊敘數語以為擊節倘遇大集會中獰惡鬼王曰仁叔仁叔我待一切眾生成佛盡眾生界空無一眾生名字我乃戒殺放生且道仁叔又作麼生老僧秪為大笑呵呵募茶疏茶為奉客之先供止渴之要湯纔入門來即與一碗使其沾著唇齒當下知歸故爾趙州無論到與不到咸云喫茶去今日弁山意欲借彼發明諸人大事乞眾檀那各出隻手成就勝緣俾飲者嘗者枯腸頓息不受伶俜入清涼地獲如意果則諸檀福德孰可量哉乞米疏金牛飯普周沙界雲門餅塞滿虛空一粒米撞倒須彌兩文錢各出隻手使無口人受食無腹人飽餐則大檀之功等太虛量也重修洞山祖塔題辭洞山古剎我等祖基傾頹已久瓦礫不存今幸孤崖上座住持欲重新祖塔柰工力浩繁凡我輩為洞上兒孫烏可坐視乎必思水源木根法道有本各出隻手共力可成一磚一石建祖塔於當場一瓦一椽覆靈骨於本處法幢高豎祖道重新始不負我等微末報本亦可啟迪後昆孝道有在佛事為啟明舉火執火炬云銀光耿耿且喜窮子歸家寶月輝輝琉璃殿中朝父恁麼時君臣道合父子一如是何人境界啟明上座厭塵世而高登九品棄娑婆而端居淨土會麼以火炬打圓相云烈焰叢裏翻身常寂光中自在為心光舉火泥牛吼盡澄潭月木馬嘶乾四海雲一段心光歸去也九蓮臺上又重新且道還鄉一句作麼生道烈焰亙天星宿朗霧鎖長空山色青為亡僧舉火生死去來目前包褁般若如清涼池四面皆可入生死去來總沒交涉般若如大火聚四面不可入今日這方來上座挺身擔荷覿面全提且道是出也入也以火炬打圓相云通身一具黃金骨烈焰光中仔細看為奇風舉火細雨乍收孤日朗白雲纔破碧天青一段奇風全體露再駕赤龍行一程咦轉位忘功歸去也青山綠水自知音為玉章舉火玉章玉章收回文彩以空合空豈有去來其來也轉位就功弁嶽峰頭花爛熳其去也轉功就位碧波潭底桂輪空正恁麼時明暗雙消君臣不立且道在何處安身咦海底吹來三昧火頃刻燒乾五嶽雲為覺元舉火覺元覺元返本還源菩提觸目擲卻大千秪如天台不住龍華不去且道向甚麼處安身立命以火炬打圓相云咦再向紅爐親煆過任汝分身塵剎中為明軌上座入塔本自無縫罅八面絕遮攔一頂摩霄四稜著地圓陀陀藏了幾多骸骨活卓卓收盡無限髑髏人人對面齊觀軌上座親登此處以手撫骨云軌上座聽吾說今朝正是清明節百花競秀楊柳青夜深更看峰頭月無縫塔裏快翻身荊棘林中忙舉足過此二途且道向甚麼處安身立命良久云幾樹桃花無豔色數枝枯木盡芬芳為矩耆二上座入塔朔風匝地霜花滿萬籟無聲境寂寥今日與君輕決斷翻身此處路非遙二上座聽吾教娑婆世界休生戀西方淨土快須逃過此二者且道向何處安身咦三冬枯木秀九夏雪花飄掃雲門散木先和尚塔二則秋風颼嘶秋雲披離秋雨歷落黃葉紛飛此是先師容儀會麼轉功就位無遺影古殿苔生阿個知僧問先祖儀容即不問圓音周遍事如何師云青天白日進云恁麼則水注松濤宣妙法青山翠竹演無生師云非汝境界僧便喝師云未曾見面在僧云歸去罷師便休去癸酉秋山之高兮水之源兮先師之心兮晴空一聲霹靂泥牛木馬奔馳如此會得則先師儀容宛爾如此不會桃花依舊笑山堤會麼遂顧眾頓足云蒼天蒼天即上香乙亥春掃百丈大智祖塔雄峰鎖白雲諸祖真機獨露千林飄黃葉衲僧巴鼻儼然滿目儀容通身師表會得者全體受用不會者運水搬柴會麼會麼今日特具瓣香聊陳薄供以為大智老祖掃塔之敬諸人還見智祖麼良久云石塔蒼苔古翠竹綠衣新
