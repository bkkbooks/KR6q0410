body:
  text: 明住天台護國寺嗣法門人寂蘊編詩偈再住贛州崆洞山崇禎十年丁丑秋監院湛空并贛城高樓居士會同鍾玉所鍾鳴宇劉寬我諸護法賚書上南雲山再請師還山賦此策杖重來此縱觀仍舊遊何期劉子樹肯首笑相留崆洞諸景緣起丙子秋七月草六日豫到山時蓁莽蓊鬱藤蘿絆腰遂令撥雲闢徑誅茅始縛箬屋結草龕以居之既居矣猶未窮此山中諸景既而過南雲山丁丑秋再上崆洞稍闊其居漸開四野不覺佳景天然露現始各五位山寶蓋峰等八景至戊寅春遊之又立飛龍岡等四景名初夏之時梅雨綿瀝古路從蠟燭園過阪因田塍窄來往者未便豫偕隱虛等八人從水口下新開一橫徑又得羅漢之名舉目遠瞻危巒怪石羅列屏几煙霞滿岫蒼翠森然則又有奇峰紗帽石觀音嵒清涼嵒之名至秋遊歷群峰又睹有眠牛石一脈泉己卯春偕諸子再登奇峰又見石剷石鯉等聳然而立宛有參天之勢故爾名之然景無前後前後在人自劫初成之時諸景一時羅列雖後有探幽賦詠者年遠亦無所考今或山靈有在老僧有緣自到山漸誅草莽取景題名總為崆洞山之諸景固是鉢盂安柄亦可存于後賢知此則有佳詠志之不朽也崆洞即景并引崆洞山荒涼甚久斷碑古碣盡已湮沒子仙初到惜無片言隻字可考但觀其山形相似物類者指出八景示諸禪衲共相唱和以為永遠之志其院前覿面一峰形如寶蓋故稱為寶蓋峰院之東角一峰俗呼為酒罈山形似金鏢故名金鏢峰院後主山五峰並列偏正互陳君臣不亂稱為崆洞五位山門前一池圓如寶鏡故名寶鏡池院右一崖世呼仙人著棋之處故名仙人崖院右一石儼似龜形故名龜石崖院之西畔新開一泉內有一龍頭石水從其出故名龍頭泉院南寶蓋峰之腰有一石其形似虎故名虎兒石此崆洞之八景余養病之餘詠頌八首俟諸文翰共詠精華以壯崆洞勝概云崆洞五位山八絶五位元一座偏正歷然分君臣同妙顯賓主互相陳險峻鶴難立平懷步入輕位功齊轉處木馬吼天庭寶蓋峰寶蓋覿空懸彌然覆大千禪流咸蔭被妙色古今傳金鏢峰形似金鏢卓然獨立戳破虛空有誰能識仙人崖挺然一座崖上有神仙立昧者眼糢糊何能對面識寶鏡池圓明湛漃猶若寶鏡含盡法界毫無餘剩隱顯俱該不存邪正放去收來大地徹困龍頭泉一竅開天際石龍吐水流味甘禪德美益見洞山幽龜石崖一石橫空起其勢若龜形草嫩緑毛長苔生八卦陳伸頭提正令縮尾迹何存舉目全體露靈德甚分明虎兒石怪石草中埋猶如猛虎踞爪牙雖未伸來者生驚怖又題四景并引任運禪人搬木回至五龍湫憩息舉目偶見一水瀑布噴珠而下遂有瀑布泉五龍湫之詩以呈老僧老僧亦擊節和之故得瀑布泉五龍湫之二景矣驚蟄節屆久雨初晴偕二三子步於南墺之石濠見一嶺似鳳蹲立有所待焉遂指曰蹲鳳嶺從鳳嶺而去不里許有岡若怒龍奔海騰空而過指曰飛龍岡諸子各呈詩老僧亦占拙偈不覺四景流落人間也瀑布泉誰將白練挂長空界斷青山路不通多少行來難措足騷神閣筆費神功五龍湫五龍潭底隱滴水示全身澤世功無量三根得自榮蹲鳳嶺峮嶺盤旋萬壑中宛然彩鳳五雲籠不聞秦主吹簫笛惟聽崆洞午夜鐘飛龍岡嵷嵱轉變若龍騰駕霧排雲勢自神不向海中求德寶慣居山頂聽殘經錦花水并引戊寅春傳以為瀑布泉己卯春余親觀之猶如錦花鋪設泛瀾無窮故名錦花水也浪花翻作錦花飛意趣天然吐妙機化母織成無功絹散之湖海作龍衣崆洞即景十四絶路徑新開氣象鮮碧嵒紫石鎖嵐煙有人踏著些兒地驀直登臨極果巔奇峰崆洞多秀麗怪石亦生奇竹翠通禪髓花黃啓道頤藤蘿佛膝曲古蕨聖心怡極目頻臨望悠然任所之紗帽石天然紫石長苔封卻似烏紗振國風想是辭官修道者故將冠冕挂崆洞觀音嵒森然喬木古藤封紫石磷層布錦峰趺坐忽聞清籟響誰知大士啓圓通清涼嵒苦樂無能到炎涼豈可侵忘機獨自坐那有世間塵眠牛石雲根高臥似眠牛歷盡寒炎不計秋鞭杖而今誰更用祖翁田地賴耕收一脈泉活潑無依倚常年不竭涓榮枯咸被潤蓋自有來源石鏟峰形如鐵鏟立峰頭觸碎虛空獨自幽魔佛一齊俱蕩盡誰人能入此中遊石鯉峰一石參天似錦鱗龍門已透若何升蒼生枯稿須當濟秪待雲雷布雨行崆洞水口一帶溪流下碧岑噴珠擊石響清音常年似唱胡笳調不許眼觀聞在心羅漢松翠葉婆娑色愈嬌和風鼓舞帶雲飄空山獨立清蒸暑多少行人息苦勞空王墳空王元無形迹微塵堆裏藏身今日分明指出青山緑水白雲懶漢床石榻蕭然崆洞天懶人時未離床弦自從劫外長眠起睡到而今不計年甶石倣佛子母尊天依稀面然大士崖前獨立提持傲盡風霜月歲崆洞家法十偈崆洞家法絶連纖一句當陽直指全剿絶葛藤亡滲漏方知劫外有禪天崆洞家法絶連纖棒喝交馳機活圓點著禪人通體快何須格外更求玄崆洞家法絶連纖弗使諸人仍自纏截斷葛藤和水拔翻然當下證金仙崆洞家法絶連纖雨過青山色更鮮萬象無情能説法何勞病朽口重宣崆洞家法絶連纖野鳥山花不間宣風捲殘紅親徹骨真機滿目個中圓崆洞家法絶連纖月上東岡一顆圓寶色輝輝高下照誰云祖印有其偏崆洞家法絶連纖風舞清香襲法筵只為老僧心力倦也來助我一談禪崆洞家法絶連纖那畔今時已盡捐月印寒潭常坦坦風吹觱策自玄玄崆洞家法絶連纖五位三玄總不然間蹈峰巒觀秀色映紅遍地草芊芊崆洞家法絶連纖有甚工夫有甚禪晝飽三餐日落後長伸兩腳任憨眠春遊崆洞崆洞景色自奇哉紅白枝枝間錯開破衲袖驚憐蕊落芒鞋步動喜香來空中亂舞隨風意巖下披離壯石苔踏遍煙嵐情未已攜笻更上一崔嵬清明日偕諸子遊奇峰策杖步奇峰芒鞋意趣濃野花近笑語翠藹露清容爆竹運天吼歡呼滿塢雍烹泉敷石坐不盡話重重過雲龍山竹輿度山坡嵒深鎖薜蘿撥開荒草徑點出古崖阿舊屋添新象老僧益壯多相看供蕨茗談妙喜間過觀奇雲偈并敘乙卯夏崆洞間居養病自適晚餐之暇夕陽初落餘暉散彩祥雲呈奇變幻莫測或為獅兒返躑或作象王嚬呻或現海馬騰波或現鳳凰展翅樓臺殿閣人畜龍仙無所不有時余與二三子酌清泉縱奇觀偶占偈一首諸子亦各有和韻可謂不負天開畫圖之妙耳遠望夕陽落斜暉映彩雲神奇莫可測變化幾般形攜杖同諸子頻觀興愈清烹泉亦敷坐快意樂天真覿體非他物不知誰肯惺陳乾所居士捐資為師造一團瓢立春前五日而始落成時諸弟子各呈偈頌以為慶意師亦示之以偈者個團瓢昂然自在囊括虛空含容法界六戶玲瓏非中非外六角稜層大千俱蓋惟有一門往還無礙霧起連天渾一色風吹碧落皆慶快警浣菜一鑑清池覿面開廚人時以滌蔬薹莫教黃葉隨流水惹得禪和步迹來新正雪覆絳桃贈雲隱一樹紅花覆白雪通身卻似玉粧成寒凝不露真機骨惟有清香到處聞師居崆洞養病無事每敲禪板自適或禪人請問工夫隨敲示之一日示之以偈不揚麈尾不拈花專敲禪板作生涯分明擊碎虛空髓直下翻身意自奢聞盡眉聲空山有畫眉時向窗前語問渠何所言報云柏樹子覿面為人提阿誰能會取熾然説法罷飛入峰頭去送克歸維那回浙克究宗乘忘倦久偶因浙底省師回東風乍起孤帆展再上崆洞笑自開示諸禪客晝夜精勤莫暫違應知佛法絶離微個中一點通玄路秪在搬柴運水回諸祖西來意咳聲并掉臂玄中更有玄碓嘴生花赤庭前柏樹子趙老為君指會得其中意揚聲囉囉哩昔時楊大年決志為參禪相見慈明後聲名播九川贈宗侯朱南美居士廓徹虛明本地光個中無物不含藏從來法界人天美寶樹花開到處香賢侯垂護道中興蓋為靈山囑托深孝敬雙親天地格珠蘭夜半現中庭侍御張瑤碧求偈大道通三際恆沙歷歷周孤明常應用盡在一毫頭動靜皆由我愁歡兩盡忘莫將心意會明月印千江老病感懷勞病多年老更彰幸今已歇自心狂眼昏無力看經慢齒缺多風説法難腳懶山行嫌峻嶺身居龕內喜茅房世間出世俱忘論惟覺頭寒一頂霜己卯夏經行失跌因傷手有感嘗謂多生業惑深而今病苦漸相陵寒傷數月精神減脾疾連年血力貧朔氣才交嗽又發颽風初度手遭侵雖然宿債隨緣遣難動虛間一點心題辨山龍華寺種樹丙子夏師離辨山隱迹崆洞復遷百丈久默法兄主龍華席栽引路松數里師乃賦此新種松杉滿道傍婆娑遙蔭到禪堂堅牢神力能堪護萬古龍岡翠色彰答給諫熊青嶼次原韻逃禪浪迹在天涯釣盡煙波意始嘉更遇大檀知個事陳年枯木又開花題百丈諸景庚辰秋建安王念百丈法席久虛虔修書幣遣使特入崆洞山延師重興祖道師于十月初二入院掃祖塔竟因閲寺志復登山玩景成二十首百丈寺名藍高百丈勝景冠諸方此地何今古溪清映月光大雄峰高標聳出太虛空脫盡凡塵孰與同百丈峰頭弘祖道芳花古木自叢叢大智塔石塔摩霄漢真身自內藏祥雲彌四野靈木占高岡説法青松吼談禪翠竹揚愧豫無所敬一禮一爐香鉢盂峰孤峰圓立在山丘形似多羅意甚悠開口朝天吞日月乾坤作供一齊收錫杖峰一峰覿面存直示如來旨開展有誰能至人常在此釋迦峰天宮不肯住降迹萬峰頭大智相逢後聲名遍九州迦葉峰瞿瘠稜層出世奇寰中獨立露真機煙霞常作袈裟搭鳥語花香笑自微鳳凰窩昔日宣宗聖駕臨鳳凰特立現佳徵而今香道仍寥寂惟有清名世上存石筍平空迸出幾千秋恰似天龍一指頭觸目能知元自具宗風從此滿皇州七星橋七星布列在山門為鎖曹源一滴春度馬度驢憑跳躑曾無些子喜和嗔師表閣古閣凌霄漢層層鎖霧霞綸言師表賜道望滿天涯野狐巖五百生前異類身一言迥脫悟天真從茲月映中堂滿故有名聞震古今靈景亭景勝靈俱勝靈空景亦空詩人多點綴遺迹古今同大義石頑石不開口善能説大義一塵含法界萬物悉皆備眼裏能聞聲個中可領會當陽絶覆藏真諦明麗麗黃犬墳十二類生觸目該圓明一性總無乖聞經既證天中樂名在而今土一堆木人墓木偶會開口鉏破水中天何朝犁罷去空墓鎖寒煙大夫松獨立山頭勢接天枝深葉秀鎖蒼煙昔聞宣帝曾臨此既與安名不偶然龍蟠石兀兀臥茲山風霜不改顏一朝龍坐飲名稱落人寰駐蹕山嵬嶠摩碧漢清氣遠人間御駕登臨後春風幾度還三旋嶺三旋是何意為君指路迷石門雙豁處不必更思惟洞山即景五絶洞山者價禪師古道場也崇禎戊寅秋孤崖禪師重興主席孤崖乃師之法嗣因重修洞山志師有感賦之洞山寺梵宮高聳洞山奇誰是通家路不迷眼裏青黃如未薦鐘聲擊處為重提和尚峰孤峰聳立若僧儀細草婆娑似髮垂雲作袈裟松作杖儼然半步不曾移五位橋一石橫空起正偏兼帶齊此中能進步不涉杖頭泥逄渠橋洞橋似月半開舒未有登臨不自如觸目波瀾皆性色可知處處得逄渠登雲居室幽室高居峻不通天人何故得相逄念存有念神來供心若無心佛莫窮碧嶂野花陳翠色清溪流水現佳容真誠祖道誰能委總在兒孫一目中美僧四調堪羡僧家脫卻繁華勤精進定慧無瑕王侯匪重名利匪誇果極清高極志氣最亨佳圓頂方袍迥出塵勞觀大地猶若鴻毛縱橫物外不受煩囂卻遠情根遠愛欲有禪逃一衲逍遙拄杖橫挑寥寥懸一個瓠瓢遠村乞食古洞為寮也不參禪不學道無矜驕禪板叮敲信口聲嘲無腔調韻徹清霄身心灑落不染塵膠乃絶羈麼絶毀譽不世交山居四儀調山中行踏破羊腸古徑雲徐徐直上會峰頂轉盻天池氣象新山中住間看浮雲還又去忽爾狂風四面來不知蹤迹歸何處山中坐默默無言誰伴我柴扉不掩客來疏惟聽幽禽吟戶左山中臥衲衣當被和頭褁瓠瓢作枕正堪眠忽被猿啼又驚覺四儀禪調山中行草鞋兒都踏破穿過了古松陰又上前坡破衲衣將藤花咸挂落煙霞隨杖轉禽鳥聽指呼一般樣底神通誰儂不似我山中住二六時真快樂喜清風玩明月發明圓覺也無憂也無慮活潑潑念想隨處淨塵緣總不著一段底真風世人難比和坐蒲團半跏趺萬慮定無昏沉沒妄想廓爾太清魔與佛若到此俱乞命如來正受處光明藏裡身忽爾的忘緣三世剎那頃臥藤蘿枕雲根都放下間清風空明月事不交賒四圍山悄寂寂如帳挂青天錦被蓋白雲破絮遮一覺兒醒來紅日照著咱警世四調歎衆生真顛倒隨無明入荒草步步忘卻長安道你只圖妻財子祿造下了罪業山高勸君家早回頭莫待臨時懊縱貪嗔何日了迷自己那能曉汩沒塵勞投榮耀身穿著華衣美服口要喫百味佳肴勸君家早回頭莫待臨時懊爭人我惹煩惱愛嬌奢幾時了因循造下來生報誰知道無情閻老業鏡前毫不相饒勸君家早回頭莫待臨時懊報君家早知道省前愆休營造好將賢聖語言效念一句彌陀古佛思量那極樂清高勸君家早回頭莫待臨時懊
