body:
  text: 明住天台護國寺嗣法門人寂蘊編書復住龍華復唐司馬存憶沈司寇何山請主白雀寺啟秉敕旨於靈山同扶末劫闢津梁於震旦不負初心大道既弘諸佛咸喜恭惟大居士閣下德彌朝野道王人天四兵摧魔外之威獰三尺稟覺王之律令世法之中常行正法國恩之外先報佛恩宰官身柱石一時菩提願金湯萬里似楊大年之行正令若李都尉之近西河但愧淺陋息影半龕素愛清虛隨緣一缽何期鼎翰謂茲道俗晦多年豈敢當陽重向人天豎一指固是宗門有幸況復重任難堪承金湯垂護之雅斯則有命當遵在父母未生之前實亦無法可說先憑短牘敬謝高情附請啟伏以萬象森羅法本周於萬古一音提唱權有屬於一時頻伽妙響已知來自鷇中獅子神威貴使伸於窟外借人天之寶座導佛祖之弘慈眾望允歸合詞虔請恭惟瑞白大禪師蓮座下玄珠久握智印旁通接洞上之真傳受靈山之密囑鼻孔遼天蘊彌天之辯慧腳跟點地露本地之風光大千界內攝受無遺二六時中逍遙自在石室跏趺馴扣階之猛虎孤峰嘯傲度問偈之飛仙甘露已澍於他方化雨未敷於此土行錫既臨忍杜毘耶之口慈航在望孰恢般若之緣況道場山之法輪未轉則湛大師之遺戀方深賴今日之宣揚補當年之缺陷自非克家令子誰為通事舍人法華寺者古德名區西吳勝概尼總持之發軔大光師之踵興祥徵白雀遠符白馬之蹤瑞應青蓮不改青山之色必逄大士始繼前修乘乎願力庶幾有志竟成虛此覺場或者後來居上溈山主人不待下語而決無垢居士何必結菴以招伏望憫斯緇素作我津梁豁開戶牖拯末俗於牛車截斷眾流報深恩於鷲嶺浴日月之光華大昭佛慧平山河之坑坎永奠皇圖反聞聞性處處開小白之花自覺覺他人人證菩提之果恭迎法駕特佈微忱謹啟住龍華復韓太史求仲潘侍御青蓮請主白雀寺啟不忘囑累庶令禪德增輝悟徹本來普使法幢重豎志扶末運力闡真風恭惟大居士閣下河山毓秀奎璧儲精珠回玉轉綜五經廿一史于毫端霞湧雲蒸占三百六十名為榜首洵朝端之柱石為佛教之金湯三氏兼通儒釋道何他何自一真不昧戒定慧孰動孰澄威音那畔悟真機今世門頭通消息不昧弘深願力故能說法現身居士有九成伯思垂護之心山僧乏大慧黃龍接引之力既蒙見召豈敢固辭不揣愚衷統祈鑒炤附請啟二十八代綱宗提佛正令百千萬人觀望示世威儀師門無多誰敢橫分戶牖學者雖眾必須蕩盡干戈喜來病匝之醫王重振塵中之法鼓恭惟大師座下鶴鳴九皋河潤千里居則枯木止水晏坐十方出則鳴鳳遊麟禎祥萬物值耆年凋落之日當正宗冷淡之時深賴典型用銷同異滴水滴凍原來布袋解開入淖入泥末後牢關自握鏟盡法堂之草吹光布衲之毛莫負識痛癢之心公用布學菩提之種子三輪普現一印頓圓驢跡坡間步步象王腳跡雨聲蓬底點點龍女珠璣擔荷難辭合眾拱聽謹啟住龍華復孝廉史汝諧啟受靈山之囑三才賴以匡扶秉東魯之規兩儀藉以位育恭惟居士胸懷日月掌握權衡洞悟心宗透明理學建法幢於越地四海欽聞護祖印於戒珠六合仰望山野德涼學淺抱病巖阿翰墨飛神何敢違拒謹此奉復惟祈鑒諒不悉住龍華復吳太史觀我接手教云教乘粗知別傳未決乞天甘露瓶一滴以豁我盲何如夫教意宗乘原非別物恭聞老居士於世間經書文字及三藏十二部一切修多羅皆已透徹毫無餘剩或意識之未到者不曾研究耳古云太末蟲處處能泊惟不能泊於火燄之上眾生心處處能緣惟不能緣於般若之上惟祈將從前所知所解盡情放下放得潔淨然後向百不知百不會處下手使他冷冰冰地空寂寂虛豁豁無有一法當情其本地風光方可透露古所謂外絕諸緣內心無喘心如墻壁乃可入道此唯在篤行不復煩贅拙偈奉覽心意緣有量不能緣無量本色修行人去卻有無量妄想生死根破妄涅槃城涅槃生死絕親見本來人若見本來人魔佛俱不論有問西來意鯰魚壁上行陳居士到山云老居士精勤護法決意宗乘年雖老而志益堅膚雖雛而心愈銳英雄之氣莫可摧也先師塔銘向蒙慨諾今將行實一一開呈伏祈慧鑒則先師末後一段光明全在老居士智海翻波舌鋒卓焯日雖西而餘影留可謂圓音再振森羅萬象現金容筆舌重宣明暗色空咸側耳宣王道釋迦道一並拈來實相禪文字禪二俱指出法音大闡寶月流輝後學有歸真風永扇臨楮飛神翹佇之至住龍華與唐孝廉祈遠即塵勞而行佛事假世相以演真乘毘目仙人相存外道具足優婆夷不壞女流此華嚴中一真法界菩薩子也何待易其形而後為道哉昨聞居士有出家之志切宜止之龐居士楊大年在家成道善星比丘雲光法師亦墮輪迴道繇心悟何分僧俗惟在居士二六時中將個本參話頭提起力究不可斯須間斷只向行住坐臥屙屎送尿拖著個死屍行底畢竟是個甚麼人於此看來看去驀忽撞著自己㘞始知成佛其來舊矣薰風拂面秀萬卉之花心杲日臨頭成百木之果實榴紅通祖意梔白顯西來護持正法人當在此時洞然矣至囑朔風緊急刺破人人面門不知居士可知否耶知則古榦赤條條不知依舊一團茅草亂蓬蓬去也先和尚傳稿未審近日清否曾付梓否當旋音慰我不悉囑託弁山龍華寺承居士願力所成病朽如風燭草霜豈長久哉今復託重永為金湯者蓋居士之誠敬居士之信心居士之行門必為靈山記莂隨類現身宰官說法乃如此也願居士如呂文正公後代不信三寶者勿生公家生公家者個個簪纓人人冠冕作朝廷之柱石為佛法之金湯是吾願耳然參究工夫但只以柏樹子話時時提持勿緊勿慢久久純熟自然打成一片有個到家時節不明時不可煩懆不可懈怠亦不必執坐但行住坐臥無令打失為玅護法亦須具擇法眼彼師具正知見為法門為後學須要護持使慧命有在若彼師為利為名為處所為眷屬者此為不淨說法也經不云乎末世之中魔王說法如恒河沙眾生愚昧不自覺知其為護法者可不慎哉惟祈為法門為眾生驅邪輔正是禱是幸別為眾竭力勞病臨身神倦氣微難以應接所以向深谷以養沉痾住窮巖而盡殘喘力疾當行准在此日龍華院事已付久默全在居士力請為之庶使佛法有人寺得其主吾願滿足故遣奇珍馳書奉達住龍華復沈司寇何山既知渠是我則普天之下莫非王土率土之濱莫非王臣又謂流轉隨他去者亦是我也須知我無有我無我之我豈妄者哉達此真我則眾流自絕矣奚把柄之謂乎住龍華復嚴比部充涵西堂回持老居士尊榦及齋僧銀上山老居士功德福壽可謂與和風並布煦日同輝矣承問參究工夫事古云參禪無秘訣秪要生死切二六時中但只猛著精彩莫管他閒忙得失將一句本來面目一提提起一靠靠定只恁麼參將去行也如是參坐也如是參動靜閒忙亦如是參參來參去日久歲深自然有個落處至囑住龍華復邢文學吉先朔風彌六合霜花遍大千錦衣公子獸罏添白炭百衲禪和藤床度饑寒正寂寥中忽接翰墨不覺喜動眉顏寂寥翻為和風煦日矣何也喜居士於此有入處則吾法門有賴但未知信得極否果信得極則識得渠今正是我我今不是渠直須恁麼會方得契如如之義矣若復向此如如中作活計正所謂錦獄安身猶帶一重羈鎖何繇而得解脫乎古云若遇御飯亦須吐卻直向高高山頂立足十字街頭橫身雖在十字街橫身不妨高高山頂立足古所謂夜半正明天曉不露正此意也如此會得須知更有向上一竅要知向上一竅且待和風解凍後歷然還越時住龍華復周廣文身為接手教知居士乃個中人非汎汎可比若非親秉靈山記莂曷如是哉諦觀來書見地似有眼而無足何以故見雖精明而不能行履蓋功夫未到究竟故有此疑耳今勸居士可將從前所知所解一切放下放得潔潔淨淨不留絲毫觸境逢緣如空谷答響明鏡炤像不執留不記憶來無所黏過無所從如此行去十年廿年自然不須問人矣觀二轉語見地不無但未剿絕果要諦當知發棒之所以須要見徹擯首座維那落節處纔玅承五問今奉荅問生死夢幻鼎鑊當前不能怡然答石女觀花問情緣假捏骨肉當前豈能漠然答木人飲酒問肉身泡影凍餓當前豈能灑然荅金佛不度爐問較量卜度撮摩虛空拂逆當前豈能恬然荅馬蹄踏微塵問日間猶可把持夢中不能自主事變忽生更難卒應荅明月應清波居士若於荅語中透得不妨做個灑灑落落丈夫立地成佛漢子其或未然切莫草草向者白雀一別清誨疏聞緬想高風日時暢望忽接尊翰始知起居中帶恙堅修未嘗少怠真老當益壯也來翰云所窺不無影響不能一腳踏著遇個促風暴雨不能安閒然修行人要緊正在此耳秪恐居士二六時中不曾回頭力究惟向文字知解邊作活計如說藥人相似真藥現前便眼花撩亂了也居士果要真實相應必須萬緣放下放得潔淨無餘絲毫不存古所謂百不知百不會如此日久自有自繇分他時閻家老子亦沒柰何不然只恐歲月蹉跎韶光難再道力不充臨時未免忙亂可不慎歟住龍華復史文學穎水別來數載清敘無繇忽接尊教心中積想頓然釋矣來書云久厭塵勞志本真諦甚喜但做工夫人於塵勞當減處須減不必厭煩若生厭煩則愈加塵勞且看塵中聿身而過者是甚麼人看來看去忽然看破始信塵中能作主化外自來賓可謂真徹矣居士果有此志當貴乎發大憤立大志直下做去自有得力處若悠悠洋洋即來翰所云來日之短此不待山僧重悉矣住弁山復俞文學浪澄接來翰知居士用心真切造詣淵微真法門之良器也羨羨承如所言生不是佛而皆心也刀不是鋤而皆銕也瓶盤釵釧皆一金也果識金體何妨瓶盤之殊果識目心豈礙生佛之異即生佛而真心即瓶盤而金體何差別之有哉須知古云不是心不是佛不是物且道居士向甚麼處著眼此處著得隻眼須知更有向上一竅要明此一竅問取智慧二子始得住弁山復丁文學子敬適承佳貺謝謝來翰云身心總非無乃落空此因世人執身心實有故吾佛破之令知身心空花當下即歸真際豈復落于空哉又來云山河大地咸屬玅心中之物混沌未剖向何處安身立命此處正要居士疑著病朽聊通一線云無舌童兒解唱歌又來云寂寂惺惺時卻似無極涵太極寂寂惺惺此乃永嘉惺寂雙流體用一如之義總不出自心若達自心無極太極亦在其中矣柏樹子話乃祖師向上提持不落有無及非有非無四句須離四句百非外會取始得如不會但秪恁麼參去自有到家時節也住弁山復沈文學仁叔接來翰知居士為個中事懇切真誠非宿根深厚示現說法曷如是也羨羨若論親切下手處諸佛無二道聖人無兩心三教聖人出世莫不指一心之道也夫心者乃當人二六時中迎賓待客折旋俯仰虛靈不昧一段光明曾無閒然者也或有認作妄想者佛云了心及境界或執有所得者佛云三心不可得此不過隨時破執之語但有言說都無實義居士若要親切下手處但將冊子上看得底解得底記得底盡情放下楞伽所謂五法三自性俱離八識二無我俱遣既遣既離這裏正好看個畢竟那個是我底自心行也如是看坐也如是看穿衣喫飯如是做迎賓待客如是做妄想起時切莫隨之亦莫厭之亦莫斷之只莫管他但恁麼做去打成一片情境俱忘觸著磕著忽爾㘞地一聲始知諸佛無二道聖人無兩心也住弁山復嚴文學季玉接來翰知居士意氣聳聳然鋒鋩銛銛然大似一員猛將有八面受敵之威風但未久經行陣若遇強中強勝中勝恐被他生擒活捉則體面不雅只宜深蓄厚養餘思淨盡般若圓明那時出頭來一棒一條痕一掌一握血殺活自繇收放自在豈不快哉住弁山復張居士接來書知用心之深造詣之切真塵勞中丈夫也來書云昔日聰明見解山河大地都向盤古已前去了是則固是且道盤古已前是甚麼人道一句看又云忽將佛祖化作一團沒眼耳鼻口的東西塞住三千大千沙界既無眼耳鼻口且道足下在何處安身立命又作麼生見聞作麼生唱飲向此無眼耳鼻口處道得一句可來山僧手裡喫棒不然秪是意解所通依草附木豈知佛祖之道哉住弁山與湛初懷悅二居士奔流日月舊人已換新人飛箭歲時新物難同故物若夫林間野壑抱道之士穩坐清虛恒處寂滅睹時遷以忘意觀物改而無心萬古真常煥然不變者烏有新舊之遷哉奉勸諸公頓發大心捨塵勞於貪嗔愛見證佛道於戒定慧門古所謂念佛則高登極樂造惡則永墮沉淪報應無私可不慎歟蓋謂善以薰成惡乃習就莫待無常促至而後方省須知參禪定然悟道持素必也生天若聽予言不枉平日知我之深也住弁山與吳居士曉菴登山須到頂不到頂不知山之高入海須到底不到底不知海之深學道須明極不明極不知道之幾微聞汝要坐關此不可也坐關乃是養道之位汝若參得透頂透底古今差別了了無疑方可杜門息影調養習氣不然可謂不知其時不知其位他日莫言不道住弁山與首座久默子承當個事必須精修造守弘揚大教以報佛祖深恩無得效世之常輩作個座主體態說些名言因果哄些齋公齋婆過日子也大凡住持其剎無論大小眾不拘多寡必要率眾精嚴規矩緊密賞罰分明不可怠惰此為主者之所當然不可濫同諸方禮儀有所不備規矩有所不齊賞罰有所不明則住持之道廢己道安在哉住弁山復禪者石門接來書云昏散昭昭未有一時清淨又云是其無生而有生者耶永嘉云若實無生無不生既無不生何厭其昏散昭昭耶當知昏散昭昭曾非別人即是汝自己昏者是汝昏散者是汝散以其有汝自性清淨之水體故有汝妄想之波浪若無水體則妄想波浪何處安著既知昏散非別人亦不可認著為是從今已後將昏散二念放過一邊單只以本參話頭為懷昏也如是做散也如是做閒忙也如是做動靜也如是做做到人我兩忘根境雙絕忽爾觸著磕著㘞地一聲始知不汝欺也住弁山復禪友悟空和風再布煦日重新是處山增色遍地花滿岑則弁山台嶽不隔一線矣月燈雲衣一般春色煙霞氣味大地逍遙任他狼煙四起我國晏然何驚悸之有哉護國之來亦不定矣直待禪堂已成或可不可且看天緣惟願鄉親緊把繩頭牢握露刃劈柏子於當處破趙關於目前他日相逄只得呵呵
