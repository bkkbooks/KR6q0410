body:
  text: 明住天台護國寺嗣法門人寂蘊編書復住辨山復唐大總憲存憶向來海衆安和吳浙法門興盛皆賴老居士弘庥之力也每欲共談個事惟待歸隱林泉今雖謫任而歸是亦福力所致龍天助此良緣令修吾佛出世之道此時正好反觀前來所歷許多名位許多威權許多顯赫許多榮耀而今數月之坎坷之毀責總是一夢而已烏得不為虛假者哉所以金剛經云一切有為法如夢幻泡影如露亦如電應作如是觀既知身外之物是虛假則知自身亦是虛假從頭觀之皮肉筋骨皆歸于土涕唾膿血皆歸于水暖氣歸火動轉歸風四物各離此身何有惟有常住真性充遍十方不假包胎凝然獨露若不向此時究明辜負己靈豈大丈夫哉若待翻個斤斗則前路茫茫不知何處安身今勸老居士將世出世間一切外纍一放放下看個不與萬法為侶者是甚麼人一扣扣定與他輥作一團行也如是坐也如是臥也如是不可斯須放過倘或遇境逄緣觸著磕著一念相應寧不為出世大丈夫耶即現在之龐蘊楊大年李都尉把手共行儒釋一貫豈不幸哉是禱是祝住辨山復周羽士三畏白馬壇上俱剃度以皈依黃龍山前碎瓢囊而證佛一時捨邪皈正皆因仰慕上乘賢弟既有出塵之心病朽豈無接引之意但深思幻化見桐邑之災危須確究真宗望諸祖而力學知無常之促至生日幾何念父母之深恩剃髮報效倘得發明心地必須代祖弘揚佛恩君恩親恩頃爾報答災障業障報障忽地冰消矣住天台復沈司寇何山辱承華翰頓令泉石增輝愚心亦銘刻矣老居士既以法門為念病朽固可速整歸帆猶待桂子飄香孤雲自來辨嶽住天台復陳吏部木叔二篇大道將隳賴仁人而護佑禪門圮落仗賢哲以安寧若非智者傾心何能永標法幟唐居士見天台之久廢意在求人思公力以護持飛神遠迓幸居士願力深厚意在未睹之先為道懸心留神已發之際雲林泉石咸有歡聲地土泥沙悉皆企仰居士有忠懿王之大力山野無德韶老之宗風福薄才輕有辜重望權作斷橋之略彴暫為黑夜之螢燈以俟高賢續來禪林始可興盛惟祈鑑燭佛日增輝幸幸欲知佛性義當觀時節因緣時節若至其理自彰古有聞蛙聲指木樨而悟者時節因緣也忠懿王供禮韶國師建二十七剎亦時節因緣也護國之興賦田千頃飯僧萬人房寮六百餘所煥若天宮亦時節因緣也後來田地一旦屬於豪家房舍變為瓦礫亦時節因緣也病朽至此不過隨緣度日況欲搆室以為退休之計不期常住淡薄雖有鉢資之餘已作雲廚之供何有贖田之意哉縱有此意亦候時節因緣必不強也聊此奉復住天台復嚴文學渟之別時桃花呈笑臉而今梔子露芳容任他萬物陳奇妙個中不與古今同正來書所云無縛無脫之旨也既得斯旨終日灑灑落落何五欲習氣之有哉何聖凡魔佛之有哉何境風扇動之有哉遇緣即照觸境便知烏得不為秋空月影乎烏得不為夜靜鐘聲乎到與不到無足論也古所謂萬象之中獨露身惟人自肯乃方親公既自肯更何黏墜若稍有境風習氣則自心不透當深造之則日進日妙自然萬無一失矣雖然且道鶴出銀籠一句作麼生道若道得可謂親見辨山來不然且待桂子飄香後南飛北鴈與君知住天台復嚴文學季玉居士夙根淳厚願力弘深故能于般若中才涉參情便有入路豈非示現受生同事之攝乎若真信得及如杲日麗于中天無物不照無物不臨則知一切習氣總是自心發現何差別焉何羈絆焉古所云萬象之中獨露身豈非解脫乎縱有多生習氣但以知見力治之所言知見力即是自心非別物也如水起波全波是水從心起妄全妄是心何差別之有哉即此是夢覺一如但於此做去久久純熟自然言思路絶心體湛然何親疏何精緩如此著得一隻眼可謂向上機關著著全提大用始信十方世界中惟有一乘法諸佛無二道也提也是不提也是參亦不是別人放下亦不是別人可度生死海可登涅槃山雖然如是且道騎佛殿入庫中將山門安燈籠裡又作麼生如此有疑必須再參始得但有路可上更高人也行觀公偈句見地不無只恐依他作解耳拙偈奉復堪羡汝今全體露拈花老子何曾付機緣偶爾霎時逄始信人人皆本具咦青龍巢在鷦鷯頭石虎翻騰迎海度青龍巢在鷦鷯頭即不問秪如石虎翻騰作麼生道道得不枉親見辨山若道不得且待黃花綻相逄笑臉開住天台復丁文學子敬經云十世古今始終不離於當念無邊剎海自他不隔於毫端夫如是則吳越一致也萬法一心也始終一如也僧俗一體也何東西兩浙之有哉如居士始到辨山謁豫即此一念也同豫上天台入護國遊桃源觀石梁回剡溪渡錢塘乃至歸家莫不皆此一念也何始終焉何彼此焉可謂不離苕上而親炙病僧不出台嶽已入龍華如是會得乃名小歇場須知更有祖師巴鼻在會麼要知瑞老歸期日且看橙黃橘緑時住天台復沈文學仁叔末世佛法凋零若非大菩薩現宰官居士身為衆生説法則衆生沉淪苦海何繇同事攝化哉想居士夙願深厚道基恢弘才入禪門頓省心地豈非親受靈山記莂乎接手教知居士以再入爐鎚重加煆煉為念此真勇猛丈夫且吾出家輩捨俗趣真三二十年習氣不得頓斷況居士才入此門焉能頓斷乎古云理則頓悟乘悟併銷事非頓除因次第盡當二六時中要真真實實看得破放得下正念當時時現前不可昧卻暫時不在如同死人若正念現前孤迥迥峭巍巍縱有感慨之懷桑梓顧惜之念如明鏡鑒像來無所黏過無所從豈非是灑灑落落間道人也既知火宅道場原非二地行成解絶豈有兩心只在當人二六時中操守切莫放過必須以斯道而覺斯民可以語戒者戒可以語禪者禪可語道者道即是隨類化身也今天台冠天下名山護國為韶國師大剎桃源洞乃劉阮之仙境石梁橋壯宇宙之奇觀倘居士真能作灑落人不妨駕高車一遊暢望抒情莫如此山之勝也住崆洞復唐總憲存憶五月八日接翰教知老居士以碧巖相召非渥愛愚庸曷至此也奈山朽抱痾深重應接艱難力竭神衰心枯血少只得退隱崆洞以盡殘喘特此拒命有辜賢喬梓之重望矣更祈二六時中將己躬下一段大事不可放過必須精精勤勤自勉自勵與他三世諸佛把手共行方為出世大丈夫不枉塵勞一回致禱致禱復婁文學抱玄瑞生至接尊翰知居士留心此道克究宗乘為法門之金湯作文江之柱石欣羡來翰云念佛難使一心不亂參禪疑情不起斷斷續續淫怒竊發雖知淫怒佛性無二而又不敢直下承當也蓋參禪人十個則有五雙墮此病中皆因生死心不切耳若是生死心切將個本參話頭一提提起如一人與萬人敵相似莫教斯須放過倘或手寬眼慢即被他斬卻頭去也誠能如是做去不日成功立地可待發明本有則不著問人矣既明之後露裸裸赤灑灑則知念佛心與淫怒心皆不可得曾無來處亦無去處何一亂之有哉亙古亙今曾無欠少豈有斷續耶如斯説個妙悟亦是間名烏得不纍贅乎到此頭頭顯現物物全彰切忌認著認著則依然不是雖然更須知有向上一竅在若要明此向上事可到南雲山中拄杖子與汝指出餘不瑣瑣復魏文學東曉前者道駕過山陋室荒涼慢甚初七晚接尊翰如晤道顏亦知居士還楚矣來書云若見自己面則不見種種矣既不見自己面所見種種者是何物見耶若以眼見眼似葡萄朵不能見也若以心見心如工技兒亦不能見也何則心如幻故一滅永滅何能再見也要知數數而見者畢竟是何物而能於此觸著磕著必要討個下落不枉居士頂天立地做個大丈夫漢子也不然且看古人云萬象之中獨露身惟人自肯乃方親若向這裡看破則山僧此一絡索皆為剩語矣復嚴比部充涵接尊翰知老居士留心此道真切做工夫入龍華隨衆坐香話頭頗馴習尚多起倒漏逗更以初學指南長途截徑為問若論指南截徑二六時中折旋俯仰迎賓待客抱子弄孫一一無非截徑處一一無非指南處只為老居士自不知耳雖然不知與他歷代祖師有何差別乎古人云佛法不離穿衣喫飯處屙屎放尿處迎賓待客處生心動念即不是了也若不生心動念則無往不是個事現前於此覷得破擔荷得起奚得不為截徑旨哉若不於此領荷徒自勞碌耳經云不從人得何藉劬勞肯綮修證誠足以為證也復唐孝廉祈遠二篇行業弘深為華嚴之長子道德高廣作佛祖之真兒其唯護法也歟苕上一別又經菊梅幾換榮枯難忘是以龍華寺是居士血疏所成莫改初心終期果滿奈緣山野病憊不能接衆談禪寡學愚頑其實有辜道望心枯喉燥豈堪久居脾弱氣虛胡為衆首只得退歸嵒壑以盡殘年是豫之志願也今承居士翰墨遠頒欲豫再歸不得不書此奉復且久默上座向日已曾面囑當請入華林升堂説法衲僧濟濟乃龍華之勝事檀越紛紛實護法之心誠何在區區病朽之野衲哉內外若有梗法不遵方丈之規約者居士與默公當以清規治之或罰或擯如不依者王法處之則龍華永固默子心安即山僧居龍華亦無二也竊謂居士於此門中已將十年矣不知近日曾透徹不不可悠悠徉徉今日也恁麼明日也恁麼臘月三十日到依舊黑漫漫地反怨佛法無靈驗且閻羅老子不怕修福者轉輪聖王其福最大亦難逃乎他手亦不怕文學辨才者如古之才子今之會魁即吳都御等尚入地獄其才力雖大亦難免乎他手夫如是當知明道要緊可將世出世間盡情放得乾乾淨淨必須努力中更加努力精進中更加精進一念相應則全體顯現通身手眼古今機緣了了無疑可謂活潑潑轉轆轆隨處自在不亦慶快平生歟是不枉為法門出人頭地之一人也復賴居士大丈夫觀身世名利如夢幻泡影倏爾消落原非長久何得悠悠徉徉待乎臨頭之雨哉來翰索良方只有一服平胃散奉寄偈曰山中與井市元不有塵土識得個裡人觸處皆清楚個裡人何識憤起大信力提起吹毛劍境緣當頭劈復丁文學子敬昨承翰問知二六時中未敢忘卻話頭足見用心之真造詣之切非泛泛可比也四偈首偈略可三偈盡屬道理於祖師關太遠在必須於話頭做去待他卒地斷嚗地折方與祖師關捩子少分相應若要知夜半日輪紅石女繡鴛鴦木童把酒盞泥牛眠海底之旨此非心思意解得底直須絶後再蘇始可知此無義味話要悟明自心要了生死要透祖關當知一切言教俱屬方便古云但有言説都無實義即龍女成佛示為法門故亦須轉然自古至今未始有一女佛也若據佛法向上而言曾無轉與不轉若以幻化而言亦無男女之相何轉之有哉望居士努力加功以期妙悟直與歷代祖師把手共行方知吾語不虛至囑復鍾居士玉所來書云主人公朝夕不離作麼生會既朝夕不離則不必會矣不必得矣若要更會更得則是頭上安頭烏得為主人公耶又謂入門大事更望提誨若要明此大事但於洗面時摸著鼻孔便知端的或仰面見青天時亦知消息於斯得個消息更上山頭拄杖子與汝剿絶何如復席居士珍宇接尊翰知居士有決絶塵勞之志力究祖道之心老當益壯則三世諸佛合掌讚歎有分也再祈居士更發勇猛堅固志願弗使中路懈退不然則靡不有初鮮克有終於道何益矣然真要了此大事但二六時中將個本參話頭緊緊扣住於動靜間忙之時逆順鬧亂之際切勿絲毫放過功夫自然純熟打成一片忽爾㘞地一聲捉敗這賊可謂即塵勞而作佛事也即今之維摩居士也何在出家而後為學道哉復鮑文學思薰皇圖末運佛道垂秋非菩薩降迹興慈運悲則一切衆生何繇得其安樂哉向聞居士開大方便作大佛事施藥施財利濟無量此非菩薩莫能矣令甥回山接尊翰知居士從門入意識會於懸崖撒手處絶不可冀為念但今時士大夫輩莫不墮此意識領會之病居士可將從前學解得底盡情掃向一邊此是對症與藥更須參則機緣如龐居士曾參不與萬法為侶者是甚麼人只恁麼看去一切施為動靜間忙處但只緊緊看住看來看去忽然打翻自己家珍捉敗龐蘊老漢自然懸崖撒手自然露裸裸而赤灑灑覓其半毫世法佛法了不可得豈不快哉復余文學萬容令師回山接手書承種種過諭復云根器雖卑而有佛祖之志可謂真大丈夫也公既有佛祖之志必要行佛祖之事所言佛祖之事者外以慈心濟物內以定慧修身自他一體物我同觀若能如是行去真為佛祖之兒孫更須知有腳跟下一件大事始得所謂本命元辰公可知否若不知但恁麼看去切不得絲毫放過倘觸著磕著忽然如此了當即是選佛場中已中甲科矣故謂之心空及第歸也復泰和禪客恆明一切世出世間法皆是依時對機之所建立也若談性則一切皆真若破妄則一切皆假若談根境則一切皆是塵緣故法無定法隨人施設公所説者正是真如之理引維摩圓覺二經淫怒癡俱是梵行等此正是真如謂之理窟謂之理障謂之如來禪謂之百尺竿頭坐的人百尺竿頭須用進步理窟理障如來禪須用掃去方可透徹祖師關不然只在死水裡浸卻何能知向上事乎如僧問趙州如何是西來大意州云庭前柏樹子柏樹子豈非黃花翠竹之類乎若以翠竹柏樹子俱作真如會則教家足以明矣何謂教外別傳何用祖師西來何能開人眼目何可稱為祖師關向上事何能喚作悟心人當細思之古人云若論此事尚不與教乘合況世間文字乎所以云不向言中取不向句中求沉言者喪滯句者迷此之謂也真如之理焉可及哉復山主李居士明吾久違道範時切瞻依想近來念佛心純蓮臺標號實大檀功力之所至也病朽每感賢喬梓辱愛為方外交欣然捨寺址搆梵宇四衆既有依止而明心達本則居士之福德誠不可量矣奈病朽勞病多年心枯血少氣衰力微只得退處深嵒將龍華盡付久上座掌管豫素知此人朴實任重今所托得人亦不孤大檀之望也更望道念堅固庶令龍華永興不惟居士合族之福綿遠亦且法被萬世之下皆居士之福也再祈緊著繩頭一句彌陀時刻莫放至於心佛不二是為真實受用囑囑復龍華久默上座近聞龍華規矩整肅道風遠播遐邇知皈正宜子之有力人主席何勞絮絮叨叨望病朽回來若不為養病一接便歸何在四五請而再之又再也老僧原説病軀若愈到六十歲或可回浙掃塔若不愈則老死嵒阿而已衰朽之身心豈能伴精壯之機器哉田地可以清理者理之不可清理者還契書而棄之免使後人業纍其餘瑣末汝當裁之復護國嘯雲上座二篇向將護國付托乃病朽平日深知非偶然也舊秋出山時囑衆職事同心料理雖許再來亦病朽方便以慰衆心耳汝宜善守自能興復調衆有方服人以道何必忉忉而望再來此亦有時非自強也山中道場不比坡下叢席須效古之百丈今之壽昌種田喫飯勞逸同心何患後日道之不行哉病朽意在四月八日上九華終南茲筆難盡爾自勉旃丙子二月草日辨山入就老人書病朽丙子夏初離辨山意往終南隱迹舟到贛州聞崆洞幽深可棲因喜居之觀來書并正宗説皆慰吾意益知天台衆職同心不負病朽之囑當思古之為叢林主者為弘祖道乃重其地地勝則人集人集則道行勞必身先逸必居後斯則德充道播無愧古人今聞同甘枯淡作務能隨昔百丈作食開田之風規羡有在焉近日有某妄判古人謂濟宗以棒喝為本分洞宗以語句為本分又某妄判世尊睹星明道六祖本來無物之偈并洞山偈皆載語録中此若不與論之恐誤後學今有書到辨山久默處汝等當判之毋縱彼妄説妄説既杜法門幸甚後學幸甚病朽為法門之願亦盡矣若不依余坐視不理將何以報佛祖正法之恩思之為之人天慶幸復禪者念微來書云祖意教意有人問著或時有語或時無語不能應機無滯伏希開示方便古云偷心淨盡方堪措泊若論此事惟在當人悟得親見得徹信得及方可用得出若稍假擬議即落二落三了也即是偷心了也古云入荒田不揀草應機有滯皆于荒田中揀草之謂也若不揀擇拈來無不是何滯之有哉如洪鐘在架有扣則應皆無心也若無心而應則偷心斷盡二六時中總是一顆摩尼寶珠放光動地應用無窮何滯之有哉與西堂中也子承當個事不可草草過日古人修道不為住處不為衣食不為徒衆利養必以弘荷大法為懷利濟衆生為念二六時中造成一片黃金骨自爾爍開頂門眼他時論佛論祖亦無愧也囑囑復禪者位中德舟到山知近日工夫掬飲搬薪一一成現則與三世諸佛同一鼻孔出氣但以機未圓活過後張弓之説為問此正汝識心之過耳若能虛中而應不假思惟如鐘受桴如水銀墮地無有不響應圓活者也古所謂偷心淨盡方堪措泊不然則措泊不上參之復禪者懸㘞二篇梵語阿彌陀此云無量壽亦云無量光公素心固願欲得見此彌陀者則六根門頭放光動地無處不是相見處無處不是著實處折旋俯仰觸著磕著無處不是接引處何不明之言哉何銅墻鐵壁之礙哉主張亦是汝不主張亦是汝勿謂無明煩惱卻非本來面目誰知聲色裡元是法王身雖然如此承當正好向山僧手裡喫棒何故須知更有向上事在來書云疑團頓破又云證之一字尚未的確足見汝未具頂門眼惟依他作解若疑團頓破徹法源底一亦不立況其二耶佛祖之道豈有二乎二六時中穿衣喫飯迎賓待客折旋俯仰無非是爾證處古云今世門頭不捨一法不捨一法處頭頭顯現法法全彰是爾真贓定案也實際理地不受一塵即是元無口也何必問人處胎出胎至于成佛皆獨尊之旨雪山修行為法作則用拔諸苦正所謂修證即不無亦顯獨尊矣當知不可尋言逐句但向二六時中動轉施為無憎無愛看來看去自然明白
