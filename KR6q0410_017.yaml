body:
  text: 明住天台護國寺嗣法門人寂蘊編附塔銘傳塔銘并序若昔大猷載在儒典靜言圮族有誅慢自賢志自滿有誅朋家作讎作威作不典有誅所稱唐虞之際三代之英設坊自上猶有險膚譸張聒聒屑屑之辭胥動多方而下濫為庶人之議者嗚呼非天子不議議逮庶人即天子不復可問而天其或者于庶人中篤生大人焉俾以直議誅橫議而收其後如鄉原之議狂議狷楊墨之議仁議義其言教嘗碎其議嘗橫而誣必如孔子之議鄉原名之曰德賊孟子之議楊墨名之曰道賊而群碎乃帖然而議乃大定此之謂齒齊舌廣和合諍鬥具大人相作直心道場者是耶我聞仁王經云若國欲亂鬼神先亂鬼神亂故萬人亂亂所自起亦維曰國之王臣互相是非而已是非在國且以開亂況在天子不問之草莽人乎況在天子不臣之方外人乎嗚呼越自菩提多羅翻四七之後徑作二三之前茅衣法傳是非亦傳中間六試毒而三揮劍西乾東震剩有宿債應償北教南宗誰是一枝橫出競飲分河之水爭操入室之戈古既有之於今為裂斯亦大人收後之時矣問誰其人僉曰辨山瑞白禪師蓋以身任之師樅陽楊氏子法諱明雪署號入就諸方字之曰瑞白禪師方毀齔遽脫左髦事母卓以孝聞比學禮之年失恃而為之袝曾不能飲杯圈則既田衣菅屨持𨩲唱跋思以三尊之教度二親矣九華慧公其剃染師也有休公者激發之使見知識于是始有事南詢香積取諸分衛旦過取諸半跏漂梗栖苴都無一向邂逅紫柏之徒授以毗舍浮偈頗受持之歷幕山之門惎之閲教非其好也慕雲棲蓮公之為人造問作止任滅四病曰只莫生心取圓覺師出四病也師拜其語受具而去聞首楞嚴別業同分二見忽覺根身器界燈影日暈而已前所持偈亦自洞然無何且病病輒不能自主始信圓明禪師有云十二韋陀典一標月之指耳昔在祖師説法華墜天蓮湧地尚未出離生死況是區區者何濟庚戌春聞諸道路雲門顯聖有至人焉曰湛然大師師攝衣往從之問向來作甚麼師曰持毗舍偈曰四大是假妄心是空阿誰拖你者死尸來師罔然為鈍置者久之至第七夜于延慶殿立香忽地湧起不離當處嘗湛然覓即知君不可見方曉前旨及被人問著譊訛正復在揚州越國間辛亥歸顯聖坐禪不語者百日不眠者數七奮迅之氣猛于捉象甲寅春隨雲門遷廣孝聞上堂激揚機語大非思量所及不覺痛哭自誓曰死也罷活也罷拚此一生去工夫既成片視向來差省力矣小參舉斬貓因緣師於言下知有將蒲團拋出雲門曰一語下徐州時有同參通文墨者頌之自謂佳師不肯乃信口曰提起劍斬卻貓一段春光人不曉南泉舉似作家子趙州老人頭戴草頭戴草凜凜威風振華表同參亦不肯進而質之雲門門曰不通文者佳會從橋上過垂一語云溪水潺潺衆下語皆不契師曰敲空有響擊木無聲雲門頷之嗣入室師一一詣實而供門曰自今以往休去歇去師猶不自肯更加精彩因聞鐘聲瞥地大徹灼然有一到家休歇處自是機辨峭拔鮮有嬰其鋒者尚自陸沉衆中隨侍雲門巾瓶赴徑山應東塔為下板也丙辰春往皖公山養靜只一茆龕廣可十磔手輪可四十膚時與何太師芝嶽伽陀酬唱不啻公美之遇斷際慮別有旨不關紙墨事己未下山訪黃蘗無念大士盤桓信宿念謂侍僧曰者衲子他時有把茆蓋頭在次第訪憨山大師養菴老宿博山和尚諸大老各有機緣並見語録師之引重諸方亦略可見矣庚申歸省雲門明年屏居天柱峰即宛委也癸亥顯聖結冬龍象麇至擢師為第二座初苦堂規不整師有意振之偶如廁遲歸為止靜者所誰何即長跪佛前作一衆肅然一期斬然正使道學先生見之亦當謂三代樂禮盡在是乎雲門念師分座為勞利生時至欲有所付師底力辭之珍重如千年桃正熟不易作退華杏子摘卻也甲子誅茆鐵壁居雲水往來如織有僧問如何是無夢無想主人公曰鐵壁山高僧曰莫便是麼曰是即頭上安頭不是即撥波求水僧曰無是無非是否曰無是無非死水身栖一日有女人上山師曰遮裡不著神錢社火去昔少年苾芻指雲峰為不通方漢此又過之矣乙丑參金粟入門便喝粟曰好喝師連喝兩喝便禮拜粟打一棒人事畢值抬船次師曰虛空駕鐵船時如何粟便打師接住拄杖曰波浪湧千尋時如何粟欲打脫拄杖不得師曰和尚無下手處粟曰且道承誰人力師鳴指一下粟微笑而歸留師為第二座每粟上堂師必出衆作一番哮吼蹴踏馬群為之一空粟蓋屬意焉當此之時所謂天下權在信只爭左右投耳而師顧未之許意謂嗣粟則孤雲門也乃行丙寅歸雲門呈偈曰蒙師饒舌十餘年本分繇來不可傳有見原非解脫道無心豈是祖師禪三玄四喝間家具五位君臣總白拈欲識老胡親的旨金烏夜半麗中天雲門曰語無滲漏不落正偏是真個曹洞兒孫遂付衣法並偈曰誕生原是自心名空裏栽花本現成滿口道來無可道威音那畔幾知音嗣為洞山三十二世也師既受囑纍欲隱南嶽未果行而雲門逝衆請繼席焉師仍然西南向以讓有德戊辰薑太史針勝諸檀護洎闔山勤請事不獲已則應之得坐披衣後自有本分鉗鎚作家罏韝不妨鈍鐵點作純金而躍冶之子不堪重鍛又如真藥現前拈得便用妙手所觸殺活自繇而初學鹵莽但竊其似未免認杜漏藍作綿州附子自誤誤人過亦不在醫王此可明乎無師之智不從人授師亦未嘗有定法授人也本分繇來不可傳只此一語與他湛老人作供養足矣時師有雲門三種獅子頌鱠炙藂林庚午夏將有終南之役經吳興為吳興所遮道住辨山龍華寺才駐錫越中士紳倪太史鴻寶徐藩侯亮生李學憲玉完請于延慶開堂蠟月歸辨山殿宇初搆明年有一闡提者將不和於法門孝廉張魯平以書勸師稍避之師曰我自以法道陰翼王度苟無愧心何避之有不聽所云陰翼王度語出柳子厚我明太祖嘗引此以陽翼佛法豈非法王翼人王人王亦翼法王大人作略先後同揆使彼蠢爾小醜早見御製文愧死猶晚矣無何唐總憲存憶入山蓋亦有聞而來先是道場山請雲門説法緣會未期唐孝廉祈遠每念及則以未事雲門為憾嗣聞師風如歷飢渴遂橫身荷之而師之開法於辨爾時道價頓傾流輩逼亞老南矣是秋受沈司寇何山閔太宰曾泉朱太師平韓狀元求仲請主白雀師平凡概以佛法接人會有俗客過訪不相見而去師曰亦不孤他來意監院請云何不遂以三門外接下等人禮接之師曰若爾何謂平等自是有感鐵面一鉢五湖之志矣解制復歸龍華師他日無故不出山即會下人總不許應人佛事雖嘗住時有緩急亦不許那借人物嘗曰隨家豐儉有飯則飯無飯則粥無粥則散更不喜人間慶弔禮及行苞苴酬酢曰此謂污他家行惡行佛制所不許癸酉胡冏卿璞菴劉納言念臺董璽卿皇庭徐觀察檀燕王制臺峨雲丁宮端歐石邢銓部淇瞻倪侍御三闌余中祕武貞請師蕺山戒珠寺開堂衆倍白雀甲戌還辨山紺殿落成衆倍戒珠乙亥陶給諫虎溪啇開府等軒請住天台護國寺將行嚴比部充涵率諸子侄登山相留師曰許之矣不可爽比入院百廢畢舉多年埋沒之招提一旦恢復秋還辨山明年以病謝院事挽之不可乃飄然一往意在終南也艤舟湖口為石尤所阻鄰舫一贛客見師異之扣所往曰此中有山名崆洞拔地數萬仞泉石殊勝足可樂道何必終南師遽移舟登巔一覽則二水夾馳眴目離合魚龍猿狖在空濛縹眇中徹頂徹底別開眼界師樂之若將終身焉未幾吳興書來趣歸辨不許汀州太和各有書抵師爭以名藍相延皆不許承古有言蟻尋腥走蠅向臭飛問道之履亦未嘗不填戶外也建安王欽師道望齎尺一牘殷勤幣聘住持洪都百丈山師雅慕百丈乃隨機赴之挾襆追逐者百餘衲舳艫相銜而進至瑞州則兵守之矣蓋是邏倅驚謂寇至報之官司將以獻首功幕府耳師為軒渠一笑幕府知之遣官衛之上山師到山亦第舉所謂百丈清規而重巽之時復荷鍤與作務人俱人謂大智再來也何期化緣畢於此明春穀日示微疾調衆益篤談笑自如三月十九遲明起浴謂侍者曰扶老僧入龕去小間手書偈曰來亦無一物去亦無一物若知端的意百丈花稍月擲筆以手招衆衆前師已吉祥而逝矣日正卓午也師示生萬曆甲申十一月二十六日戌時示寂崇禎辛巳三月十九日午時世壽五十有八僧臘三十有八塔全身於辨山龍華乙山辛向正面方山師所筮也建安差官設祭議欲留龕見遺命但存髮塔於百丈先是辨山報塔工竣師手書曰訃到便來接龕復大署紙尾云老僧不過四月矣又書真讚有再過十日之語凡皆預知時至也師行腳十三年未常解衣臥及出世止衣草布諸所創建僅蔽風雨曰吾效雲棲之作法涼也喜蒔竹木去之日猶加灌溉功或謂之多事曰招提在也嘗解衣衣窮乏或謂之不均曰周急所以均也病者藥石之老者扶持之有所諾無或許而不豫無或不時豫豫則忘之無或責報天懷坦率提獎風流與人相遊光霽中逼拶學人則不稍假顏色遇侍者尤嚴每痛像季不重木叉雖所犯輕必重繩之曰五分法身尚不成就又能全該三德乎其垂訓初學必曰僧不看遺教經法王之叛臣也故所在匡徒雖衆初不濫竽四食三衣如法學習以期于事存高素歸趣聖方要有不落今時者師之身律蓋如此見學人久不還鄉師賢之或告歸寧師亦賢之囑曰使父母知出世之因豈不踰勝世孝萬萬師之錫類又如此乃至嘻笑怒罵布武布席一欠一伸一涕唾無不可作佛事者每見人墮邪道中必起同體悲導入正道或其人己眼本正因師故邪了無一長先學慢我則教中有云如諸蠕動實不推理而舉螯張鬐怒目自大是為斷慧命人不忍不急救之然是導師之過又不得不從發病處一根挌之首座敷諫曰鬥諍世界以諍諍諍彼亦謂諍奈何師曰摧邪輔正令法久住佛之願也吾為此懼又復何懼師故倔強他日嘗謂我為法王於法自在故行止自主絶不傍人而一時正人君子頗以是增而重焉吳太史觀我云吾邑之有辨山猶龍舒之有博山此非尋嘗定知地湧菩薩不忘慈誓以佛知見為我等輩留影是邦知言哉蓋此洞彼濟門戶之分已非一朝一夕師用意良獨苦顧又未嘗不嘉興為和合也而曰千流萬派一源而出在西域當尊迦葉為始在東土當尊達磨為始今後當稱達磨幾十世則舉本該末矣謂之尊稱達磨正宗説倘亦靈源自稱釋迦文四十八世孫之旨而向所云齒齊舌廣具大人相師蓋其人乎師九坐道場別有語録流傳并闢判十餘卷異方便一卷得法三十餘人曰久默音曰孤崖聰歷然相離言義嘯雲蘊數輩而下詳在行録中不具列裕入山以來焚筆研有年矣尤遜不敢為諸尊宿作邈真語亦小避諍風嫌於佐鬥之意而起元生公是三十人中一數持辨山法嗣久默音公等書狀來命裕為塔上之銘重以唐孝廉祈遠為之紹一再往返不聽辭謹序其事而為之銘銘曰我曹洞宗兩刃交鋒共功不功曰誕生王密密堂堂祖父之光何期法筵作仇自賢參蝸國禪何期么麼飲水分河入室操戈爰生大人驅魔白民作佛忠臣爰有辨山振解鬥鐶破是非關迦陵出音孔雀空群鎩羽翂翂蓋膽有毛怒目失螯英風颾颾乃息紛拏乃秉木叉乃別牛車一衆肅然一期斬然泥蓮火蓮陰翼人王陽翼法王法昌天昌破驢足蠅夥蟻尋腥嫌太僧生我思終南我龕我碞我刳我杉而得崆洞縹眇空濛咄哉老翁緣起洪都相銜舳艫伍伯追呼化蟲化沙摝蟹摝蝦一龍一蛇龍蛇之年聖賢之躔蒼天蒼天內紹兒孫多樹仍晜足報雲門忽疲津梁無縫斯藏副在青琅菩薩戒弟子石頭布衲道裕前通議大夫四任職方郎初以劾政府豫告再以不奉詔忤逆璫為民三以覆疏錯一字降調兩賜環一奉御劄以清執還原官以籌邊功歷太僕太常卿巡撫山東以登撫兵變併逮謫高涼今以甘肅舊功蒙特恩復初服還石頭城余大成撰文傳憶昔雲門湛大師最後説法吾郡道場山甫四日而魔作罷去余時鄉居相距百里雖同郡莫以告者不知也既而雲門道經吾里始獲一瞻晬容別未幾示寂俄而辨山彌勒峰之麓有泊然宴坐者距郡郭又數十里余亦不知也明年門者呈張孝廉魯平居士募册余展閲次始知有瑞白大師云以示兒子竑竑臥疾久欣然曰雲門法嗣也向者交臂失之引領道場山有餘歉焉盍以今人之東隅補昔人之桑榆乎余曰汝病未能出吾先往往則彌望荒萊數椽闃如徒四壁立衲僧數輩菜色藍縷師氣宇巋然如蒞千衆留余同飯一菜而已時闡提乘墉謗讟騰播聞於當道余為白焉始有寧宇師初至人無知者坐是名乃著緇素日漸奔湊蓋五年而向之荒萊漸成寶坊然無歲不出其赴天台請也曰不歸矣黑白敦請始歸歸未幾復飄然長往往之日曰將詣終南俄聞卓錫虔南之崆洞山黑白敦請還吳歲歲不輟如初而師一別五年俄聞赴百丈請又未幾復飄然長往則盡大地人覓蹤影不可得矣嗚呼師何往乎葉落歸根知再來否乎於是兒子竑持行狀來得細讀之始知其願之堅也行之力也證之真也其落䰂之地曰九華聚龍庵當執爨時決志超凡既聞悟明心地之言昕夕以之出門參方初誦舍浮偈繼遊講肆所至若有負者聞外道語如水投石即有證有得復自策彌篤至聞雲門一伽陀慟哭拚身命以從事啐啄時至雲門印之矣猶若不釋然者必無憾而後即安堅矣哉其願也至其行腳自離灶下養即遍四方瓢衲外百無一儲孤村乞而古廟栖寒夜無衾者十有三年己事未明皇皇焉自鞭其後嘗百日不語晝夜不交睫以求之每奮迅輒曰死即死耳不返顧也凍餒所侵患傷寒瀕死者三晚年病肺而畏寒每冬日熾薪室中自溫頭面為赤或規之師曰而豈知吾昔年苦哉既出世為人仍稟毗尼甚嚴御下一遵規繩不少貸小踰越譙呵及之侍者數受笞終無怨者初住顯聖為兄弟藂林動患掣肘不遂意棄而渡江止辨山荊榛蛇虎之區墾土結茆栖焉衲子時往從之吾郡禪宗久廢閭閻從不聞百丈規何事相與怪之謗且撼者百出既鳴官或駭曰捕者至矣魯平居士虛精舍邀師暫避學徒喜慫恿之師罵曰癡衆生世豈有畏難善知識耶苟無捍禁網梗皇化脫有意外聽之耳難可苟免乎安坐如初久之耳目所薰漸生渴仰今本山著姓李舉族皈依道德所感也達官貴人欲致師一面師曰苟慕道彼不能來乎有比丘尼遊諸大家老矣入山禮師自請募千金建剎乞下院開女期所獲檀施悉輸嘗住師不許監院方苦匱乏從容言下院距寺數十里而遙四部弟子古固有之何害師曰彼借龍華為名相距遠終吾屬也且今安得如古汝曹聚首學道當道猶兢兢慮之況尼乎龍天道場即匱乏有尸其責者吾何藉千金為監院曰彼遊朱門縱不藉其力奈騰謗何師毅然曰吾無可謗復何慮卒不許嘗住窘戒那貸曰有飯則飯無飯則粥無粥則散一那貸即錯因果矣龍華草創艱苦備嘗甫就緒忽棄之他適緇素奔走懇留有跪且泣者師翻然出門竟不顧初居崆洞改號結團瓢截枯木支茆匠者欲加琢不許同居不過十餘人辭歸者復數人師獨樂之將終焉俄而學人四合紳襟虛席請説法師復避之南雲山衆迎還崆洞江右建安王慕師道風馳書幣請重興洪都百丈山師聞慨然曰天下清規所自出也兆足以行矣吾縱老病其忍辭遄赴之取道瑞州值有司以寇警毖功令干掫戒嚴比丘百餘警而相告曰數千群起誰何之邑令親入舟見師不覺意消曰此豈為惡者耶加禮犒從者而去撫軍聞初以兵至既得實乃聽師住百丈但戒途次勿留多人而已師到院修大智之廢墜擬荷鋤力作為四衆先而病魔數撓之伏枕次問道乞偈者未嘗不諄諄答也且招之曰及吾能答時病已棘語期期不辨矣猶伸紙疾書代面命蓋始終未嘗先四大而後人也力矣哉其行也若乃證入之深密濟不敏何能悉之姑述其可傳者首參雲棲問作止任滅四病如何出得棲曰從汝作止任滅但莫生心取圓覺即出四病也參黃蘗問學人千里遠來乞師指示蘗曰佛法那可指示問可保任否蘗罵曰保任個甚麼師畫一圓相蘗便掌師拂袖出蘗顧旁僧曰這僧卻有把茅蓋頭在參憨山問一塵不立時如何憨曰曾到此未師曰若到即塵也憨變色曰野狐精弄虛頭參峰頂問雪覆千山和尚如何為人頂便掌師曰莫就是為人處否頂曰我同汝看雪看雪次師曰正當爾時狐狸野干都無蹤迹頂曰止有師子在師曰亦是野干參博山山問何來師曰桐城山曰風景較此何如師曰處處緑楊堪繫馬山曰猶作此解推案入方丈師曰又恁麼去也參金粟入門便喝粟曰好喝師復連喝便禮拜粟便打抬船次師曰虛空駕鐵船時如何粟便打師接住曰波浪湧千尋時如何粟欲打曳杖不能脫師曰和尚無下手處粟曰且道承誰人力師鳴指一下粟微笑而歸粟上堂師時為第二座問曰正偏兼帶即不問臨濟家風事若何粟便打師云金雞唱落中天月泥猿吼盡五更風粟曰再犯不容普茶師問慈雲普覆三千界只怕冬寒一夜風秪如狂風四起和尚向甚處立粟曰一腳踢汝師曰恁麼則秦駐山前端然坐金粟峰頭任往還粟曰汝要第二腳耶師禮拜歸位上堂師出禮拜起便喝粟便打師又喝粟又打師云老漢敗闕了也便歸位普茶師問東征西討乾坤靜今日臨朝事若何粟默然師曰四海密傳天子令鄉村野老樂豐年禮拜歸位雲門小參舉斬貓話師忽有省拋出蒲團門云一語下徐州門坐橋上曰溪水潺潺汝等道看衆下語不契師曰敲空有響擊木無聲門笑頷之旋入室師陳所見門曰從今休歇去師猶不自肯更勇參六日聞鐘聲始豁然門上堂師問大衆濟濟燈燭輝煌請和尚指示門曰有眼皆見師曰恁麼則個個成佛去也門曰汝眼原不瞎時為第二座癸亥歲也又二年乃至金粟共展化儀明年復還雲門呈偈曰蒙師饒舌十餘年本分繇來不可傳有見原非解脫道無心豈是祖師禪三玄四喝間家具五位君臣總白拈欲識老胡親的旨金烏夜半麗中天門曰語無滲漏善解回互遂付法并偈曰誕生原是自心名空裏栽花本現成滿口道來無可道威音那畔幾知音蓋於洞宗為三十二世也旋住鍾山門示寂師繼席顯聖未幾飛錫來辨山復古龍華寺為開山俄應越延慶寺請期畢還龍華明年應本郡白雀寺請期畢復還又二年應越蕺山戒珠寺請期畢復還明年藂林始落成明年應天台護國寺請是年秋余及諸紳襟緇素懇迎始還明年復掃塔九華往崆洞矣師自渡江後時時欲往終南值北方道多梗意猶堅既離龍華舟指終南輒阻石尤者數四師曰天也偶鄰舟贛客鍾願為地主迎師崆洞遂從之已而避喧南雲山復還崆洞庚辰秋應建安王請住百丈明年春寂矣臨終偈曰來亦無一物去亦無一物若知端的意百丈花梢月餘法語載在前後録中不具述時崇禎辛巳三月十九日午時也距生時萬曆甲申十一月二十六日戌時五十八年矣僧臘三十有八先是建壽塔於龍華寺之北甫成報師師喜曰俟老僧訃音到即迎龕入塔其貽兒竑書亦然頗訝之信使還瀕行寄語曰告爾堂頭秋間書來老僧歸矣又聞季春九之日有學人求師像讚題曰再過十日且看咭咶蓋預知也始師將往天台指方丈後牡丹謂侍者曰明年開一花吾當歸非是不歸矣明年果開一花及庚辰夏方丈榴花忽變白至是始驗其兆噫神者告之豈偶然哉師説法白雀孤崖大師為西堂後於戒珠授衣法住洞山次説法天台嘯雲大師為西堂至秋八月付衣法主護國席師即回龍華欲隱終南值今堂頭久默大師為座元即以龍華委之師仍居首寮虛方丈以俟師再來者纍年數奉嚴命始據坐餘後先付法稱嗣子龍華所録凡二十餘人後元潔師侍龕歸攜有稿本又十餘人得戒請益稱門牆者不可勝數以十月之十三日奉全身入塔先是建安王聞訃為文遣祭至則龕行矣於是百丈僧齎文護龕至辨山設祭於龍華遠邇思慕瓣香叩几筵者不絶其徒求塔銘於余余謝不承又以傳請不可以再辭為傳其略如此贊曰洞上一宗顯於雲門克家肯搆師為哲嗣懷香問道上逮王侯名聲普聞可謂殊勝矣晚歲因高峰枕子一頌法戰不休擊鼓揚幡竟天殷地旁觀者口呿目眙莫適所從乃吾聞之兒竑師數稱天童命兒速往瞻禮且曰老人年尊矣不往更復何待嗚呼此足以見師之心矣末法鬥爭堅固諸善知識即現鬥爭身而為説法縱橫逆順罔非激揚吾安知反唇而稽者之非前于後喁攘臂而仍者之非左提右挈耶夫師之真參實悟蓋自老師大衲以暨走卒兒童都無間言非有期會要約也或曰師悟繇較高峰果何如曰止止毋多言不聞惟證乃知乎我非其人安用與間斯事哉晉昌唐世濟撰
