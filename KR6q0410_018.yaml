body:
  text: 明住天台護國寺嗣法門人寂蘊編行狀師諱明雪字瑞白號入就族姓楊父一舉桐城人幼孤事母卓甚孝髫志超塵見僧則喜年二十杖桐合葬訖從九華聚龍菴慧公剃落跪爨三祀遇長老知休指參知識始發足超方帶空鐼為行廚徙枯廟為旦過邂逅紫柏尊者之室灑授毗舍伽陀信而持誦歷幕山惟令閲教遊講肆不嗜糟粕慕蓮大師造雲棲問作止任滅四病如何得出曰只莫生心取圓覺即出四病也師作禮圓具而辭聽耶楞嚴闡二種妄見忽覺根身器界總是空花所持偈為無礙病不能支方悔庚戌聞會稽雲門顯聖寺有悟道知識湛然和尚世所希有欣然往參門曰向作甚麼曰持毗舍偈門曰四大是假妄心是空阿誰拖你者死尸來師鈍置疑甚至第七夜於延慶殿上立香忽然湧起不離當處嘗湛然覓即知君不可見方曉前話為人問一歸何處猶礙復看辛亥入顯聖不語百日晝夜不睡數七勇猛大過氣如負重甲寅隨門遷廣孝聞上堂激切痛哭發憤曰死也罷活也罷拚此身去不自成片自覺省力小參舉斬貓話領略拋出蒲團門曰一語下徐州時一同參通文墨者頌之自謂佳師不肯同曰若試頌看師信口曰提起劍斬卻貓一段春光人不曉南泉舉似作家子趙州老人頭戴草頭戴草凜凜威風振華表同亦不肯質於門門謂同曰爾不如渠不通文者門於橋上曰溪水潺潺汝等道看衆下語不契師曰敲空有響擊木無聲門笑而頷之入室一一實似門曰今後當休去歇去師猶不放更添意氣閲六日聞鐘聲大徹機用拔萃尚陸沉而扈雲門赴徑山應東塔為下板也丙辰養靜皖公山茆蓬方十尺嘗分半榻以待往來青蔬白水必與之共時與何太師芝嶽賡偈己未黃蘗盤桓信宿而別蘗謂侍僧曰者衲子他日卻有把茆蓋頭在參憨山峰頂博山諸大老莫不青眼機緣並見語録博山留單曰莫道無人也有個在惟蘗與博皆嚴許可遇師如是見重諸方庚申省雲門明年避寂天柱峰即蜿蜲也癸亥顯聖結冬海內英靈駢集擢師為西堂激揚老煉返擲頻施門欲付師不受人多之初堂規少嚴師偶於廁回遲款門入曰闖靜者誰師已跪香佛前矣一期清肅悅可衆心甲子住鐵壁即陽明洞也雲水憧憧因僧問高峰主人公話師頌曰打破琉璃碗卸卻珍御服枕子開口笑雙髻罵天目有女客來進香師讓曰此非神壇社廟去卒絶乙丑過金粟領衆佐化儀獨稱酬唱之白眉兼作尸羅之具壽粟屬瞎驢邊師搖赤稍鯉意謂嗣之則孤雲門乃行丙寅呈雲門偈曰蒙師饒舌十餘年本分繇來不可傳有見原非解脫道無心豈是祖師禪三玄四喝間家具五位君臣總白拈欲識老胡親的旨金烏夜半麗中天門曰語無滲漏善解回互遂付衣拂并偈曰誕生原是自心名空裏栽花本現成滿口道來無可道威音那畔幾知音蓋門嗣慈舟念念嗣幻休潤溯洞山三十二世也既受欲適南嶽緇素挽止鍾山無何門逝請師繼席力辭諸方稱遲重戊辰薑太史針勝陶少府石梁諸護法復請不獲已而應之據室多時尚稱靜主師自謙也鉗鎚綿密莽鹵者罔知痛癢語句直截支離者不識旨趣及諸尊宿來為影響大叩大應方始欽服驅牛奪食辣於雲門不忝克家故有雲門三種獅子頌句句驚群上堂偶值雞鳴乃曰窗前雞唱屋後鳥鳴明明告報更莫朦朧大衆珍重解制普茶次僧問金鉤玉線將收挽鯨鯢忽現又如何師曰虛空撒下漫天網縱使飛鰲爭出頭僧曰拏雲攫霧去也師曰霹靂一聲魂膽碎僧曰三級浪高魚化龍漁翁空捕夜江水師曰已被柳條穿卻師之酬機類此庚午夏將駕終南息影經吳興為沙門照宇文學李明吾等邀入辨山師見山水幽雅尋披榛支茆梵侶拮據經始龍華也秋越之鄉紳倪太史鴻寶徐藩司亮生李學憲玉完延於延慶寺結制屆蠟歸辨殿宇新搆登座曰開疆展土彌勒樓現於當處伐木誅茆普光殿建於目前煙雲散彩日月舒光秪如成家樂業一句作麼生道良久云四海衲僧明正化十方檀信悟無為師之隨宜説法類此明年有信不具者將不利於法門張孝廉魯平勸避師曰吾行佛道導人趨善陰翊王度於心無愧何畏之有設有所加亦緣也可苟免乎不聽安若須彌不日唐總憲存憶入山彼風乃息先道場山請雲門説法不終三吳四衆慨聲未息唐孝廉祈遠聞是雲門嗣即懷香晉謁為金湯之首也繇是瓶盂葛附冠冕葵傾宗風丕振是秋郡紳沈司寇何山閔冢宰曾泉朱太師平涵韓狀元求仲迎過白雀寺開堂唐總憲於寺遲師成律曰坐對神山遲海月靜聽鈴語落松風頷聯也衲擁五六百士夫問道絡繹自登曲彔來直以佛法相見客有不悅而去師曰亦不孤渠來意監院請易賓主相見師曰此地無緣則住餘處未聞呵世可行道也期畢歸龍華示衆曰剃除鬚髮而被法服所為何事必須痛念生死立決定志發勇猛心求無上道未能了達且看話頭如雞抱卵念茲在茲綿綿密密用力久之忽然㘞地一聲始知成佛其來舊矣初不輕易下山有顯耀者欲對靈演法厚禮連迎師終不赴即門下者總不許應人間佛事雲廚至冷不容賒借嘗曰隨家豐儉有飯則飯無飯則粥無粥則散若賒借未免錯因果也素不事慶弔有充街坊者行苞苴師曰此謂污他家佛不許可逐之或曰有來無往非禮也曰僧為良福田奚以世禮酬酢為癸酉會稽胡冏卿璞菴劉納言念臺董寶卿皇庭徐兵憲檀燕王制憲峨雲丁宮坊歐石邢天部淇瞻倪侍御三闌余殿撰武貞請於蕺山戒珠寺安期衆倍白雀道聲載路請益填門解制還辨藂林落成衆倍戒珠乙亥春陶給諫虎溪啇開府等軒虛天台護國為請即韶國師法席也將行嚴比部充涵率子侄登山曰高坐辨峰化及天台如何師曰相許久可爽乎至苕城黑白遮道師曰有緣再來皆依依而別途中見師相貌殊特或謂王公肥遁或謂古佛再來入寺百廢並舉一旦恢復秋日即托嘯雲西堂主方丈還辨初赴台時門下乞歸期師指牡丹曰開一朵必歸後果丙子因病言隱他山衆懇不定沈中丞彥威曰誰主方丈曰久默音公竟飄然九華掃塔更號子仙囑從者毋稱和尚意興終南舟至湖口石尤頻作師曰緣也且泊鄰舫一贛客識荊問及師直達客曰敝鄉有山名崆洞拔地數萬仞峰巒並秀泉石俱幽足可樂道何必終南師曰且去看登其巔覽而樂結草龕翛然自適有終焉志席未暖風聞遠兩浙道俗為龍華太和鄉紳楊寨雲肅伯玉為般若汀州黑白為聚龍峰爭請師一不允更避南雲山明秋轉崆洞問禪乞戒者鱗聚不三年成巨剎額子仙禪院初托不溢滿兩月即逝更托謂斯教主之庚辰秋建安王欽師之道幣書延主洪都百丈山師重清規而應焉衲百餘舟五尾至瑞州沸然吠日一虛百實誤報數千疑而圍之師怡然安坐諸當事登舟相見始信善知識乃解且贐復從會城轉龍象蹴踏輪蹄輻輳王臣送供劉鄉紳攔途膜拜熊給諫屬詩相賀撫臺委職護送上山師入院斬新條令整舊家風肅清規掃荒畬亦將荷鉏隨作人稱大智再來不期衆生緣薄明春穀日示疾勉衆愈篤談笑自若囑纍石澗西堂主百丈至三月十五日令淨髮十九侵晨索浴畢謂侍者曰扶老僧入龕曰和尚一動衆皆不安師休去半晌手書後事偈曰來亦無一物去亦無一物若知端的意百丈花稍月擲筆以手招衆衆前師已吉祥而逝矣當午時也師生於萬曆甲申十一月二十六日戌時寂於崇禎辛巳三月十九日午時世壽五十有八坐夏三十有八塔全身於辨山龍華寺去三門之北五百尺乙山辛向正面方山遵遺命也初壽塔成正月往報師手書曰訃音到便來接龕後書種種意皆言表尾又致聲內外老僧不及寫書矣誰知是長別書哉持書者將行又曰老僧不過四月矣告爾堂頭秋間有書上老僧則歸卒成迎龕之讖又三月初九自題真曰再過十日且看咭咶後果浹旬而往此預知時至也龍華石榴先夏變白涅槃之兆也遐邇聞訃受益者墮淚未面者嘆息奉新沈邑侯枚臣欲晤未獲亦登山拜奠而去建安王欲留龕遵遺命護送歸辨展玉軸而祭焉師行腳時十三年無被未嘗解帶而臥龍天推出仍依粗疏人施細滑則唱而膳衆數建藂林僅蔽風雨效雲棲之尚朴勤種竹木臨去猶蒔或曰行矣何為曰招提在也來無居乎嘗施衣但與乏者或譏不均曰周急吾之均也病者躬視老者時慰警以法要濟以藥石諾人一物終不爽襟懷灑落時露天機令人聞風振起及鍛煉學人不假辭色全提正令徹骨為人故預師會得省發者衆所謂大開爐韝點鐵成金也待侍者尤嚴諸方聞而膽悸憫末世不重木叉自潔冰霜見犯末篇不恕防微杜漸嘗訓初學曰為僧不遵遺教經法王之叛臣慈父之逆子也拂下雖衆未嘗泛納若未受具若受不持若離田服若年輕若狂妄俱不納惟向上志者樂而親之否則望風而退師之嚴峻又如此見門人久拚鄉曲者賢之請假歸寧者亦賢之贐而囑曰諭父母出世之道方為至孝師之錫類又如此凡接機隨來而應或時怒作佛事則轟雷掣電或時喜作佛事則婆婆和和或時遊山玩水作佛事則遇景而頌皆以第一義諦示人或時病作佛事則警四山之逼或時貪作佛事則納香贄而結諸善緣或時捨作佛事則藂林成而掉頭不顧或順或逆或隱或顯種種為人無有定法若有一定則雞鳴狗盜者衆矣心直口快見善則讚見不善則呵諸方於法門有所左者則力闢之音嘗諫曰今末世明眼者不多公心者甚少不作是非會者能幾況鬥爭堅固時彼必強辨反增葛藤何必師曰摧邪輔正令法久住佛祖之願吾豈畏刀避箭哉所謂説障道無畏也師性倔強行止自斷嘗曰我為法王於法自在師造道則剋苦十餘年而盡精微養道則深蓄十餘年而至繁衍故行道則縱橫自在得不為大善知識正人君子所重哉如建安王曰名喧宇宙道括古今縱象王之威猛諸方膽喪張獅子之爪牙四衆心傾唐總憲曰作過量人證希有事傳的的意具上上智黃司理元公曰寶鏡懸空十方普照洞山禪已屬老漢矣又吳太史觀我曰吾邑之有辨山猶龍舒之有博山此非尋常定知地湧菩薩不忘慈誓為我等輩也哉亦有逆助如吳與瑞少焉自化因而更振所謂慈善根力也於鍾山時有王姓者施地祈嗣師題券尾曰還他二子後應其言師見時輩有此洞彼濟之分而曰千枝萬葉一本而生在西域當尊迦葉為始在東土當尊達磨為始今後當稱達磨幾十幾世舉本該末謂之尊稱達磨正宗説師九坐道場各有語録總十餘卷闢判名獅子吼一卷別峰相見一卷其法嗣自癸酉秋於辨山付不肖音於戒珠付孤崖聰次於辨山付離言義歷然相天台付嘯雲蘊至崆洞百丈所付凡三十餘人受益得戒者不可勝數竊窺師之為道為衆生為法門必乘悲願而來嘉言善行不能殫述略録遊化之迹以貽後爾嗣法弟子大音槃談狀行狀師諱明雪字瑞白入就別號也桐城楊氏子父一舉幼孤事母卓甚孝髫志超塵見僧則喜年二十雙親葬訖出家九華聞宗門下事詣越參雲門湛然大師門問向作甚麼曰持毗舍浮佛偈門曰四大是假妄心是空阿誰拖你死尸來師無對七日有省諸淆訛尚未徹底獨看一歸何處門一日舉斬貓因緣師遂領略拋下蒲團門曰一語下徐州又一日門于橋上問衆曰溪水潺潺各下語看師曰敲空有響擊木無聲門笑頷之嗣入室門謂師曰自後當休去歇去師猶不肯忽一日聞鐘聲豁然大悟往皖山住靜三載遍謁黃蘗博山峰頂憨山諸尊宿黃蘗博山每于衆中稱美庚申省雲門歸越明年避寂天柱峰即䖾蜲山也癸亥冬雲門結制海內莫靈駢集擢師為西堂激揚老鍊返擲頻施門欲付法與師不受甲子住鐵壁即陽明洞天也乙丑冬過金粟領衆佐化儀稱酬唱之白眉為尸羅之具壽粟極稱欲付之師亦不受衆曰何哉師曰雲門不可負也解制遂行粟送河濱而別丙寅歸雲門機緣問答芥鋒相投復呈偈曰蒙師饒舌十餘年本分由來不可傳有見原非解脫道無心豈是祖師禪三玄四喝間家具五位君臣總白拈欲識老胡親的旨金烏夜半麗中天門曰語無滲漏善解回互遂付衣拂并偈曰誕生原是自心名空裏栽花本現成滿口道來無可道威音那畔幾知音蓋門嗣慈舟念念嗣幻休潤溯洞山三十二世溯達磨四十二世也既受欲習靜南嶽緇素挽止鍾山然師親雲門最先蒙印可最先惟付法最後故道風德化為時首推雲門逝諸檀護即請繼席而開法獨早具足石雨二大師屈居左右二座助揚化儀諸方美云此等高風足範百世然師道化愈暢諸公之盛德益美視近世操同室之戈者何啻霄壤哉即戊辰己巳歲也庚午夏將適終南息影經吳興緇素聞之請入辨山彌勒峰文學李明吾施山結茅師喜山水幽清乃居之秋日越之鄉紳請于延慶寺開法屆臘解制歸辨湖郡衆紳請主白雀寺開堂台越衆紳居士請主天台護國席師命西堂孤崖本珠諸公預往料理期畢仍歸辨之龍華不數年開基斬草英靈畢集古之龍華由是恢復矣癸酉秋師赴越戒珠寺請開堂畢仍歸龍華乙亥春護法諸紳陶給諫虎溪倪侍御三蘭啇開府等軒吳孝廉芝菴等為天台護國韶國師道場法筵久寂再致書敦請師于二月初二日入院自湖城至杭黑白盈道睹師威儀端嚴咸謂大和尚古佛再來隨途設壇具供瞻拜為幸其後至者猶望塵悲泣而忍去其為一時傾仰如此然天台百餘年來不知宗乘何事幸師宗風丕振遐邇歸依皆稱茲山中興主也師入院不允上堂惟隨機開導有居士訪師師示之曰觀白雲縹眇誰歟士罔措師復曰聽緑水潺湲此矣衆聞皆乞書之為示衆語又示衆曰佛法不在升堂當知不離日用若能此處會得更有何事不畢如或未知各當努力開田鋤地運水搬柴捨此它求非吾至道珍重示衆老僧因為養病不暇為衆説法雖然如是早已漏逗了也且道漏逗個甚麼會得者試出通個消息其機緣問答法語皆載前録茲不繁述至秋月欲付囑院事遁迹終南又因龍華虛席衆紳屢請遂語內外以護國付豫豫思負性堪同野鶴恥好為人之師即欲攜笻遠遁雲壑力辭而不獲乃曰師命不可違既受付畢仍居二座以待師歸師亦不顧去赴龍華之請結冬制畢次年丙子四月八日解制即以院事囑首座久默遂飄然南邁舟至贛湖口石尤頻作師曰且泊因聞有山名崆洞幽邃乃棲之是時龍華方丈得人崆洞叢席亦就丁丑春師遂遁迹南雲山未幾衆復請歸崆洞問禪乞戒者雲集不三年成大剎額子仙禪院托謂斯教主之庚辰建安王欽師道德請主百丈寺將次南昌相從緇素瞻仰者充斥于道鷁首蔽江而下時督撫方戒嚴疑不測陳兵欲拒聞師號道風遂加敬禮至寺整肅舊規百廢俱備至辛巳春忽示微恙飲饌隨常至三月三日對侍僧曰吾體漸衰知非久矣初八日有禪人浙中來見師有恙明日捧師真請讚師題曰崆洞山頂快活不殺被陳業風雄峰挂一條性命今已七八再過十日且看咭咶咦日日水東流年年花三發至十二日喚諸弟子入室付托後事囑西堂石澗主百丈命監院造龕送入龍華塔中于是勉策愈篤而笑談自如至十五日喚侍者淨髮至十九日遲明浴罷謂侍者曰扶我入龕少刻復索筆書種種囑語誡諸弟子至末後大書偈曰來亦無一物去亦無一物若知端的意百丈花稍月乃擲筆手招衆衆近前師已吉祥而逝矣三月十九午時應前初九日書真贊恰十日歸寂此預知時至建安王欲留師龕造塔于百丈因遵師命護送歸辨展玉軸設祭致弟子禮湖嘉紹台諸官紳及緇素皆迎師龕于百丈至十月十三日奉全身葬于辨山龍華寺右塔中師生于萬曆甲申十一月二十六日戌時寂於崇禎辛巳三月十九日午時世壽五十有八坐夏三十有八師行腳時十三年不置被至夜不解帶而臥及出世仍舊粗疏人施細滑則唱之膳衆數建叢席僅蔽風雨效雲棲之尚朴勤種竹木臨去猶誡衆曰一朝僧能護千年常住則後學有棲止佛法亦在焉平日常施衣但與乏者或譏不均曰周急吾之均也病者躬視老者時慰警以法要濟以藥石煆鍊學人不假辭色全提正令徹骨為人故凡預師會得省發者甚衆所謂大開爐韝點鐵成金也待侍者甚嚴重諸方聞而膽悸憫末世不重戒律自潔冰霜見犯末篇依規不恕防微杜漸嘗訓初學曰為僧不遵遺教經法王之叛臣慈父之逆子也拂下雖衆未嘗泛納若未受具若受不持若初離田服若年輕若狂妄俱不納惟向上志者樂而親之否則望風而退師之嚴峻又如此見門人久拼鄉曲者賢之請假歸寧者亦賢之贐而囑曰論父母出世之道方為至孝師之錫類又如此至于應事接物方便大施或時轟雷掣電怒作佛事也或時婆婆和和喜作佛事也或警生死無常以示疾為佛事也或示語言三昧以歌詠為佛事也亦有莫測者或以貪作佛事則納香贄而結諸善緣或以舍作佛事則叢林成而掉頭不顧或順或逆或隱或顯種種為人無有定法所謂大機大用不存軌則是以心直口快見善則讚見不善則呵諸方於法門有所左者則力闢之庶妄見自息也其護法明眼者皆讚不已至末後將示寂半月之前預知時日書真贊并遺偈而笑談自如此來去自由正古所謂生平打徹末後自由足為天下後世風規得道之實驗也然師平日行道縱橫自在來去無拘嘗曰我為法王於法自在故示寂亦然建安王欽師道風乃讚之曰名喧宇宙道括古今縱象王之威猛諸方膽喪張獅子之爪牙四衆心傾唐總憲曰作過量人證希有事傳的的意具上上智黃司理諱端伯曰寶鏡懸空十方普照洞山禪已屬老漢矣李冢宰夢白曰露地白牛憑他牽引無邊寶剎盡現毫端吳太史觀我曰吾邑之有辨山猶龍舒之有博山此非尋常定知地湧菩薩不忘慈誓以佛知見為我等輩留影是邦也亦有逆助如吳與瑞少焉自化因而更振所謂慈善根力也住鍾山時有王姓者施地祈嗣題券尾曰還他二子後應其言離辨山上天台時衆跪請復歸師曰牡丹今夏若開吾或有再來緣也夏日果開一枝辨山持書報曰後園牡丹花開師笑曰莫有歸辨之緣乎初到天台未半月日聞門前二塔有佛舍利乃昔韶國師所建因祝曰此地若興有人繼席當放大光明於是每夜師常見二塔放光喚衆同觀有見者不見者師命衆禮拜畢乃曰舍利之光即佛光業障深者雖不能睹然而必有解脫之期憶昔韶國師曰此乃大乘之地世世當有大善知識弘揚祖道今塔光既放足信不虛矣時紹興錢相國麟武欽師道化欲將所敬遂據寺舊額仍書護國寺遣使賚禮入山桐城何相國芝嶽扁寶鏡重光令僕入山設齋陳吏部木叔書曰荷師大轉法輪特開覺路邢天部淇瞻曰洞上宗風大暢雲門師居首焉吳孝廉芝菴書曰護國中興宗風重振衆宰官護法尊重如此師九坐道場即越州之顯聖之延慶之戒珠湖州之龍華之白雀天台之護國贛州之崆洞之慧燈南昌之百丈各有語録共一十餘卷闢判一卷名獅子吼其嗣法凡三十餘人剃度弟子若干人室中密印者若干人護法王侯士大夫問道得明指歸者若干人至于聞名睹相若隔江招手出山踢指而領悟者亦不可勝數至于闢判諸方詬厲學者世俗不諳或作是非會去豈知無非提持正令一片熱腸待人何嘗有洞濟之分哉是以著達磨正宗説一篇庶主曹洞宗者皆稱達磨為始祖意在息洞濟之諍苟知始祖原只一人則異派之諍自息矣誠足以見師之為法門乃徹底婆心非比諸方妄自炫耀以是為非以非為是致使後學轉增慢見以鬥諍為是也已倘幸無私而有乎大公是非莫偶鬥諍自息則闢判亦為剩語如或未然不妨與一十餘卷語録並垂理究毋作是非會去為幸師嗣雲門澄和尚望洞宗為三十二世望達磨則四十二世溯之摩訶迦葉則六十九世今稱達磨正宗四十二世乃尊此土之始祖為息異派之諍也嘉言善行固難悉述茲略録遊化之迹以見師之為道為衆生為法門必乘願再來也崇禎十四年辛巳十月十有四日住天台護國寺嗣法門人寂蘊於辨山室中和南謹狀刻語録跋昔人有言曰先人之業振否皆在子孫也振則克之否則過之故從上諸祖承荷拈花大法皆體先覺之心務在後之有傳光前耀後則其先業法道皆有所振者也是以釋迦文佛二十八傳至達磨大師再五傳至青原再五傳至洞山再三十二傳至我先師和尚其中雖有隆替不一然至先師之法道亦大盛矣故天下問道緇素如水赴壑師九坐道場剎剎重新語録盛行有一十餘卷崇禎辛日春不幸歸寂百丈其後之續刻雖多記者不無魚魯之謬三豕之訛冬日塔事畢法兄久默時主辨山席約豫明夏入辨編刻以為垂後實録亦不幸夏初久兄告寂遂負缺然矣然同門雖多星散不一或有若久兄之志者蹇值世亂而艱于聚首亦有若久兄之早去而為古人者且豫先年雖主護國僻居台山幸值餘暇敬簡前後遺稿并已刻行者一一據題編次曰上堂曰小參曰茶話曰示衆曰機緣曰頌古曰法語曰歌偈曰詩贊曰佛事曰銘曰狀等其中闢判一卷原為息法門之諍今諍既息譬如病既去則清溫虛實之劑復何施焉故刪不録其傳燈世譜一書已刻于百丈茲惟集語録一十八卷幾欲付梓未果至丁亥冬退隱嵊之深山會諸護法紳襟閲訂助資己丑春初始完其志孝廉佩茲吳公曰余嘗與諸公謂先大師語録語最平易而機鋒峻拔亦復金針綿密重新洞山之風真為萬世之典型後學之明鑑者也當請入藏共契經弘傳庶彰大師末後光明同日月之並行而不悖非獨不負師之克振墜緒之志亦使我輩護法酬教益之恩在此舉矣于是豫欣然不已曰諾己丑春嗣法門人寂蘊和南謹跋剡縣優婆塞戒弟子馬智福優婆夷弟子余天智樂捐資刻此瑞白禪師語録一部所祈國泰民安福慧並長情與無情同圓種智四明王家琦書歲在己丑春三月深山智通謹識
