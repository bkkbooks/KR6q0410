body:
  text: 明住天台護國寺嗣法門人寂蘊編頌古世尊陞座當場一機覿面示伊不假聲色寧屬有為文殊白槌畫鼓聲催昨宵一陣春風起山花處處笑微微拈花拈花示處無多子秪要當機見得親賴有頭陀解微笑直至而今花更新未離兜率已降皇宮未出母胎度人已畢煦日炤大千明鏡含萬象萬象一光收本無來去相石女唱囉嗹蟭螟吞大象乾闥婆王獻樂迦葉作舞因緣錦上添花色更鮮婆王自昧作習言長空雲散青天皎五湖波底月團圓世尊敕天上人間魔王護法因緣分明語處露堂堂誰云真佛與魔王不識梅梢春色意空有聲香度粉墻圓覺經居一切時不起妄念四句天明雞報曉日落鳥歸巢雨打階前濕風和花更嬌楞嚴經若不見吾不見之地自然非物云何非汝掃去千崖雪指出老猴精一雙皂子眼徹底放光明噫半夜皂裳休著美天曉牙床不睡強經首字不是以不成八人人對面如盲瞎開口叫時喚不出仔細思量卻惱殺休惱殺四七元來二十八女子出定本無來去何有出入出入元非真來去總成跡文殊與罔明徒廢己之力燒卻枯椿飛盡灰樵人何處下刀劈咄師室中常以女子出定因緣詰問禪人往往皆作道理會昧卻宗旨故示之以頌女子文殊罔明拈來勘驗禪人逐境皆因昧己歸根格外翻身曙色朦朧兮金烏似箭更闌深闇兮玉兔如銀𩿶崛摩羅救產難因緣寒泉古澗兮絕波瀾三個鯉魚兮弄影潭山僧看破兮無蹤跡萬古清風兮播宇寰完初禪人每入室次師以產難因緣詰之惟以道理相酬不能轉身吐氣捩轉向上關師遂以頌示之石火光中立問端秪要神龍起波瀾神龍不解翻身轉依然死水黑漫漫須領略沒交關莫向言中覓指南春回大地兮山花爛熳秋色澄清兮石骨冰寒金棺示雙趺四十九年無一字槨示雙趺重舉似大千沙界任流通西風吹起黃花異達磨大師對武帝因緣一句全酬截斷咽喉臨鋒寶劍孰敢陳頭朔風彌布兮寒威凜冽六花飄蕩兮冰骨齊周爭柰皇圖劫石固任從風雨御階流碧眼胡僧早破家梁王殿上撒泥沙龍床穩坐憨憨睡腳踹蘆根意氣賒斷臂安心傳底事而今滿眼數如麻武帝請傅大士講經大師揮尺涉廉纖那堪更向艸中盤楚王不識連城璧徒使荊人獻聖顏寶公刀尺主持個事聽從為刀尺杖頭祖意垂利物應機隨處用家私狼藉有誰知青原不落階級撒手捨筌蹄時人那得知菊花三月茂臘月柳花飛石頭云恁麼也不得不恁麼也不得恁麼不恁麼總不得石壁非泥石甕非攜打破菱花無像可施垂翼大鵬無伴侶陰迷六合達天池馬祖云有時教伊揚眉瞬目有時不教伊揚眉瞬目有時揚眉瞬目者是有時揚眉瞬目者不是石簣如藏石鷂如翔無可不可南鄉北鄉春蘭秋菊人皆美花下相逄笑一場僧問馬祖離四句絕百非話崑崗之玉荊山之璧價重連城時流莫識藏頭海頭銀山鐵壁要津把斷無人渡一片銀花黑似漆馬祖日面佛月面佛日面佛月面佛西湖南岸三天竺南高峰對北高峰六條橋鎖垂楊綠曹山死貓頭古巖高掛任風吹雨淋日曝無乾濕若還觸著些兒氣大地眾生腦破裂曹山辭洞山山云向甚麼處去荅云不變異處去洞云不變異處豈有去耶曹云去亦不變異碧潭秋夜蟾華映鏡像分明豈動搖識盡髑髏誰賞鑑木人高步出青霄南泉斬貓提起劍斬卻貓一段春光人不曉南泉舉似作家兒趙州老人頭戴草頭戴草凜凜威風振華表三世諸佛不知有狸奴白牯卻知有王宮深寂寂禁外莫能知一聲哮吼處花葉惹遊絲百丈再參馬祖因緣互換之風畫足蛇振威一喝意便賒全提正令全機喪那許時人弄爪牙僧問百丈如何是奇特事丈云獨坐大雄峰獨坐大雄峰親言指示儂長空孤月皎幾處色溶溶馬祖送醬百丈因緣馬祖頻陳雄峰全舉一唱一酬師資相許芳草萋萋春光爛熳黃菊離離白帝起舞百丈得大機一喝大鵬擘水開百千龍子盡藏埋玄關三句輕掣斷皮髓何曾得到來黃檗得大用一掌擘開華嶽秀源頭流出活水來門風蕩蕩乾坤振普令兒孫紹祖懷黃檗在百丈開田築地因緣師資唱和意非輕打地酬他問地因空裏一聲轟霹靂電光影裏又翻身德山托缽明修棧道暗度陳倉巖頭老漢善挈宗綱密啟意別宮商風送清香到洛陽法眼指簾指簾當處驗渴鹿逐陽焰若能解返擲免被清涼騙汝為我開田我為汝說大義因緣大義從來不較多舒開兩手演摩訶片雲歸嶺青山露水面風生六月波柏樹子柏樹子會也麼一輪明月炤娑婆時人不肯抬頭覷水中撈摸受奔波絕奔波折角泥牛出愛河南泉山下有一菴主不禮南泉宮烏棲去玉樓深微月生簷夜夜心香輦不回花自發春來空帶辟寒金趙州今夜荅話今夜去荅話招商店裏將旗挂引得商人進門來奪卻財寶遭打罵老趙州老趙州一段冤憎萬古愁臺山婆子一指路二勘破梅花鏡裏清香墮時人徒自眼糢糊卻向光中尋墮過今日雲門為舉揚雪山六載瞿曇坐麻三斤洞山麻三斤無星秤上稱識取鉤頭意莫認定盤星乾屎橛乾屎橛對面說擬思量千里隔一個漆桶向空拋兩個烏龜笑不歇雲門六不收六不收四時有萬仞峰頭看垂手等閒眨眼過千山瞎驢落在吳塘後花正開柳正舞石女畫眉懶梳洗雲門須彌須彌山兮覿面提從來不屬有無知牢關打破念情淨赤日蕭蕭任所為雲門扇子𨁝跳扇子𨁝跳拄杖解笑拂子高飛禪板嘶鬧雲門老漢總不知三世諸佛曾未到雲門一字關普響新露確電光難湊泊遇著雪公子一串都穿卻錯天下衲子徒描摸雲門餅橘赤橙黃桃紅柳綠現前三昧時人不復堪羨雲門老古錐問著只將胡餅𡎺咄明眼衲僧莫輕忽南山起雲北山下雨南山起雲北山雨無陰陽地花飛舞折腳波斯摘一枝清香飄入鄰家去仰山指雪獅子話雪獅子指示人不解翻身平地沉賴有雲門傍著眼轉躬推倒楚王城和風起煦日臨超然一色化乾坤柳垂煙岸添新色上苑花開布錦屏板齒生毛語何曾祖意有西來板齒生毛若話陪雪覆千山人影絕夜深撥棹古灣回投子荅趙州不許夜行投明須到不許夜行投明到玉石鑄成生鐵銚木童拿去煎餈糕石女看來呵呵笑趙州茶遙想當年趙州老逄人秪獻一甌茶如能當下親承得明月清風意自賒丹霞燒木佛丹霞燒木佛火燄為三世諸佛說法院主眉鬚墮落穿卻祖師鼻孔天下禪和穿鑿料掉沒交涉且看老瑞如何頌出木佛燒來顯大機眉鬚墮落又相為要知個裏端的意秋林黃葉逐風飛百丈野狐不落不昧露堂堂五百生狐絕覆藏杖頭挑出明舉似方知異類放毫光黃龍三關我手何似佛手南北烏飛兔走我腳何似驢蹄石女踢翻須彌人人盡有生緣五虎曾下西川咦一枝梅破臘幾處草芽鮮大蘿蔔頭趙州拈出大蘿蔔塞斷天下衲僧口千古萬古硬紏紏黃頭碧眼難下手忽下手銅兒倒騎鐵馬走日日是好日日日是好日元旦即初一春至百花開秋來樹頭赤婆子三十年供養個死漢枯木寒崖髑髏遍地湛水澄潭睡龍藏聚浪裏翻身世間有幾一條白練鎖虛空明暗雙雙何忌諱風穴一塵明暗繇來顯妙傳掃除明暗若為觀日頭夜半昇峰頂瑞草無根色更鮮僧問大隨一字壞大隨一字壞匝地清風撲面蓋常流衲子眼未開千里迢迢還路債投子忒煞老婆心猶自裝香遙禮拜遙禮拜露古熊一陣微雨灑東林滿地落花真可愛僧問大隨如何是室中燈隨云三人證龜成鱉句中無味若為參禪者徒勞話歲寒焰焰祖燈明歷歷朔風吹處嶺雲寒草鞋覆龜一個烏龜覿面提何須更問祖師機草鞋蓋覆重拈出雨滴簷頭地有泥玄沙膿滴滴膿滴滴君難識紅如硃黑似漆玄沙惡氣遍天下至今聞者頭腦裂玄沙天龍見虎話是虎是汝兩俱錯雪竇更添一落索石人半夜睡正濃此時誰能下註腳不註腳桃花綻去春風惡僧問巴陵如何是吹毛劍陵云珊瑚枝枝撐著月吹毛覿面提珊瑚當處絕嬌花不帶春秪要應時節別別秤鎚陀上三斤鐵巴陵祖意教意雞上樹鴨下水好個鐵蒺藜虧了巴陵使來年七月中秋風又復起高峰無夢無想主人公打碎琉璃碗卸卻珍御服枕子開口笑雙髻罵天目欽山一鏃破三關一鏃破三關晡時夜未闌與君放出關中主煤人頭戴鐵帽舞碧眼胡僧尚不知釋迦彌勒目雙瞽白水聲色借來聊爾了門頭豈把芒繩繫死牛玉鼠銀盆雖類色到頭不許一般收五祖演云如牛過窗櫺頭角四蹄都過了秪有尾巴過不得功齊功化何曾了已到家鄉未徹頭直須翻轉乾坤也楊子江心水倒流圓悟問大慧云踞虎頭收虎尾第一句下明宗旨如何是第一句慧云此是第二句抹殺人滅卻法第一句中阿喇喇獅子翻身入母群免墮寒巖青草下僧問審哲禪師如何是佛法大意哲曰貧兒抱子渡恩愛兢隨波薰風渡汨羅綠水湧清波遍界雲影動涉躐盡偏頗僧問雲居簡孤峰獨宿時如何簡曰九間僧堂不宿誰教你獨宿孤峰夜深石女臥眠床天曉木人忙喚起池上鴛鴦獨自鳴一聲飛入紅蓼裏香嚴上樹樹上樹下最威雄鐵額銅頭怎觸鋒雲散長空孤月淨天柱卻在萬雲中疏山造塔一文錢折角泥牛海底眠二文錢石女梳粧出庭前三文錢柳綠桃紅三月天九斤龜毛長三丈臘月蓮花色更鮮尋聲逐色兮徒勞側耳返本還源兮鼻孔遼天貓兒偏愛捉老鼠朝悠悠暮悠悠金風匝地冷愀愀天皇皇地皇皇三春柳絮白如霜化母造成無功錦那許傍人話短長疏山問溈山有句無句如藤倚樹樹倒藤枯句歸何處溈山呵呵大笑歸方丈東京掃蕩西京滅一統山河歸至尊笑罷不知何處去霜天月夜子規鳴婆子請趙州轉藏一匝旋來大地收任他諸佛莫能酬縱饒婆子解機變也是人前強出頭仰山插鍬父子相逄事便奇插下鍬時已露機南山刈茅人大有宗風從此振華夷熊秀才乘藍輿至西山偶見一僧貌古神清龐眉雪頂葉衣坐於磐石才下輿問曰莫是亮座主麼老僧以手向東一指才隨手東視回觀老僧不見一指當陽舉似人韓盧逐塊枉勞神若向東方空看指回頭昧卻本來真秀才嘆曰夙緣不厚雖遇而不遇也雖遇而不遇甕中不走鱉再上藍輿時虛空吞皎月香嚴獨腳頌兼著語子啐母啄動也動也子覺母殼轉位就功即不無怎奈拋家散走子母俱亡那畔今時一齊歸應緣不錯物物全彰頭頭合轍同道唱和月印寒潭方名獨腳惟我獨尊子母從來不二途子纔觸處母同遊孩兒若得身榮貴脫卻老娘舊住樓子母如能俱亡也九月楊花遍地周柳林黃鵲穿梭舞那有青紅染指頭染深水牯牛有僧從金粟來說金栗有染深水牯牛話請師荅語更請頌之天明放去離欄圈烈性猖狂舞似風煩惱海中雙足涉無明林裏一身沖東西兩岸貪苗稼四棄三途露影蹤忽地拽來驀鼻看依然還是這牛兒事事無礙事事無礙非中非外打破虛空銷鎔法界石女騰空鐵船裝載火裏蟭螟現神作怪頌雲棲大師公案一則黃侍郎問師云夜來老鼠唧唧說盡一部華嚴經大師云貓兒突出時如何黃無對大師代云走卻法師留下講案華嚴歷歷談非舌聞者應須著眼參突出烏花白貓子管教一吼髑髏乾雲棲老幾多般法師走卻兮雲封古岫留下講案兮霧鎖寒潭頌雲門顯聖先和尚公案十三則神珠問某甲不恁麼問時如何師曰戲論珠云恁麼問時如何師曰戲論珠云恁麼不恁麼總不問時如何師曰戲論珠云還有向上事也無師曰有珠云如何是向上事師曰戲論本入龍宮探驪珠覿面拈來一物無不是龍王多把住恐教大地別親疏僧問祖師禪如來禪是同是別師曰古越是杭州曰恁麼則同也師曰長江分彼此古越是杭州長江分彼此若知絃外音揚聲囉囉哩僧問如何是圓相師曰大燒餅燒餅托出任君飧底意繇來非等閑不是仰山親嫡子何能特地示毫端須領略莫顢頇春風蕩漾兮花開碧岫秋色臨空兮霧起寒巖師同陶石簣無念師向火石簣曰無念師在此阿師得力句乞為舉似師曰向火背猶寒六月日頭炎似火三冬朔氣冷如冰一句當陽無縫罅不落言思始可親僧問如何是暗機師曰凌霄峰凌霄峰莫朦朧摩尼寶珠映現無窮識取珠體莫認青紅金風黃葉秋林落幾家砧杵月明中僧問如何是義海師曰半山亭胸中無得失舌底是非空一輪明月皓幾處色朦朧僧問如何是生死中不生死的道理師曰舌頭短三寸三寸舌頭短衲僧巴鼻長秋風吹桂萼遍界盡馨香僧問十方薄伽梵一路涅槃門乞師指個路頭師曰那個是御愛峰水流東徑朝西徑雲起南峰過北峰舉似分明無別旨涅槃頭路翠叢叢和尚一日喫茶次拈果子云法身遍滿一切處若道這個果子具法身恁麼則喫卻法身若道不具則法身有不遍之處汝等諸人揀點看看是法身非法身兩重枷鎖難為情透網金鱗擺尾去豈向鉤頭把餌吞徑山老休顢人泥童翫月消情緒木馬嘶風俊不禁和尚一日舉雲棲大師云我聞雲棲和尚滅度後有人於庫房中見若他道生西方為甚麼又在庫房中既在庫房中有違西方願力汝等諸人試定當看脫體無依絕去來徑山和尚強安排沒絃琴韻人難委獨坐朝陽空抱腮僧問和尚曰乞和尚指示心要出離生死真實的意和尚曰我從來無一字與人鐵甲將軍塞外威痴心只要討皇基鉗鎚擊碎黃金骨脫卻龍袍卸甲歸僧問和尚曰和尚在此作甚麼師云殺人僧云只恐和尚不會殺師便掌眼蓋乾坤意氣高吹毛倒握驗英豪可憐不解知機變徒把殘軀一旦拋僧問四大分散後向何處安身立命師曰你問這樣大法也不禮三拜僧禮拜師呵呵大笑急水灘頭著一篙惹得驪龍鼓浪濤萬斛之舟俱覆卻篙師猶執手中橈頌金粟密雲禪師十則粟顧漢月舉僧問古德云朗月當空時如何古德云猶是階下漢僧云請師接上階古德云月落後來相見既是月落後且道如何相見月便出法堂粟下座海枯水竭須彌倒黃頭碧眼一齊掃下座出堂端的意金毛獅子不落草漢月問海眾雲從慈霖天澍現躍飛騰則不問如何是驅雷掣電底句粟便喝進云恁麼則金粟花開寶林果熟去也粟又喝月禮拜歸眾一喝須教作者知更加一喝大慈悲雙收雙放明宗旨不忮不求世所稀風磨鐵壁猶如洗雨灑殘紅襯馬蹄僧問狹路相逢髑髏粉碎當恁麼時無位真人在何處安身立命粟云天上天下惟我獨尊僧云恁麼則萬里無雲一輪迥炤去也粟云腳跟下好與三十棒三尺短一尺長個中元不帶商量萬里無雲一輪炤腳跟紅線絆千行三十棒斷愁腸掃除凡聖提挈宗綱山花發笑兮春迴大地籬菊開殘兮冬有嚴霜僧問曹溪一滴直透龍池曹溪一滴即不問如何直透龍池底事粟云穿過髑髏進云源遠流長一句作麼生道粟云但與麼去僧便禮拜直透龍池伸一問廣慧波濤如海闊金粟門頭不見人大地山河俱覆卻與麼去真灑落不立聖凡烏有圭角蓬萊高閣兮越州聖境煙雨樓臺兮福城清樂僧問如何是金粟境粟云四野桑田進云如何是境中人粟云金粟峰頭望僧云人境已蒙師指示擊鼓陞堂事若何粟云瞻之仰之四野桑田不是境峰頭望底亦非人當陽拈出無迴互瞻之仰之覿面陳電光石火兮拿雲攫霧慈霖普澍兮廣濟眾生僧問聲色未萌睹聞莫及正恁麼時乞和尚通個消息粟默然良久乃震威一喝僧云人間四月春光盡金粟秋來菊正開長恨春歸無覓處誰知轉入此中來師云葛藤窠裏藏頭縮尾踢倒蕊香幢須彌山粉碎毘盧不現境乾坤無一事金藏雲起世間成界立娑婆分四至僧問如何是佛法的的大意粟便打僧云猶是古時家風粟復打云汝作古時家風會咄活潑潑轉轆轆覿面全提無榮無辱一段靈光絕古今何須特地生疑惑僧問如何是本來面目粟云舌頭拖地眼觀山色秀耳聽水聲悠舌頭拖地處特地為君酬金粟示眾云突出難辨坐斷千差萬別一塵舉起透徹萬別千差沒蹤跡斷消息上下四維銀山鐵壁機思盡淨絕塵埃一個銕鎚空裏擲空裏擲船高水長雨落地濕拄杖子稜稜角角閃閃爍爍炤用齊行殺活縱奪棒起臨濟正宗扶持楊岐驢腳虛空攪得成團大地撒為塵末咦分明指示諸君也惟有桐溪最清徹僧問倪禪師如何是石門境倪云猿啼獅子崖前石龍吼文殊寺裏鐘一聲漁笛破滄浪幾點桃花映水紅清興一團何所有遊人空自對東風又問如何是境中人倪云踏破虎溪橋下月坐斷天池第一峰世界清平宇宙寬得盤桓處且盤桓東山石女三分話西海泥童話幾般總輝煌燈火元宵夜燦爛星河霽碧時覿面相陳無剩語徒教人境話支離大陽三句平常無生句乍起和風柳眼青頭頭善應妙難尋空中鳥跡水中影碓嘴生花色更新玄妙無私句棒喝交馳任意遊金針玉線縫皆周弘通妙挾無遺影法界塵毛兩俱收體妙無盡句一顆摩尼觸處彰施為盡是白毫光古今爍破曾無間涉水登山任舉揚
