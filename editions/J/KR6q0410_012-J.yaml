body:
  text: 明住天台護國寺嗣法門人寂蘊編詩偈遊雲門十詠尋路興哉拽杖行信步入荒草問取採樵人咸云此路好上爐峰白雲縹緲處獨立兩山間分付登臨者藤蘿信手攀陟嶮懸崖多嶮峻磊落路難行步出稜層外坦然一掌平絕頂雲外孤峰立群巒足下蹲卓然無與並唯此獨為尊下石屋踏破蒼苔徑徐徐下古丘紅霞穿石屋疑是化天樓過梅塢纔聞梅塢徑倏爾口流涎會得其中趣何須更問禪宿旃檀林林中無異木純是旃檀遶一宿此林中時聞香風好禹陵聖德乾坤並仁風日月齊功圓歸正寢殘蛻留會稽樵風徑採樵人已去曲徑水長流拂拂仙風起飄飄轉畫舟問歸紅日落山堤遊人問故棲牧童遙指處轉過石橋西遊雲棲五雲峰循溪直下五雲峰絕頂蒼蒼霄漢中綠水青山環滿目何須更羨梵王宮登投子有感憶音當年美道風法音雷吼振花宮寧期聖跡成荒阜秪見山頭樹樹松山居雜詠前五首紹興鐵壁山居作後七首潛山皖山習靜作鐵壁花開三月春桃紅柳綠亂鶯鳴峰巒兢秀常盈目莫不皆承化母恩茅舍寒嚴因雪凍雲廚供缺為糧虛山僧盡日無他計笑飲清泉樂自殊嵯峨鐵壁錦屏風展在天池峻莫窮人鳥不來消息斷個中誰許話禪工軟似綿團硬似鐵任從禪者來咬捏閒餘散步下天池嘯傲清風與明月自適常居鐵壁巖腳蹤曾不到人間有時洞裏朝陽坐惹得天花雨滿山自搆茅菴萬仞峰四時煙霧𡎺門封有時寒結稍頭露疑是瓊花長谷中榮辱無干意自如瓢囊高掛隱山墟終朝獨適非為寂喜有閒雲伴我居青石塢中青石主常將薄粥為賓煮滿盤托出任時餐滋味須知無幾許山居多野趣松竹鎖雲霞谷鳥時頻唱令人興轉賒徑幽人跡少竹密鳥聲多縱目傳心旨何須問達磨華堂塵事冗茅舍道心寬體掛金魚客寧如破衲安皖山峰頂別諸方青石塢中意氣長散步林間觀日駛跏趺石上笑雲忙清泉沸澗涼堪浴爽氣臨人興愈彰野鳥山花頻適趣不論榮貴幾存亡和桐城何太師探五印寺藏主偈三首藏滿龍宮不較多一微塵內盡包羅任從黑白惟心現識與不識總非他四緣開合亡生滅礙與無礙不是塵但得異同心念息芬芳紅葉滿乾坤萬象能言非有意虛空作語絕知音偷心喪盡真機顯塵剎無勞耳去聞和陽明先生良知偈二首五月端陽節屆時艾符覿面不須知凱風颺颺榴花舞滿目清光更是誰滿目清光更是誰畫龍爭鬥舞靈知清波蕩漾全神力纔涉思惟即有為和具足師弟活埋偈汝既活埋我亦埋白雲流水兩悠哉蒼苔明月無窮意一任四方八面來和李其張梅詩韻奇偉靈苗出世才冰肌玉骨豈能栽春花秋月難堪並萬古馨香絕去來題龍華寺豁開心地龍華現萬象全彰阿逸多縱使當陽親薦得依然眼底又蹉跎龍華八境并引龍華八境偶爾點出拙不我藏首刱八偈以為拋磚之意俟諸英才各陳其美永永連續繼諸來者云爾彌勒峰春花豔豔體全彰冠月披雲鎮八荒祗為世間人慕切渾忘兜率坐來長青龍崗發脈須彌起弁峰飛騰形勢若遊龍層層鱗甲松粧就慈氏宮藏眉睫中象玉峰卓然崒嵂聳菰蘆紫霧紅霞覆體如卻笑普賢牽不去老僧常在背跏趺獅子巖巖似金毛踞弁坵未伸牙爪絕狐遊口從天地同開起吼到而今聲未休寶珠池竭羅腹內已多年何故遺來弁嶽前晝夜清流無間斷驪龍永劫尚盤旋花石澗古澗清流入帝基粼粼花石綴新枝喜如畫意將歸院宋子看時亦謂奇六和泉甘泉常噴碧雲開玉色澄明何處來想是華林園內老為憐枯竭潤山隈天井嶺玲瓏一竅半巔中卻是摩醯一目同流注甘泉滋化物免教青翠絕蔥洪和唐祈遠居士韻草色蕭蕭日已秋那堪霜髮又臨頭道心固異塵心切祖語還將世語酬惟使缽盂兩度濕渾忘冠蓋滿門留龜毛拂示那伽定億劫參差霎爾瘳師登天台護國寺祈遠居士以六絕送行師用原韻以復之人人心地有花開何必從他羨寶臺當下諸塵渾不染光明卓爾透天台迢迢千里到松門石壁藤蘿古道存流水滿溪含寶月憑欄高看野狐猻石梁億劫一朝僧豈料而今已共陵脫盡繁華塵世夢杖頭高剔佛前燈問我西來何所酬落花片片水同流忘機獨坐千峰外誰識獅兒聚窟洲天台高臥白雲多那識全身入薜蘿坐斷煙霞心夢寂故人未到柰如何巉巖絕壁漫追攀洞口胡麻儘可餐聊寄清香君自識無絃曲調要親彈退隱崆峒居士仍用前韻以六絕送行為三請之意亦用原韻復之當日龍華已撇開謾勞三請上師臺苕溪山色常談此何必重還接眾台本無壁落亦無門覿面堂堂何念存報與知音祈遠士從來不重弄猢猻放卻龍鍾一老僧何須翰墨苦相陵窮巖喜自逃真趣日落黃昏剔祖燈護法之情莫可酬權為瓚老隱山流懸崖永絕聖凡路颯颯清風播九洲愚頑寡學一婆多收捲絲綸入薜蘿已獲金鱗歸去也從今不必問如何勝景雖殊我不攀常煨紫芋供朝餐草龕獨坐亡生佛那管瑤琴彈不彈乙亥春登天台步阮仙韻為因古剎到天台恰值東君伴我來號令未曾傳信息山城幾處盡花開杖頭煦日誰堪並缽底清風任往回一段玄情惟自適從教頑石點蒼苔護國即景四絕紫霞峰卓爾沖霄漢幽微雲霧關松風常不昧清韻落人間玉印峰當空懸寶印玉石點蒼苔宇宙增光彩宗風覿面來舍利塔三塔標原跡於中舍利藏生機時復感觸處悉成光蓮花池乾坤開一竅清水四時流紅日爭奇媚香風遍界周遊桃源洞昔年懷此勝今日始親來劉阮仙何在胡麻跡未灰曉花迎日媚野鳥帶雲回徑轉情猶適仰觀石上苔宿慈雲寺信步尋芳徑逍遙翠藹中慈雲蔭古寺法幟顯雙松水活龍堪隱山高禪亦豐鐘聲敲月落紅日又昇東登高明寺峭壁聞清響天關對白雲松風無限趣誰識個中親遊國清寺兼贈不訛禪者雨花飛瑞色雙澗吼清波仙灶陳真跡頻觀總不訛再遊桃源至普光寺贈了心大德尋芳興未竭拽杖喜風涼捫壁登玄路攀蘿上普光山高僧臘長樹老道風香相見如相識清談意更長過香柏峰同達虛坐月茶次即事扶笻陟險過峰前香柏烹茶問妙玄明月一輪東嶺上談禪不用老僧宣丙子季冬祈遠居士浼竹知到崆峒接師回弁岳以五絕送行師和原韻以慰竹知辛勤云勞公跋涉到崆山一路風霜聞也寒水湧船頭銀砌岸瓊刀刺足甚為難忙把枯柴信手燒通身和煖路非遙薑湯到口寒衷解暫且安單竹箬寮海內尋師爾一人三千里外涉煙塵和風乍起忙歸去寄朵梅花報早春他方即與此方通僧俗元同祖道風若遇知音頻舉似而今不必說空空迥絕諸塵出上方從今不話祖師堂玄途鳥道俱無影生佛之緣兩并忘回首座久默龍華不比古雲門雲門住處未親承龍華命帖昭星月毋得推辭往別行復方大方居士偈步韻勞病多年萃草叢秪緣退養寓崆峒休心禪觀諸緣寂息影雲霞萬壑空有賴大檀興保社還從蠰佉振玄風君今若問回桑梓日到西峰又轉東和友人勞君攜杖過茅菴峻嶺藤蘿儘可攀鳥道玄途休住足翻身直過上頭關靜坐偶作飢餐渴飲總休功終日清閒翠竹中無事藤床心亦寂那知身在梵王宮除夜今年今夜盡今時種火圍爐半榻棲一覺鼾呼清夢斷烏輪依舊轉東籬聞爆竹聲㘞地一聲吼沙界悉皆聞催去三冬冷驚回大地春渡江即事為懷緣行篤寧怯渡江濱冒雪衝寒去銀舟破浪行題弁窩池古柏昔日趙州曾指示今朝池畔又重拈禪人於此能親薦不負高標覿面傳題紅蓮缽頭摩現寶池中如月如輪顯妙躬泥底根潛絲密運水浮香霧氣明通因心即與果心合素質何堪眾質同體色幽微渾不染從教八面有薰風題竹勁鞭稜稜層層無物可及擢破乾坤卓然獨立信手拈來非鎗非戟用去體遍十方收來纖塵皆息警惺大地昏迷撥出長天杲日提起魔軍膽喪放下佛祖莫測擊碎威音髑髏穿過衲僧巴鼻有問如何若何驀頭便與三十題扇全體一片白雲通身一具金骨一個鼻孔遼天半輪明月往復展開遍滿大千收來在吾掌握拈起當處清涼放下紅塵即沒搖蕩乾坤兮清風颯颯舒卷寰中兮元無背觸飛來峰人號飛來兮出自何方充塞寰中兮其體恒常突兀嵯峨兮威雄無比磊落昂藏兮氣宇難量一片陰雲兮形藏不見清明皎潔兮覿露堂堂萬山分派兮此是其源寒暑相遷兮渠自不傷形影孤高兮萬方瞻仰聲名遍布兮千古流芳塢口圓覺潭塢口一橫橋橋下一潭水潭水清如鏡炤徹法源底兩岸竹松佳一天星月美形形不相知影影含潭裏風動水生紋風息紋無起聽其清濁流濕性無彼此道人心亦然秪在於動止動止兩相遺若水而已矣龍松不假良工手全無刀斧痕天然奇特性峰頂伴閒雲藤如意本自無根蒂何有聖凡名坐斷千山色堂堂獨露形拈起天花落發揚大地春若問其中旨天心掛桂輪雪冽冽寒威遍界周六花飄蕩滿空浮乾坤今日一時老處處青山盡白頭蓋覆乾坤全在我囊藏異色豈繇他殷勤報與諸禪者切記休云六月花一色充然滿純真絕點埃大功無隱晦覿面為君開霧倏爾形充霄漢中渾然一色意何窮離婁望去明非極罔象行來路正通上下參差難辨的東西起止那分容密移一步虛空外倒跨飛龍絕妙功漁家傲詠雪輕飛妖嫋通身白萬象森羅秪一色大地嵯峨藏醜拙無差別瓊樓玉殿咸歡悅五湖四海冰花結六合彌漫雲陣冽枯木寒巖樵者絕威逼逼銀花滿目誰人識漁家傲自慶自慶僧緣多劫就親承佛法離塵垢單傳直指吾今透無綰手趺坐蒲團忘白晝慈悲愍念將生捄曠劫深因弘願厚堅鎧精軍長夜驟雄紏紏魔王逃竄無門路風月比懷秋月明難比道人心月明不炤覆盆下道心能鑑於古今秋風清難比道人身風清猶落千林葉道身不染世間塵窗前梅臘梅花傲盡冰霜苦玉骨展開人已知清香放出風堪鼓報春回特向窗前吐窗前竹窗前竹寒苦倍精神雪到枝頭堅節操風來林榦長威獰虛心腹不改四時青嶺頭松嶺頭松挺立沖霄漢煙雨滋培氣色鮮雲霞馥郁清光煥峭巍巍風月恒相伴尋山至崆峒丙子夏初師離弁山欲隱終南道過州聞崆峒幽邃可栖故捨舟人山卓錫于此秋七月二十六日也為尋山水過虔西頂笠腰包上貢溪一到崆峒諸相淨渾然忘卻往來機結茆誅蓁展土結茆房為遯浮名隱上方一片閒心無個事枯枝高枕笑雲忙上梁日落雪闢艸峰頭豎棟梁十方同集喜營糧諸天也解生恭敬故有奇花雨滿堂草龕草龕不比朱門屋蒲榻過於七寶床高枕無虞塵自淨白雲終日意便長別崆峒因山頂俗姓種田擾溷亦因唐祈遠居上屢賚書請師回弁嶽故別崆峒他隱逃禪息影虔南地不奈音書甚苦催辭別崆峒他處去層巒疊嶂又深栖南雲山慧燈寺即景丁丑二月十三日師離崆峒隱跡于此鳳翔峰當陽獨立絕商量不墮群峰出上方極目欣然無別示南山鳳勢在空翔獅子巷古稱獅子巷覿面少人知踞地神威露何須嶺外馳化龍泉龍從一滴變再滴鼓風濤活潑誰能測終歸為海潮象鼻坡南山已峻極眾獸未能栖何用撩天鼻來呈向上機放生池殺盡偷心者光生在放生臨機垂一語不昧自分明遊魚嶼魚嶼一念遊能周萬古秋固然空寂寂到此識蹤繇天生蓮覿面呈佳瑞應機解放光天生香馥郁妙德個中彰缽盂山世尊方托出讚歎美空生自昔降龍後黃梅傳到今盤龍澗澗曲似盤龍何人識此宗真機全體露勿可復矇矓香爐峰喜有香爐不計年薰天薰地自周全而今拋在南雲裏說向時人不值錢聞梆聲示眾一下梆聲滿塢聆提持個裏甚分明髑髏擊碎能知痛始許諸人薦得親初夏挽春桃紅已褪芰荷新梔子清香亦爽襟滿眼韶光元不減依然春色在乾坤夏日即事一番雨過一番晴花果鮮榮稼穡青竹底風生涼拂拂山家野老盡舒襟蚊虫示眾南雲山墺草生多可趁蚊虫遣睡魔況復痛錐親徹骨癡人不省為癡何雙茶點翠雙茶聳翠立庭前占斷春光年復年法說熾然誰個會徒教終日鎖嵐煙並頭蓮示眾一蒂雙花燦明明兼帶齊時人知妙用不負露真機
