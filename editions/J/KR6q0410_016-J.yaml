body:
  text: 明住天台護國寺嗣法門人寂蘊編書復住崆峒山復洪都建安國主請住百丈山啟伏以濬哲遐舒金輪衍御協重華于帝道允執厥中孚錫極于攸甸謳歌壤內賴我王之多福庇兆姓之咸安恭惟千歲殿下德邁宗彝名魁貴胤聰明天縱才博義豐贍二酉之墳典至道精微辯雄問下羅五性之遍圓聲聞色見了自性歸趣大藏教總在裏許豎弄橫拈抉祖師關鍵一毫頭識盡原根何期宣室之再來龍章遠錫憐念祖庭之下替睿翰星馳某山野病夫深慚襪線智門弘敞曷克撐持辱使命以傳呼竭陬愚而頂戴伏願法幢廣豎令德日新衣珠深藏自知有在髻中至寶著價無人言念不忘丕顯百丈之前謨均漸雨露綸音常赫翊贊萬年之國祚媲美陶唐咫尺尊顏無任瞻仰屏營激切稱謝以聞附請啟恭惟大師座下名喧宇宙道括古今縱象王之威猛諸方膽喪張獅子之牙爪四眾心傾末後關雖轟雷掣電未足以喻其神機個中事即豎拂拈槌猶難以形其玅用為曹洞之真子接少室之單傳慈雲既已遍滿乎虛空法雨亦幾普周乎沙界矣不穀寡昧無聞承當有媿徒勤嚮往莫遂瞻依雖樊籠霄漢之相懸固時節因緣之有待典型在望冀宗旨以弘揚緇素投誠希大悲而接引念祖庭秋晚惟西江最稱冷落嗟古剎草深獨百丈極其荒蕪山以人靈欣瞻古佛再來興繇廢起快睹慧幢重豎聊成一時之勝果實結千載之奇緣大振舊家風共睹人人登正覺路全提新祖令爭看個個入不二門引領以俟錫來臨書不禁神往住百丈上建安國主已下皆百丈書睿扞淵深令儀孔邇繼起祖庭之墜緒履安王道之平夷草勁風知遇疾風而不偃金將火試經百煉以彌神不有多虞曷表金湯之大力量哉自別豫章溯流新邑艤帆駛驟仰沫何窮一道安和承恩有驗初二甫入百丈漱蓮封木猶存大智之遺風孰謂凜凜清規消磨殆盡古竭新裁宛爾宣宗之弘範且喜紏紏法塹先後同揆舊願竟成信不誣矣仰冀留心內典剋志真宗識鎖情關原非他物明几淨御且道是誰殿角微涼始信面南看北斗竿頭更進還期石虎夜生兒未盡纖翳迷封萬里所慮巧萌銷骨事起投杼全憑大手之維持永固雄峰之鎧冑謝言難罄面晤可期縷縷襟懷惟冀一公之口述不勝悚慄之至上大宗侯南美恭惟殿下金枝毓秀孝格蘭馨玉榦騰輝忠孚御詔德澤久侔於召杜旁求遐邁於東平鷲嶺親盟展維城之赤手法門重係運禦侮之嘉猷狂瀾倒而更洄慧炬微而復熾自古迄今所未有也洎到百丈遙想仁風愧乏投瑤彌加銘刻烹茗曲水顒象駕以雲移掃石流觴望真機而雨沛現成公案一句了然目擊道存神孚默契猶恐魔風易煽疑謗橫生贗真不辨於金鋀清濁無分於涇渭仰煩睿慮俯賜斡旋至於郢筭入神又非臆見所能測矣臨楮踴躍翹企之至復越州鄉紳大司馬王峨雲請回顯聖寺啟關山迢隔久失晤言翰墨南頒少舒宿悃細詢起居之秩秩緬惟外護之惓惓垂念雲門移章貢水久虛法席大檀猶且寒心切感師恩病朽詎能坐視但甫遷百丈未及經旬遽爾遠歸奚逃輿議欲振先師之道法可延同社之尊耆掃塔還山備陳衷曲統希炤入不禁神馳復祁侍御世培雲門邂逅十載暌違遐想丰神時增眷眷自來宗風大盛無逾越之外護頗多至于一種熱腸傾心護法獨讓于令嚴而復繼美前人更光先烈者又惟大居士為尚矣先師道價久播叢林世系金湯綿綿不替雖雲門一席覺有蕭條況洞上一宗已大傳海內重興之望指日可待矣既蒙佳音極承厚愛久病不堪應酬崆山又多嵐瘴俄遷百丈坐席未溫難遵還山之命恒為悵耳今秋新刻傳燈世譜令先君與石簣老居士俱纂入先師會下庶燈燈續燦後學亦有所瞻依也向聞居士志祖道有年更望真參實究於二六時中默默提撕畢竟是個甚麼驀然冷灰豆爆漆桶掀翻雅紹先宗璧聯昆玉即使無盡大年復起不覺退身三舍雖然後日還雲門掃塔時再為勘過病中簡率不恭是宥復祁文學驥超捧讀尊教知居士為雲門之意誠且篤矣但山僧病軀只堪靜養復蒞大剎深愧無能恐負眾望之心實難應命也戒珠別後良晤無從未審近日道候何如禪者入山知居士承當個事不勝欣慰更冀深操實踐解行相符毋使玄黃交戰於胸中逆順紛馳於境外情生智隔霄壤懸殊丈說尺行猶宜勉勵直饒坐斷十方須信密移一步掀翻寶所踢倒化城透過衲僧巴鼻橫行佛祖頂𩕳乃可紹吾宗猷光揚法道誠法門之幸也千里面談伏惟自玉上潘藩憲青蓮辛未春辱翰教未獲識荊亹亹之情時挹懷抱爰丙子春志圖終養退隱南虔瘴重嵐深病軀莫遣茲新吳百丈因法席久虛雀角蝸房風寒月冷蕭條景況聞者愴然夫佛祖兒孫能不寒心哉適建王遠召荷書幣入山不揣病衷蹔應斯舉中秋發棹舟次瑞筠不期疑者謬冒法憲致使霄壤情封幾乎掣肘復蒙高鑒備析緇素而俯循輿議既叨護宥敢不銘心勗覆車于往日仰德澤于斯時更冀臺下不吝鼎言大作金湯重護則兩浙吳山俱沾福庇矣臨楮懇禱之至與劉鄉紳振宇久仰遐風幸瞻傾蓋復辱厚貺愧感彌深予丙子春解弁山院事退老虔南嵐封煙霧莫適病軀茲因百丈古剎法席久虛師表名存清規實廢荷蒙建安殿下書幣遠頒舊住印宗承筐匍匐痛祖庭之寥落諾千里之丹忱不腆鄙衷俄爾領命中秋發棹直抵瑞筠李下一咻群相和附誤干法憲眾議紛紜目雖無愧于天表猶豫尚乖乎人心幸叨明鑒得藉升需掃塔入山觀元踵謝但慮玉石濫觴鋀金未析幸聞撫臺同盟締好敢望台駕俯賜先容則法門有賴槐蔭何窮祖佛冥加遙伸合掌小刻奉覽伏惟哂入是荷復贛城眾鄉紳文學公請回虔啟恭惟台下碩彥遺風名宗瞻美痛慮久湮之叢席蠅慕蟻膻共扶將墜之宗綱折枝反掌斯人斯德式敬式崇同者既蒙邀惠于崆山復荷垂情于百丈啟旌函而讀罷雪敷滿岫之蓮捫衷曲以倦遊愧謝嵯峨之榻住持此地在我謂公欲永金堤惟憑護力庶使城裏優曇與山中隔年桃李共鬥芬芳則兆隆功德久久不替矣俟或松欹崖畔煮石峰前數載襟懷再伸罄謝未可料也謹復與張侍御瑤碧閬苑春先香生四野崖前飛瀑韻絲竹以無心檻外流鶯奏簫韶而有意文明兆啟足可徵焉德履攸深揆之素矣賀賀客秋極承厚貺趨謝未遑耿耿私衷時增愧赧茲啟樟江解纔晚泊瑞筠罹鼓舌以寒心藉餘光而憩息常嗟古剎草深法門莫振若非大力曷鞏金湯靈山囑莂正在此矣矧百丈迺洪都古蹟綸音勝概稅駕品題寶之冊牘者指不勝屈惟祈光臨垂覽惠藻春生是豈惟山靈之聲價倍重亦且庶誌垂於無窮之世大幸於法門也肅此伸候伏惟台炤不宣師初行腳參請七大師因緣師參雲棲大師問曰圓覺經有作止任滅四病於今但生心動念即墮四病作麼生出得去大師曰但憑你作止只莫生心取圓覺即出四病也師參黃蘗無念和尚師問學人千里遠來乞師指示念曰有甚麼指示得佛法又不是青的黃的白的師問即無指示可保任否念云保任個甚麼以罵云云待其罵畢畫一圓相呈似念即一掌師拂袖而出參憨山大師師問一塵不立時如何曰曾到這境界不師云若到即是塵也憨變色云弄虛頭作麼參峰頂養菴老師師問雪覆千山和尚如何為人養菴即一掌師云莫就是和尚為人處麼養云我同你去看雪同行至門外師云正當此時狐狼野干百獸俱無蹤跡養曰止有獅子在師曰亦是野干參博山無異禪師山問從甚麼處來師云桐城來曰桐城風境比這裏如何師云處處綠楊堪繫馬曰猶作此解將桌一推進方丈師云這老漢又恁麼去也參金粟密雲和尚入門便喝粟云好喝師連喝兩喝便禮拜粟打一棒遂人事值抬船次師云虛空駕銕船時如何粟便打師接拄杖云波浪湧千尋時如何粟欲打脫拄杖不能師云和尚無下手處粟云且道承誰人力師遂鳴指一下粟微笑而歸一日搬瓦次師問片瓦飛空時如何粟便打師云恁麼則蓋覆三千大千去也粟復打師拂袖便行結制普茶次師問云法筵肇啟龍象駢填當陽一句乞師舉唱粟云老僧耳聾試再舉看師云金風吹落林間葉野老圍爐笑語頻粟云閒言語一日上堂師問云正偏兼帶即不問臨濟家風事若何粟便打師云金雞唱落中天月泥猿吼盡五更風粟復打云再犯不容普茶次師問云慈雲普覆三千界只怕冬寒一夜風秪如狂風四起和尚向甚麼處安身立命粟云一腳踢你師云恁麼則秦駐山前端然坐金粟峰頭任往還粟云你要第二腳那師禮拜歸位普茶次師問云東征西討乾坤靜今日臨期事若何粟默然師云四海密傳天子令鄉村野老樂豐年遂禮拜歸位六十上堂師出問云六十歲已前風行草偃六十歲已後水到渠成正當六十和尚如何為人粟便打一棒師云恁麼則壽祝須彌福慶四海遂拜歸位上堂師出禮拜起便喝粟便打師又喝粟又打師云這老漢敗闕了也散木和尚開堂顯聖寺師為第二座出問云大眾濟濟燈燭煇煌請和尚指示和尚云有眼皆見師云恁麼則個個成佛去也和尚云你眼元不瞎又問石傘峰頭即不問萬竹林中事若何和尚云三莖四莖斜師云秪如石傘峰頭又作麼生和尚云七莖八莖曲師云石傘峰與萬竹林是同是別和尚云三莖四莖斜七莖八莖曲師云向上還有事也無和尚云有師云如何是向上事和尚云七莖八莖曲三莖四莖斜師云法道今蒙師指示正偏不落有無機和尚云不落有無一句作麼生道師問訊歸眾上堂師問桃花浪裏翻身去拿雲攫霧事如何和尚云莫學無量師曰恁麼則一滴遍大千和尚即下座一日化亡僧師問亡僧遷化向甚麼處安身立命和尚即驀頭一杖師云恁麼則分身塵剎中去也和尚倒拖拄杖便行行腳師一日茶話畢首座參頭眾職事請師說行腳師止之眾請之再三師不得已乃云予桐城楊氏子父一舉早喪母卓氏自小有出家念每見有乞食破衲即跟隨許遠不忍捨去意欲出家以母老為罣念遂至十九歲老母天年已盡二十歲遂往九華聚龍菴法光和尚處落髮即燒火執役三載每扣以生死大事但云性命交與龍天四大交與大眾作務去予心下思忖若作務能成佛則人家做年者亦成佛矣心中不悅每見有耆宿老衲必參扣之忽遇知休禪師久宗講席予參扣求出生死要訣彼即問我發心所以我云吾一向為生死要白日飛昇超脫輪迴休師云此是外道見解我佛法中要悟明心地成佛作祖纔為了生死吾慌忙作禮問曰何以為悟休師曰若要悟須參善知識付以話頭晝夜參扣十年二十年一旦豁然開悟謂之明心見性予歡喜踴躍又問法光和尚開示我念佛作務何也休師云作務雖是好事非汝等黑漆皮燈籠之所為也古云先入毘盧性海後行普賢行門豈似爾等一團無明身心行行若供養如意也有些福不然連福也無予聞此言心中暢快即便下山適遇西倩老師即參扣大事倩師云我見達大師授以毘舍浮佛半偈受持予即請問半偈雖則受持亦不知何者是四大何者是心何者是境但只持誦而已後來行至涇縣幕山參隱安老師彼師見我初進教我看止觀及永嘉集又見二外道一云觀空謂小真空見老真空一云白虎透三關予聞而不行此是宿生正信之力也一路行來因大事未明只是不悅晝則乞食或一餐或兩餐夜宿古廟衲不解帶行至南京普德寺聞二學者論楞嚴經九十六種外道一云即我土亦不少或云白虎透三關者或云嬰兒𡛥女者或云小真空見老真空者予聞此言向日所聞即時瓦解冰消後至靈谷付衣復至浙江入雲棲受具歷明耶二師講席聽楞嚴經至同別二種妄見忽悟根身器界總是空華前來半偈了了無礙自以為罪福皆空遂生撥無因果之念忽得一場傷寒病作不得主方纔悔過病已將好聞鄰單師云我紹興有一悟道禪師號湛然和尚甚是奇特今在壽聖講經予聞心中甚喜即往參扣禮畢和尚問向來做甚麼工夫我云向來持毘舍浮佛偈和尚云四大是假妄心是空甚麼人拖著你這死屍來即此問話者又是誰人我被這一句無可做聲方知向來所解空境全然不是徑到紹興延慶寺七晝夜疑情不開至半夜立於佛前忽然間似手一提不知這邊那邊遂得個輕清心下忽湧起不離當處常湛然覓即知君不可見便曉得這拖死屍的這問話底方知前來悟的心境雖空而不得常住心體非為正悟此一番雖得其體未得其用欲見和尚適往他處見幾位老師他問我柏樹子乾屎橛予不能對因為不明心中疑云這還不是將從前放下再參就參個一歸何處從此延慶掛搭兩年一日浴出於竹園乘涼一陣風來將竹一推遂會得無情說法從此工夫一日一日自有妙處聞知顯聖寺坐禪遂去求單蒙本際兄慨諾遂上顯聖坐禪期完日和尚不在寺中當家相留因住下單只聽板喫飯閑事不管於此不明心中只是煩悶遂不語一百日又晝夜不睡打七七日不明又是七日又不明白於禪堂四角俱貼起話頭一句一句追將去苦哉苦哉追得我前氣不接後氣如挑千斤擔子相似無可奈何四十二年甲寅歲雲門廣孝寺請老和尚開堂眾約我去坐禪我云待我明白此事方可去時有若虛本際二兄再三相勸云古人開堂三五百眾朝暮參請正為此事不可堅執汝若親近甚有利益不可錯過予聞此語遂即同去和尚結制上堂說法末後有四句偈云豎起脊梁生銕鑄放下面皮莫回顧猶如象王脫金鎖若不如是何劫悟予聞此一參法語痛哭一場即依和尚此偈做將去挺起脊梁捏緊拳頭放下面皮再不回頭轉腦憑他死也罷活也罷由是猛著精彩做去連做了十日遂成一片晝夜凝然不散心中始知得力一日和尚小參舉南泉斬貓云道得即不斬以手作提貓勢云汝等作麼生道卻救得貓兒和尚將手正作提勢時予心中忽然有個領悟處遂將蒲團一丟眾人各下語和尚云一語下徐州一同參通文者頌之謂得意予不肯同曰你試頌看予信口頌曰提起劍斬卻貓一段春光人不曉南泉舉似作家兒趙州老人頭戴草頭戴草凜凜威風振華表同不肯呈和尚和尚曰還是不通文者好異日和尚於橋上乘涼即云溪水潺潺汝等各下語看眾各下語予云敲空有響擊木無聲和尚笑而頷之後入方丈和尚問工夫如何予一一實說和尚云從今已去一切放下但只休歇去予聞此語心下還不肯至夏期再約七眾同志道友打七至第六日正經行間聞鐘聲忽然身心脫落將從前一片凝然工夫一總都無了站立佛前半炷香又漸漸覺來自云不可住著從此一番始是無疑後隨和尚上徑山至福城東塔期完和尚應石佛請講經予遂往皖公山住靜方方一丈茆蓬住三載遂下山參黃蘗無念和尚至匡廬見憨大師往峰頂叩養菴老師參博山至庚申春和尚六十卻回雲門顯聖天啟元年於越之䖾蜲山住靜三年天啟癸亥和尚開法顯聖予為西堂助揚化儀天啟甲子復住靜於陽明洞乙丑冬過金粟領眾助揚法化丙寅春復回靜室至八月和尚從閩中回初五和尚誕日予過顯聖問安慶壽至初七日蒙和尚授以衣偈予拜辭欲往南嶽眾居士再三相留遂為予另擇鍾山古基新建靜室居住不期和尚入般涅槃叢林無主城中眾居士請予住持予以福薄不堪領眾卻之復因眾弟兄邀同護法來請予不得已秪得從命今冬在此已揚家醜甚不唧溜那堪參頭與眾板首今夜問予行腳不覺叨叨至此若是上根利智者何費許多周遮正所謂不唧溜中更不唧溜也時寒珍重附來書給諫陶虎溪侍御倪三蘭等請師主護國啟恭惟大師蓍闍景賢禪河滴派秉宗律之二法開善信之津梁豎拂玅演彷彿祗林天外語苦行堅操依稀面壁坐中身法自受以雲門道先行於吳地茲月堂上人遍遊諸岳轉錫天台覓護國之崩陊憫發弘誓幸檀施之協助大建莊嚴八載精誠追蹤神禹之悴一朝抵續聿新法王之筵金磬振於枝瓶奚翅八十一問廣長舌日光射於蓮座恍現八萬四千陀羅軀是此翬革之落成正堪大乘之稅駕名藍更造洵乎典廢之有時玄度重逄詎非夙果之難已佇盻慈航速企瞻仰寶筏徐來臨楮曷任顒候之至大司馬王峨雲請師主護國啟戒珠勝會獲聆法塵之玄音茅塞頓開實為生平之大幸握別已來忽復經歲望風懷想如何可言伏諗道體清佳法雨廣被人天景從遐邇皈依可勝欣仰茲者天台月堂上人以十載苦緣重興護國古剎善信咸集恭迎老禪師法從弘闡宗風啟諸蒙暗萬祈慨然飛錫光寒拾之遺蹤表應真之舊跡名山幸甚大眾幸甚造次附請不悉不恭統惟慈諒文林郎許惺臺陳奕垣率眾請師書昔承慧日遠照光遍幽明昨讀語錄神奇如入寶所睹覺樹滿林旃檀撲鼻令夢覺生香肝膽馥郁惟恨不及早日歸依座下以聆天鼓耳茲天台護國舊為佛祖散花之地人天歸投之所今幸重建眾亦有依皆仰大師飛錫惠此一方顯了義於直下示尼珠於眾前俾諸情與無情披雲睹日萎草台邑頓遇陽春所謂翠樹細鱗皆普現色身三昧也翹首赤城幸賜憐懇吏部陳木叔上師書二篇函煇記讀書匡廬時纔十餘載偶遇宗師指點便欲打破石璧撞倒鐵城少參臨濟之門一聞台山之路不謂機緣不偶誤落名場塵網纏身住火宅中已將三十餘載蠹苑雞壇滯人特甚今復脫濕裘而挂勞車前途不知稅駕之地擬繞座三匝求我師以熱棒醒塵迷耳護國荒頹久就蓁棘承荷再轉法輪特開覺路宗門大意豈人人所能領略惟聞木樨而悟無隱指柏樹以悟西來畫葫依樣不過套子話頭心印了然自覺無言可說煇鈍根頑質尚容叩大壇以求特示非區區影響之談敢遙相問訊也山寺聞食指甚繁無從借飯香積如來七十二寺之遺蹤大半歸於豪家向煇所撰緣簿已詳言之有寄嵊縣吳年兄一書煩便致之瞻仰慈顏徒深依怙臨楮神往不宣天台稱天冠道場五百應真示現之方近漸鞠為茂草護國一袈裟地久矣荒頹幸蒙老師和尚飛錫遠臨山川生色棲真千仞衍法三車比於道猷再來智師登座而木樨無隱柏樹無言直指根宗正擬以頑石聽虎丘說法不謂人天瞻仰弁霅邀靈相傳法駕復赴諸前輩先生敦請何桃源桐柏之間不能稽首攀留致暫違弘慈覆芘耶仲秋初九日從高足得師手書云弁峰道場尚未囑付法嗣契乎真傳何煩世尊惓惓授記譬如彌天法雨東霈西沾揆之大眾歸依皆引領而跂足矣伏願我師特憫廢墟大真寶剎法輪再轉庶佛日得以增輝而宗門因之不墜豈獨弟子諸人之望歲哉函煇五根獨鈍三業未清雖怙戀師門而下愚中痞未能洗耳叩洪鐘滌腸嘗法味尚冀老師而始終誘掖教誨庶不致竟淪墮落以負玉成至于山寺傾圮此皆煇等之責自當少效護持以展犬馬前允中上人往東甌亦曾托之諸相知者矣煇亦擬於是月十二過苕溪而尚滯家冗稍羈趨侍舟過峴山時亟圖躡芒拜遠公也孝廉吳芝菴上師書芳業深器劣蒙數提示初無下手處日在丈室又開方便令百不思百不為善惡俱莫管放得空空蕩蕩當時靜坐默觀此真對症之劑纔覺得從前勞碌終何益也護國中興宗風重振誠名山之鏡霓南方所共仰第施給未敷責有攸歸然古道場初隆皆以寥寥寞寞起腳此在龍天自有重護當弗煩吾輩過計陳木叔書殷殷垂念留心此地可謂誠懇邢公來縣又畏暑而不能一面徒懷耿耿天氣炎蒸望加珍攝刑部尚書沈何山請師書飛錫遠邁想天台石梁熾然說法參方衲子一時雲集也弁峰蒼翠翹企杖履護國之期已洽眾望專候和尚復歸方丈以慰大眾渴仰尚容面叩以領法音不盡孝廉唐祈遠請師書弁山大眾暨合郡若緇若素惓惓望和尚復還龍華不啻以日為歲願和尚俯順眾情早定歸期彼護國不可無人若於法嗣中擇一人主之兩地交光相得益彰韶國師道場自有重新之日即同和尚在彼無異也顒候返錫附此仰懇伏冀慈愍俯允愚言總憲唐存憶居士上師書承慈誨諄諄心目俱豁復讀新刻其中抑揚殺活縱奪自如至於辨邪正判古今皆不近人情非大師不能出此手眼庶後學一覽可謂金鋀自分不惟法門大幸亦王綱大翼之幸矣前閱禪燈世譜一書將雲門法眼二宗列於馬祖派下某甚疑之或謂出自天童手筆問兒竑亦莫知某謂必非密老之意或門下借密老之名圖炫名聞妄改有之也今聞大師欲翻此板仍依藏板改正不致轉轉謬傳甚慰愚意稍待秋日謹奉刻資以植法幢光明種子臨楮瞻依不悉越州鄉紳請回顯聖寺啟四函大司馬王峨雲請師書暌違教塵悃積歲年遙瞻飛錫祗有神往伏諗法候清勝化雨普施故山大眾日切引領今灑掃顯聖禪堂復集舊門龍象雲凝谷口香滿爐峰同開無住之宗風滿逗別傳之至教人天共企遐邇同祈謹啟侍御祁世培請師書恭惟大師以古佛之應身佩洞宗之祖印勁骨高風實履真造海內所望以追蹤先哲力砥今時者實惟大師是賴焉彪佳自顯聖一覲慈顏之後風塵碌碌親教無繇而翹渴之衷十載如一日也顯聖寺為湛大師唱道之地越中佛法頗於此卜興衰焉第因一二宵小于中為祟使住持知識屢不能久安其位今寥落之況不啻法堂草深越中四眾念湛大師法嗣中繼祖燈啟後學而使海內衲子傾心歸附者莫大師若也率皆竭誠致辭託季玉師特走虔州奉迎法駕復歸雲門使石傘峰頭再迸掀天白浪顯聖寺內重開烹佛紅爐想湛師於常寂光中正當合掌歡喜而四眾欣仰之私不言可知矣至於寺中不肖之尤者當先清汰一二以待大師之臨而大師道高德重纔一光降則頹綱墮緒自當立起而彪佳等不敏亦不敢一日忘金湯之責耳先君向與湛大師為世外交得聞教外之旨今彪佳等獲於大師槌拂之下親觀第一義諦何幸如之哉此番奉迎非比尋常而彪佳亦非敢以啟請套柬上溷清嚴伏惟俯鑒輿情速啟蓮駕臨楮可勝翹注文學祁驥超請師書當今洞上一宗固不乏人所稱行解俱到齒德俱高具古佛之真心佩西來之密印者舍和尚其誰屬哉非敢為佞也駿佳不敢自謂頂門具眼而參方眼目頗有一隙之明故于和尚有深信有真服焉自戒珠親承槌拂之後無日不仰企道風今春適有香城師之便正欲附佈一言以通數年翹渴之私不意先慈于頃刻之間無病而化煢煢草土中不及一伸款款私衷曷任耿耿茲有啟者顯聖為老和尚中興洞宗之地而和尚又法嗣中有力擔荷之人今聽其荒衰寥落和尚想亦有不安于心者今越中四眾念非得和尚法駕降臨顯聖決無可起之理矣是以合詞致柬託季玉師特走奉迎伏乞垂念越中自三十年來兒童婦女皆知有參禪一事機緣亦在將熟之時得和尚雷音一再吼末法當有重興之望寺中一二不肖當先清汰一番以待法駕之至其餘庸庸之輩和尚一臨自當革面顯聖亦有重興之望矣萬乞即啟法幢而移之東南佛法幸甚眾生幸甚即老和尚亦當歡喜于寂光中也駿佳溯水源木本一日不敢忘老和尚其敢一日忘顯聖哉一日不敢忘顯聖其敢一日不冀和尚之光降而中興之哉哀毀之餘語無倫次然一念之誠天日可鑒耳伏乞垂鑒為荷文學張懿才顯聖山主緬惟大師玅明朗徹法曜圓通五臺以北兩浙以西誰不景仰德輝皈依大乘趙州曹溪無過是矣憶自掃塔松間相晤後七易寒暑大師之法慧日隆不肖之塵緣日障靜言思之可悲可怖客冬有僧無虞還霅水曾草數行并拙作一首相候想晉之玄覽矣茲因顯聖禪林實尊師湛老和尚起手歸根之地乃超天以後梵眾靡所宗主爰堅請大師坐鎮方丈咸登歡喜地而大師欲遍度十方于是法駕所駐到處崇瞻然今願力已酬寧忍視本山之荒廢耶今諸善知識暨諸檀越家合詞具請得師座還山大闡宗猷永光慧燄非但眾生之福而實不肖之幸也顓候雲旌統惟慈炤臨楮可勝合掌頂禮之至贛城鄉紳文學盧觀象謝讚杜郁之蕭良相等眾居士請師回虔公啟諸方思服後先雖在乎因緣一雨普滋沾被寧分于彼此故四十九年說法人間天上處處啟方便之門而三百餘會度人梵宇名藍在在應群機之感自非大願是乘誰則深心以奉恭惟上瑞下白大師不事文言墮支離之見網直指宗印闡秘密之玄機道大則剎剎現身論久而人人徯志矧虔匯雙江以錦石瑣百折于玉虹郡中古剎猶瞻巨麗者斯嵯峨乎況自敕建大唐院名寂炤寺曰報恩舊因虔神江東籤中有虎頭城裏看嵯峨句貴人顯官占此頻驗亦時往來夢寐相通載在燕京關聖靈籤及曾任本郡濮陽參軍頌語可據寺中上建釋迦彌勒迦葉阿難傍奉觀音地藏羅漢聖僧森森濟濟象教巍峨宛因鹿苑移來化為西江蘭若鷲峰現出結成北嶺招提柰緣一毀百毀至爾因頹愈頹鳥篆蝸涎痛矣野猿獻果風催雨慘曷勝燕雀巢泥眼前功果未明身後因緣何有今合郡宰官而衛護玉屑珠霏四方善信以維持捐貲著力看走輸而削墨九仞非難俾築土以弘基期月易就伏乞百丈大師龍天推轂嵯峨之主席豈曰偶然今古同符報恩之鼎新殆非人力或返崆峒而駐席再開宗眼之門但灑章貢以飛甘普潤焦芽之種風行草偃望祖印之重新面命耳提佇法王之復至雲山在目何妨掉臂即行龍象相隨正好逢場作戲願從緇白之請無執謙讓之懷欣然肯來可勝幸甚臨啟無任瞻仰之至
